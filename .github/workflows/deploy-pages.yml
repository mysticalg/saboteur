name: Deploy static site to GitHub Pages

on:
  # Manual trigger for quick verification from Actions tab.
  workflow_dispatch:
  # Deploy whenever website files are updated on main.
  push:
    branches: ["main"]
    paths:
      - "*.html"
      - ".github/workflows/deploy-pages.yml"

# Required permissions for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deployment runs at a time.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Make sure Pages is enabled for this repository before deploying.
      # If Pages has never been turned on, deploy-pages returns a 404.
      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            try {
              await github.rest.repos.getPages({ owner, repo });
              core.info('GitHub Pages is already enabled.');
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              core.warning('GitHub Pages is not enabled yet. Attempting to enable workflow-based Pages builds.');

              try {
                await github.request('POST /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  build_type: 'workflow'
                });
                core.info('GitHub Pages has been enabled for workflow deployments.');
              } catch (createError) {
                core.setFailed(
                  `Unable to enable GitHub Pages automatically: ${createError.message}. ` +
                  'Enable Pages in Settings → Pages, set Source to GitHub Actions, then re-run this workflow.'
                );
              }
            }

      # Configure metadata that deploy-pages uses for the target site.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Upload full repo as static artifact (includes HTML/CSS/JS assets).
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
