<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SABOTEUR ENHANCED</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;}
#keys{color:#2a2a2a;font:8px monospace;margin-top:4px;letter-spacing:.5px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="keys">← → MOVE &nbsp;|&nbsp; ↑ JUMP / CLIMB &nbsp;|&nbsp; ↓ DESCEND LADDER &nbsp;|&nbsp; Z KICK &nbsp;|&nbsp; X PUNCH &nbsp;|&nbsp; C THROW STAR &nbsp;|&nbsp; SPACE JUMP</div>
<script>
'use strict';
// ─────────────────────────────────────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const SCALE = 2;
const VW = 320, VH = 200;
canvas.width = VW * SCALE;
canvas.height = VH * SCALE;
ctx.scale(SCALE, SCALE);
ctx.imageSmoothingEnabled = false;

// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const TS = 16;      // tile size px
const MW = 80;      // map width  tiles
const MH = 61;      // map height tiles
// Tile IDs
const T_EMPTY=0, T_SOLID=1, T_PLAT=2, T_LADDER=3, T_WATER=4, T_SPIKE=5, T_EXIT=6;

// ─────────────────────────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────────────────────────
const keys={}, pressed={};
window.addEventListener('keydown',e=>{
  if(!keys[e.code]) pressed[e.code]=true;
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.code]=false; });
function anyKey(){ return Object.values(keys).some(v=>v); }
function clearPressed(){ for(let k in pressed) pressed[k]=false; }

// ─────────────────────────────────────────────────────────────────────────────
// MAP
// ─────────────────────────────────────────────────────────────────────────────
const map = new Uint8Array(MW * MH);
const setT=(x,y,t)=>{ if(x>=0&&x<MW&&y>=0&&y<MH) map[y*MW+x]=t; };
const getT=(x,y)=>{ if(x<0||x>=MW||y<0||y>=MH) return T_SOLID; return map[y*MW+x]; };
const isSolid=(x,y)=>{ const t=getT(x,y); return t===T_SOLID||t===T_SPIKE; };
const isPlat=(x,y)=>getT(x,y)===T_PLAT;
const isLadder=(x,y)=>getT(x,y)===T_LADDER;

function fillR(x,y,w,h,t){ for(let ry=y;ry<y+h;ry++) for(let rx=x;rx<x+w;rx++) setT(rx,ry,t); }

function buildMap(){
  fillR(0,0,MW,MH,T_EMPTY);

  // ── ROOF row 4 (solid) with exit tiles on right side ──────────────────────
  fillR(0,4,MW,1,T_SOLID);
  fillR(68,4,10,1,T_EXIT);            // helicopter pad
  // Ladders piercing roof
  [10,25,42,60,73].forEach(x=>{
    setT(x,4,T_LADDER); setT(x,3,T_LADDER); setT(x,2,T_LADDER);
  });

  // ── FLOOR 1  rows 5-14 ────────────────────────────────────────────────────
  fillR(0,14,MW,1,T_SOLID);
  fillR(0,5,1,9,T_SOLID); fillR(79,5,1,9,T_SOLID);
  // Internal walls with door gaps (3 tiles high at y=10-12)
  const f1walls=[18,38,58];
  f1walls.forEach(wx=>{ fillR(wx,5,1,9,T_SOLID); setT(wx,10,T_EMPTY); setT(wx,11,T_EMPTY); setT(wx,12,T_EMPTY); });
  // Platforms
  [[4,10,7],[22,9,5],[30,11,5],[41,10,7],[52,9,5],[62,11,7]].forEach(([x,y,w])=>fillR(x,y,w,1,T_PLAT));
  // Ladders (floor→up through roof)
  [10,25,42,60,73].forEach(x=>{ for(let y=5;y<=14;y++) setT(x,y,T_LADDER); });

  // ── FLOOR 2  rows 15-24 ───────────────────────────────────────────────────
  fillR(0,24,MW,1,T_SOLID);
  fillR(0,15,1,9,T_SOLID); fillR(79,15,1,9,T_SOLID);
  const f2walls=[22,44,66];
  f2walls.forEach(wx=>{ fillR(wx,15,1,9,T_SOLID); setT(wx,19,T_EMPTY); setT(wx,20,T_EMPTY); setT(wx,21,T_EMPTY); });
  [[5,19,7],[15,21,6],[27,18,8],[36,21,6],[47,19,7],[57,17,6],[69,21,8]].forEach(([x,y,w])=>fillR(x,y,w,1,T_PLAT));
  [10,25,42,60,73].forEach(x=>{ for(let y=15;y<=24;y++) setT(x,y,T_LADDER); });

  // ── FLOOR 3  rows 25-34 ───────────────────────────────────────────────────
  fillR(0,34,MW,1,T_SOLID);
  fillR(0,25,1,9,T_SOLID); fillR(79,25,1,9,T_SOLID);
  const f3walls=[30,60];
  f3walls.forEach(wx=>{ fillR(wx,25,1,9,T_SOLID); setT(wx,29,T_EMPTY); setT(wx,30,T_EMPTY); setT(wx,31,T_EMPTY); });
  [[5,29,8],[18,31,8],[33,28,9],[45,30,7],[63,28,8],[74,31,4]].forEach(([x,y,w])=>fillR(x,y,w,1,T_PLAT));
  // Hazards
  fillR(12,33,5,1,T_SPIKE); fillR(50,33,4,1,T_SPIKE);
  fillR(68,33,8,1,T_WATER);
  [10,25,42,60,73].forEach(x=>{ for(let y=25;y<=34;y++) setT(x,y,T_LADDER); });

  // ── FLOOR 4  rows 35-44 ───────────────────────────────────────────────────
  fillR(0,44,MW,1,T_SOLID);
  fillR(0,35,1,9,T_SOLID); fillR(79,35,1,9,T_SOLID);
  const f4walls=[20,40,55,70];
  f4walls.forEach(wx=>{ fillR(wx,35,1,9,T_SOLID); setT(wx,38,T_EMPTY); setT(wx,39,T_EMPTY); setT(wx,40,T_EMPTY); });
  [[4,39,7],[12,41,6],[25,39,8],[43,38,8],[57,40,7],[73,38,5]].forEach(([x,y,w])=>fillR(x,y,w,1,T_PLAT));
  fillR(8,43,6,1,T_WATER); fillR(35,43,10,1,T_WATER); fillR(60,43,5,1,T_WATER);
  [10,25,42,60,73].forEach(x=>{ for(let y=35;y<=44;y++) setT(x,y,T_LADDER); });

  // ── FLOOR 5  rows 45-54 (deep basement) ──────────────────────────────────
  fillR(0,54,MW,1,T_SOLID);
  fillR(0,45,1,9,T_SOLID); fillR(79,45,1,9,T_SOLID);
  const f5walls=[16,36,55];
  f5walls.forEach(wx=>{ fillR(wx,45,1,9,T_SOLID); setT(wx,49,T_EMPTY); setT(wx,50,T_EMPTY); setT(wx,51,T_EMPTY); });
  [[4,49,8],[18,51,10],[37,48,10],[57,51,8],[68,49,10]].forEach(([x,y,w])=>fillR(x,y,w,1,T_PLAT));
  fillR(0,53,MW,1,T_WATER);  // bottom hazard row
  [10,25,42].forEach(x=>{ for(let y=45;y<=53;y++) setT(x,y,T_LADDER); });
}

// ─────────────────────────────────────────────────────────────────────────────
// ENTITY HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const GRAVITY=0.38, MAX_FALL=8;

function moveEntity(e){
  // X
  e.x += e.vx;
  let tx1=Math.floor(e.x/TS), tx2=Math.floor((e.x+e.w-1)/TS);
  let ty1=Math.floor(e.y/TS), ty2=Math.floor((e.y+e.h-1)/TS);
  for(let ty=ty1;ty<=ty2;ty++) for(let tx=tx1;tx<=tx2;tx++){
    if(isSolid(tx,ty)){
      if(e.vx>0){ e.x=tx*TS-e.w; e.vx=0; }
      else if(e.vx<0){ e.x=(tx+1)*TS; e.vx=0; }
    }
  }
  // Y
  if(!e.onLadder) e.vy=Math.min(e.vy+GRAVITY,MAX_FALL);
  e.y += e.vy;
  e.onGround=false;
  tx1=Math.floor(e.x/TS); tx2=Math.floor((e.x+e.w-1)/TS);
  ty1=Math.floor(e.y/TS); ty2=Math.floor((e.y+e.h-1)/TS);
  for(let tx=tx1;tx<=tx2;tx++) for(let ty=ty1;ty<=ty2;ty++){
    if(isSolid(tx,ty)){
      if(e.vy>0){ e.y=ty*TS-e.h; e.vy=0; e.onGround=true; }
      else if(e.vy<0){ e.y=(ty+1)*TS; e.vy=0; }
    }
  }
  // One-way platforms (only when falling)
  if(e.vy>=0&&!e.onGround&&!e.onLadder){
    const foot=e.y+e.h;
    const fTile=Math.floor(foot/TS);
    const prevFoot=foot-e.vy;
    if(Math.floor(prevFoot/TS)<fTile){
      tx1=Math.floor(e.x/TS); tx2=Math.floor((e.x+e.w-1)/TS);
      for(let tx=tx1;tx<=tx2;tx++){
        if(isPlat(tx,fTile)){
          e.y=fTile*TS-e.h; e.vy=0; e.onGround=true;
        }
      }
    }
  }
}

function overlaps(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }

// ─────────────────────────────────────────────────────────────────────────────
// PLAYER
// ─────────────────────────────────────────────────────────────────────────────
const PW=12, PH=20;
let P={};
function resetPlayer(){
  P={ x:3*TS, y:4*TS-PH-1, w:PW, h:PH,
      vx:0, vy:0, dir:1,
      onGround:false, onLadder:false,
      state:'idle', stateTimer:0,
      health:5, maxHealth:5,
      stars:12, lives:3, score:0,
      hasDisk:false, hasKeycard:false,
      invincible:0, attackCooldown:0, attackBox:null };
}

function playerHit(dmg){
  if(P.invincible>0) return;
  P.health-=dmg;
  spawnPfx(P.x+PW/2,P.y+PH/2,6,'#ff6622');
  if(P.health<=0){ P.health=0; killPlayer(); return; }
  P.state='hurt'; P.stateTimer=18; P.invincible=70;
  P.vy=-2.5;
}

function killPlayer(){
  P.lives--;
  if(P.lives<=0){ P.lives=0; setTimeout(()=>{ gameState='GAMEOVER'; },1800); P.state='dead'; return; }
  // Respawn on roof
  P.x=3*TS; P.y=4*TS-PH-1; P.vx=0; P.vy=0;
  P.health=P.maxHealth; P.state='hurt'; P.stateTimer=30; P.invincible=120;
}

function updatePlayer(){
  if(P.state==='dead') return;
  if(P.invincible>0) P.invincible--;
  if(P.attackCooldown>0) P.attackCooldown--;
  P.attackBox=null;

  // Active attack states
  if(P.state==='kick'||P.state==='punch'){
    P.stateTimer--;
    if(P.stateTimer>4){
      const bw=22, bh=10;
      P.attackBox={ x:P.dir>0?P.x+PW:P.x-bw, y:P.y+(P.state==='kick'?PH*0.55:PH*0.2), w:bw, h:bh };
    }
    if(P.stateTimer<=0) P.state=P.onGround?'idle':'fall';
    moveEntity(P); return;
  }
  if(P.state==='throw'){
    P.stateTimer--;
    if(P.stateTimer===3){ spawnStar(); }
    if(P.stateTimer<=0) P.state=P.onGround?'idle':'fall';
    moveEntity(P); return;
  }
  if(P.state==='hurt'){
    P.stateTimer--;
    if(P.stateTimer<=0) P.state='idle';
    moveEntity(P); return;
  }

  // Ladder check
  const cx=Math.floor((P.x+PW/2)/TS);
  const cyTop=Math.floor((P.y+2)/TS);
  const cyMid=Math.floor((P.y+PH/2)/TS);
  const onLadderTile=isLadder(cx,cyTop)||isLadder(cx,cyMid);

  if(onLadderTile&&(keys['ArrowUp']||keys['ArrowDown'])){
    P.onLadder=true;
    P.vx=0; P.vy=(keys['ArrowUp']?-2:2);
    P.x=cx*TS+(TS-PW)/2; // snap x
    P.state='climb';
    moveEntity(P);
    if(!isLadder(cx,Math.floor((P.y+2)/TS))&&P.vy<0) P.onLadder=false;
    clearPressed(); return;
  } else { P.onLadder=false; }

  P.vx=0;
  if(keys['ArrowLeft']){ P.vx=-1.9; P.dir=-1; }
  if(keys['ArrowRight']){ P.vx=1.9; P.dir=1; }

  if((keys['ArrowUp']||keys['Space'])&&P.onGround){
    P.vy=-6.2; P.onGround=false; P.state='jump';
  }

  if(pressed['KeyZ']&&P.attackCooldown<=0){
    P.state='kick'; P.stateTimer=13; P.attackCooldown=22; pressed['KeyZ']=false;
  } else if(pressed['KeyX']&&P.attackCooldown<=0){
    P.state='punch'; P.stateTimer=11; P.attackCooldown=18; pressed['KeyX']=false;
  } else if(pressed['KeyC']&&P.attackCooldown<=0){
    P.state='throw'; P.stateTimer=10; P.attackCooldown=22; pressed['KeyC']=false;
  }

  if(!['kick','punch','throw','hurt','climb'].includes(P.state)){
    P.state=P.onGround?(P.vx!==0?'run':'idle'):(P.vy<0?'jump':'fall');
  }

  moveEntity(P);

  // Hazards
  const footX=Math.floor((P.x+PW/2)/TS);
  const footY=Math.floor((P.y+PH)/TS);
  const t=getT(footX,footY);
  if(t===T_WATER||t===T_SPIKE) playerHit(5);

  // Exit check
  if(P.hasDisk&&P.hasKeycard){
    const midTile=getT(Math.floor((P.x+PW/2)/TS),Math.floor((P.y+PH/2)/TS));
    if(midTile===T_EXIT) gameState='WIN';
  }

  clearPressed();
}

// ─────────────────────────────────────────────────────────────────────────────
// PROJECTILES (ninja stars)
// ─────────────────────────────────────────────────────────────────────────────
let stars=[];
function spawnStar(){
  if(P.stars<=0) return;
  P.stars--;
  stars.push({ x:P.x+(P.dir>0?PW+2:-4), y:P.y+PH*0.35, vx:P.dir*5.5, vy:0, life:55 });
}
function updateStars(){
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];
    s.x+=s.vx; s.y+=s.vy; s.life--;
    if(isSolid(Math.floor(s.x/TS),Math.floor(s.y/TS))||s.life<=0){
      spawnPfx(s.x,s.y,5,'#ffff44');
      stars.splice(i,1); continue;
    }
    // Hit enemies
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(e.state==='dead') continue;
      if(overlaps({x:s.x-3,y:s.y-3,w:6,h:6},{x:e.x,y:e.y,w:e.w,h:e.h})){
        hurtEnemy(e,2,s.vx>0?1:-1);
        spawnPfx(s.x,s.y,8,'#ffff44');
        hit=true; break;
      }
    }
    if(hit){ stars.splice(i,1); }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ENEMIES
// ─────────────────────────────────────────────────────────────────────────────
let enemies=[], items=[];

function hurtEnemy(e,dmg,dir){
  e.health-=dmg;
  P.score+=50;
  spawnPfx(e.x+e.w/2,e.y+e.h/2,6,'#ff4422');
  e.state='hurt'; e.stateTimer=18;
  e.vx=(dir||1)*2; e.vy=-2;
  if(e.health<=0){ e.state='dead'; P.score+=100; spawnPfx(e.x+e.w/2,e.y+e.h/2,18,'#ff8800'); }
}

function spawnEnemies(){
  enemies=[];
  // Guards per floor [row above floor, x positions, patrolRange]
  const gDefs=[
    // Floor 1
    {y:13,spots:[[5,8],[22,6],[32,6],[45,7],[55,6],[68,7],[75,5]],h:20,type:'guard'},
    // Floor 2
    {y:23,spots:[[5,8],[15,5],[28,7],[35,5],[48,7],[58,5],[72,5]],h:20,type:'guard'},
    // Floor 3
    {y:33,spots:[[5,9],[20,7],[35,8],[48,6],[65,8],[75,4]],h:20,type:'guard'},
    // Floor 4
    {y:43,spots:[[5,7],[23,7],[44,7],[58,5],[75,4]],h:20,type:'guard'},
    // Floor 5
    {y:53,spots:[[5,6],[22,7],[42,8],[60,6],[72,6]],h:20,type:'guard'},
  ];
  gDefs.forEach(def=>{
    def.spots.forEach(([x,pr])=>{
      enemies.push({
        type:'guard',
        x:x*TS, y:(def.y+1)*TS-def.h,
        w:12, h:def.h,
        vx:0.6, vy:0, dir:1,
        state:'patrol', stateTimer:0,
        health:3, maxHealth:3,
        patrolMin:(x-pr)*TS, patrolMax:(x+pr)*TS,
        onGround:false, alertTimer:0,
      });
    });
  });

  // Dogs
  const dogDefs=[
    {y:13,spots:[[28,10],[55,8],[72,6]]},
    {y:23,spots:[[10,8],[35,10],[60,8]]},
    {y:33,spots:[[15,8],[50,10]]},
    {y:43,spots:[[30,8],[65,8]]},
    {y:53,spots:[[18,8],[55,8]]},
  ];
  dogDefs.forEach(def=>{
    def.spots.forEach(([x,pr])=>{
      enemies.push({
        type:'dog',
        x:x*TS, y:(def.y+1)*TS-12,
        w:14, h:12,
        vx:0.9, vy:0, dir:1,
        state:'patrol', stateTimer:0,
        health:1, maxHealth:1,
        patrolMin:(x-pr)*TS, patrolMax:(x+pr)*TS,
        onGround:false, alertTimer:0,
      });
    });
  });
}

function spawnItems(){
  items=[];
  const defs=[
    // ammo/health on each floor - placed in room interiors
    {s:'ammo',  x:5,  y:13},{s:'health',x:27, y:13},{s:'ammo',  x:46, y:13},{s:'health',x:67, y:13},
    {s:'ammo',  x:8,  y:23},{s:'health',x:32, y:23},{s:'ammo',  x:50, y:23},{s:'keycard',x:72,y:23},
    {s:'ammo',  x:12, y:33},{s:'disk',   x:43, y:33},{s:'health',x:65, y:33},
    {s:'ammo',  x:7,  y:43},{s:'health', x:28, y:43},{s:'ammo',  x:46, y:43},{s:'health',x:63,y:43},
    {s:'ammo',  x:6,  y:53},{s:'health', x:22, y:53},{s:'ammo',  x:44, y:53},
    // Extra ammo on platforms
    {s:'ammo',  x:24, y:8},{s:'ammo', x:52, y:8},
    {s:'ammo',  x:30, y:17},{s:'ammo', x:57, y:16},
    {s:'ammo',  x:36, y:27},{s:'health',x:47,y:29},
    {s:'ammo',  x:44, y:37},{s:'health',x:26,y:38},
  ];
  defs.forEach(d=>{
    items.push({ subtype:d.s, x:d.x*TS, y:(d.y+1)*TS-8, w:8, h:8, collected:false, bob:Math.random()*6.28 });
  });
}

function updateEnemies(){
  const CHASE_D=100, ATK_D=14;
  enemies.forEach(e=>{
    if(e.state==='dead') return;
    if(e.state==='hurt'){
      e.stateTimer--; if(e.stateTimer<=0) e.state=e.health>0?'patrol':'dead';
      moveEntity(e); return;
    }
    const dx=(P.x+PW/2)-(e.x+e.w/2);
    const dy=(P.y+PH/2)-(e.y+e.h/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    const sameFloor=Math.abs(dy)<40;
    const sp=e.type==='dog'?1.1:0.7;

    if(e.state==='patrol'){
      e.vx=e.dir*sp;
      if(e.x<=e.patrolMin){ e.dir=1; }
      if(e.x+e.w>=e.patrolMax){ e.dir=-1; }
      // Edge detection: don't walk off ledges
      const frontX=e.dir>0?e.x+e.w+2:e.x-2;
      if(!isSolid(Math.floor(frontX/TS),Math.floor((e.y+e.h+2)/TS))&&
         !isPlat(Math.floor(frontX/TS),Math.floor((e.y+e.h+2)/TS))&&
         !isLadder(Math.floor(frontX/TS),Math.floor((e.y+e.h)/TS))){
        e.dir*=-1;
      }
      if(dist<CHASE_D&&sameFloor){ e.state='chase'; e.alertTimer=200; }
    } else {
      e.alertTimer--;
      if(e.alertTimer<=0){ e.state='patrol'; return; }
      if(dist<CHASE_D&&sameFloor) e.alertTimer=200;
      if(sameFloor){ e.vx=Math.sign(dx)*(sp*1.4); e.dir=Math.sign(dx); }
      // Attack
      if(dist<ATK_D+e.w&&sameFloor&&e.stateTimer<=0){
        e.stateTimer=35; playerHit(1);
      }
    }
    if(e.stateTimer>0) e.stateTimer--;
    // Wall bounce
    const nx=e.x+e.vx;
    const wc=e.vx>0?Math.floor((nx+e.w)/TS):Math.floor(nx/TS);
    if(isSolid(wc,Math.floor((e.y+e.h/2)/TS))) e.dir*=-1;

    moveEntity(e);

    // Hazard death
    const ft=getT(Math.floor((e.x+e.w/2)/TS),Math.floor((e.y+e.h)/TS));
    if(ft===T_WATER||ft===T_SPIKE){ e.state='dead'; }

    // Player attack hits
    if(P.attackBox&&overlaps(P.attackBox,{x:e.x,y:e.y,w:e.w,h:e.h})){
      hurtEnemy(e,1,P.dir); P.attackBox=null;
    }
  });
}

function updateItems(){
  items.forEach(it=>{
    if(it.collected) return;
    it.bob+=0.06;
    if(overlaps({x:P.x,y:P.y,w:PW,h:PH},{x:it.x,y:it.y,w:it.w,h:it.h})){
      it.collected=true;
      if(it.subtype==='ammo'){ P.stars=Math.min(P.stars+6,20); P.score+=100; spawnPfx(it.x+4,it.y+4,8,'#ffff44'); }
      else if(it.subtype==='health'){ P.health=Math.min(P.health+2,P.maxHealth); P.score+=150; spawnPfx(it.x+4,it.y+4,8,'#ff4444'); }
      else if(it.subtype==='keycard'){ P.hasKeycard=true; P.score+=500; spawnPfx(it.x+4,it.y+4,14,'#44ff44'); }
      else if(it.subtype==='disk'){ P.hasDisk=true; P.score+=1000; spawnPfx(it.x+4,it.y+4,20,'#00ffcc'); }
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────────────────────────────────────
let pfx=[];
function spawnPfx(x,y,n,col){
  for(let i=0;i<n;i++) pfx.push({
    x,y, vx:(Math.random()-.5)*4, vy:(Math.random()-.5)*4-1.5,
    life:15+Math.random()*20, maxLife:35, col,
    sz:1+Math.random()*1.5
  });
}
function updatePfx(){
  for(let i=pfx.length-1;i>=0;i--){
    const p=pfx[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--;
    if(p.life<=0) pfx.splice(i,1);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────────────────────────────────────
let camX=0, camY=0;
function updateCamera(){
  const tx=P.x+PW/2-VW/2, ty=P.y+PH/2-VH/2+10;
  camX+=(tx-camX)*0.12; camY+=(ty-camY)*0.12;
  camX=Math.max(0,Math.min(camX,MW*TS-VW));
  camY=Math.max(0,Math.min(camY,MH*TS-VH));
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW TILE
// ─────────────────────────────────────────────────────────────────────────────
let tick=0;
function drawTile(tx,ty,sx,sy){
  const t=getT(tx,ty); if(t===T_EMPTY) return;
  switch(t){
    case T_SOLID:{
      const row=ty%2, off=row?8:0;
      ctx.fillStyle='#5a1e10'; ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle='#3a0e04'; ctx.fillRect(sx,sy,TS,1); ctx.fillRect(sx,sy,1,TS);
      ctx.fillStyle='#7a3020';
      ctx.fillRect(sx+1+off,sy+2,6,5); ctx.fillRect(sx+9+off,sy+2,5,5);
      ctx.fillRect(sx+1+(8-off),sy+9,7,5); ctx.fillRect(sx+9+(off>0?0:8)%16,sy+9,5,5);
      break;
    }
    case T_PLAT:{
      ctx.fillStyle='#4a3a18'; ctx.fillRect(sx,sy,TS,5);
      ctx.fillStyle='#6a5428'; ctx.fillRect(sx,sy+1,TS,1);
      ctx.fillStyle='#2a2008'; ctx.fillRect(sx,sy+4,TS,1);
      break;
    }
    case T_LADDER:{
      ctx.fillStyle='#6a4a18';
      ctx.fillRect(sx+4,sy,3,TS); ctx.fillRect(sx+9,sy,3,TS);
      ctx.fillStyle='#4a3410';
      for(let r=0;r<TS;r+=4) ctx.fillRect(sx+3,sy+r,10,1);
      break;
    }
    case T_WATER:{
      ctx.fillStyle='#0a1a5a'; ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle='#0a3080';
      const wv=Math.sin(tick*0.07+tx*0.8)*1.5;
      ctx.fillRect(sx,sy+wv,TS,4);
      ctx.fillStyle='rgba(40,80,200,0.3)'; ctx.fillRect(sx,sy,TS,TS);
      break;
    }
    case T_SPIKE:{
      ctx.fillStyle='#444460'; ctx.fillRect(sx,sy+TS-5,TS,5);
      ctx.fillStyle='#aaaacc';
      for(let s=0;s<TS;s+=4){
        ctx.beginPath(); ctx.moveTo(sx+s,sy+TS); ctx.lineTo(sx+s+2,sy+TS-13); ctx.lineTo(sx+s+4,sy+TS); ctx.fill();
      }
      break;
    }
    case T_EXIT:{
      ctx.fillStyle='#003808'; ctx.fillRect(sx,sy,TS,TS);
      const pulse=(tick>>3)&1;
      if(P.hasDisk&&P.hasKeycard){
        ctx.fillStyle=pulse?'#00ff55':'#00cc44';
        ctx.fillRect(sx+1,sy+1,TS-2,TS-2);
        ctx.fillStyle='#004a10'; ctx.fillRect(sx+4,sy+4,TS-8,TS-8);
      } else {
        ctx.fillStyle='#005010'; ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
      }
      break;
    }
  }
}

function drawMap(){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,VH);
  const depth=Math.min(1,(camY/(MH*TS)));
  g.addColorStop(0,`rgb(${Math.floor(depth*8)},${Math.floor(depth*4)},${Math.floor(20-depth*15)})`);
  g.addColorStop(1,`rgb(${Math.floor(depth*12)},${Math.floor(depth*6)},${Math.floor(15-depth*12)})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);

  const tx0=Math.max(0,Math.floor(camX/TS));
  const tx1=Math.min(MW,tx0+Math.ceil(VW/TS)+2);
  const ty0=Math.max(0,Math.floor(camY/TS));
  const ty1=Math.min(MH,ty0+Math.ceil(VH/TS)+2);
  for(let ty=ty0;ty<ty1;ty++) for(let tx=tx0;tx<tx1;tx++)
    drawTile(tx,ty,tx*TS-Math.floor(camX),ty*TS-Math.floor(camY));
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW SPRITES
// ─────────────────────────────────────────────────────────────────────────────
function drawNinja(sx,sy,dir,state,inv,t){
  if(inv>0&&(t>>1)&1) return;
  ctx.save(); ctx.translate(sx+(dir<0?PW:0),sy); if(dir<0) ctx.scale(-1,1);
  const fr=t>>3;
  // Body
  ctx.fillStyle='#111'; ctx.fillRect(1,4,10,12);
  // Head
  ctx.fillStyle='#c8996a'; ctx.fillRect(2,1,8,6);
  ctx.fillStyle='#cc1111'; ctx.fillRect(2,2,8,3); // mask
  ctx.fillStyle='#fff'; ctx.fillRect(6,2,3,1); // eye slit
  // Scarf
  ctx.fillStyle='#aa0000'; ctx.fillRect(1,7,10,2);

  if(state==='duck'){ ctx.fillStyle='#111'; ctx.fillRect(0,12,12,6); ctx.restore(); return; }
  if(state==='climb'){
    const al=(t>>3)&1;
    ctx.fillStyle='#111';
    ctx.fillRect(al?-3:PW,al?2:6,4,6); ctx.fillRect(al?PW:-3,al?6:2,4,6);
    ctx.restore(); return;
  }
  if(state==='kick'){
    ctx.fillStyle='#111';
    ctx.fillRect(-1,4,3,7); // back arm
    ctx.fillRect(PW-1,14,10,4); // kick leg
    ctx.fillRect(2,14,5,6); // standing leg
    ctx.restore(); return;
  }
  if(state==='punch'){
    ctx.fillStyle='#111';
    ctx.fillRect(PW,3,9,4); ctx.fillRect(PW+5,2,4,4); // extended punch
    ctx.fillRect(-2,4,3,6); // back arm
    ctx.fillRect(2,16,4,4); ctx.fillRect(7,16,4,4);
    ctx.restore(); return;
  }
  if(state==='throw'){
    ctx.fillStyle='#111'; ctx.fillRect(PW-1,3,8,4);
    ctx.fillStyle='#ffff00'; ctx.fillRect(PW+3,1,5,5);
    ctx.fillStyle='#ff8800'; ctx.fillRect(PW+5,3,2,2); // star glow
    ctx.fillStyle='#111'; ctx.fillRect(2,16,4,4); ctx.fillRect(7,16,4,4);
    ctx.restore(); return;
  }
  // Arms
  ctx.fillStyle='#111';
  const aSwing=state==='run'?(fr%2?1:-1):0;
  ctx.fillRect(-2,5+aSwing,3,6); ctx.fillRect(PW-1,5-aSwing,3,6);
  // Legs
  if(state==='jump'||state==='fall'){
    ctx.fillRect(2,16,4,3); ctx.fillRect(7,16,4,5);
  } else if(state==='run'){
    const l=fr%4;
    ctx.fillRect(2,16,4,4+(l<2?3:0)); ctx.fillRect(7,16,4,4+(l>=2?3:0));
  } else {
    ctx.fillRect(2,16,4,5); ctx.fillRect(7,16,4,5);
  }
  ctx.restore();
}

function drawGuard(sx,sy,dir,state,hp,maxHp,t){
  if(state==='dead') return;
  ctx.save(); ctx.translate(sx+(dir<0?12:0),sy); if(dir<0) ctx.scale(-1,1);
  const fr=t>>3;
  const hurt=state==='hurt'&&(t>>1)&1;
  // Body
  ctx.fillStyle=hurt?'#ff4433':'#1a3e8a'; ctx.fillRect(1,5,10,11);
  // Helmet
  ctx.fillStyle=hurt?'#ff4433':'#1230aa';
  ctx.fillRect(1,0,10,7); ctx.fillRect(0,3,12,3);
  ctx.fillStyle='#0a1844'; ctx.fillRect(2,2,8,2); // visor
  // Face strip
  ctx.fillStyle='#c8996a'; ctx.fillRect(2,5,8,4);
  ctx.fillStyle='#222'; ctx.fillRect(6,6,3,2); // eyes
  // Arms + gun
  ctx.fillStyle='#1a3e8a'; ctx.fillRect(-2,6,4,6); ctx.fillRect(11,6,4,6);
  ctx.fillStyle='#222'; ctx.fillRect(13,8,8,3); // gun barrel
  ctx.fillRect(15,6,3,3); // stock
  // Legs
  const lr=state==='patrol'||state==='chase'?fr%2:0;
  ctx.fillStyle='#0a1844';
  ctx.fillRect(2,16,4,4+(lr?3:0)); ctx.fillRect(7,16,4,4+(lr?0:3));
  ctx.restore();
  // Health pip
  if(hp<maxHp){
    ctx.fillStyle='#300'; ctx.fillRect(sx,sy-4,12,2);
    ctx.fillStyle='#f44'; ctx.fillRect(sx,sy-4,Math.round(12*hp/maxHp),2);
  }
}

function drawDog(sx,sy,dir,state,t){
  if(state==='dead') return;
  ctx.save(); ctx.translate(sx+(dir<0?14:0),sy); if(dir<0) ctx.scale(-1,1);
  const fr=t>>3;
  const hurt=state==='hurt'&&(t>>1)&1;
  ctx.fillStyle=hurt?'#ff8844':'#7a4a1a';
  // Body
  ctx.fillRect(2,4,10,6);
  ctx.fillStyle=hurt?'#ff6622':'#5a3010'; ctx.fillRect(3,5,8,4);
  // Head
  ctx.fillStyle=hurt?'#ff8844':'#7a4a1a';
  ctx.fillRect(9,1,5,5); ctx.fillRect(11,4,4,3);
  ctx.fillStyle='#111'; ctx.fillRect(13,5,1,1);
  ctx.fillStyle='#fff'; ctx.fillRect(10,2,2,2); ctx.fillStyle='#333'; ctx.fillRect(10,2,1,1);
  // Tail
  ctx.fillStyle='#7a4a1a'; ctx.fillRect(-1,2,3,2); ctx.fillRect(-3,0,3,2);
  // Legs
  const la=state!=='dead'?(fr%4):0;
  [[1,8],[4,8],[7,8],[10,8]].forEach(([lx,ly],i)=>{
    ctx.fillStyle='#5a3010';
    ctx.fillRect(lx,ly,2,i%2===la%2?4:2);
  });
  ctx.restore();
}

function drawItems(){
  items.forEach(it=>{
    if(it.collected) return;
    const sx=Math.round(it.x-camX), sy=Math.round(it.y-camY+Math.sin(it.bob)*2);
    if(sx<-16||sx>VW+16||sy<-16||sy>VH+16) return;
    switch(it.subtype){
      case 'ammo':
        ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(sx+4,sy+4,4,0,6.28); ctx.fill();
        ctx.fillStyle='#fff'; ctx.fillRect(sx+2,sy+3,4,2);
        ctx.fillStyle='#cc8800'; ctx.fillRect(sx+3,sy+1,2,2);
        break;
      case 'health':
        ctx.fillStyle='#ff3333'; ctx.fillRect(sx+1,sy+3,6,2); ctx.fillRect(sx+3,sy+1,2,6);
        ctx.fillStyle='#ff7777'; ctx.fillRect(sx+2,sy+3,4,2); ctx.fillRect(sx+3,sy+2,2,4);
        break;
      case 'keycard':
        ctx.fillStyle='#44ff44'; ctx.fillRect(sx,sy,8,6);
        ctx.fillStyle='#002200'; ctx.fillRect(sx+1,sy+1,4,4);
        ctx.fillStyle='#00ff00'; ctx.fillRect(sx+5,sy+2,2,2);
        ctx.fillStyle='#88ff88'; ctx.fillRect(sx+1,sy+1,3,1);
        break;
      case 'disk':{
        const p2=(tick>>2)&1;
        ctx.fillStyle=p2?'#00eeff':'#00bbcc';
        ctx.beginPath(); ctx.arc(sx+4,sy+4,4,0,6.28); ctx.fill();
        ctx.fillStyle='#003344'; ctx.beginPath(); ctx.arc(sx+4,sy+4,2,0,6.28); ctx.fill();
        ctx.fillStyle='#00ffff'; ctx.fillRect(sx+3,sy,2,2); // glow top
        break;
      }
    }
  });
}

function drawStars(){
  stars.forEach(s=>{
    const sx=Math.round(s.x-camX), sy=Math.round(s.y-camY);
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(tick*0.35);
    ctx.fillStyle='#ffff22';
    ctx.fillRect(-3,-1,6,2); ctx.fillRect(-1,-3,2,6);
    ctx.rotate(0.785);
    ctx.fillStyle='#ffcc00';
    ctx.fillRect(-2,-1,4,2); ctx.fillRect(-1,-2,2,4);
    ctx.restore();
  });
}

function drawPfx(){
  pfx.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.col;
    ctx.fillRect(Math.round(p.x-camX),Math.round(p.y-camY),Math.ceil(p.sz),Math.ceil(p.sz));
  });
  ctx.globalAlpha=1;
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(e.state==='dead') return;
    const sx=Math.round(e.x-camX), sy=Math.round(e.y-camY);
    if(sx<-32||sx>VW+32) return;
    if(e.type==='guard') drawGuard(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    else drawDog(sx,sy,e.dir,e.state,tick);
  });
}

// HUD
// ─────────────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,VH-24,VW,24);
  ctx.fillStyle='#222'; ctx.fillRect(0,VH-25,VW,1);

  ctx.font='5px monospace';
  // Health
  ctx.fillStyle='#888'; ctx.fillText('HP',3,VH-14);
  for(let i=0;i<P.maxHealth;i++){
    ctx.fillStyle=i<P.health?'#ff3333':'#2a0000';
    ctx.fillRect(16+i*8,VH-19,6,6);
    if(i<P.health){ ctx.fillStyle='#ff7777'; ctx.fillRect(16+i*8,VH-19,6,1); }
  }
  // Stars
  ctx.fillStyle='#888'; ctx.fillText('★',3,VH-5);
  ctx.fillStyle='#ffdd00'; ctx.fillText(String(P.stars).padStart(2,'0'),12,VH-5);
  // Lives
  ctx.fillStyle='#888'; ctx.fillText('LIVES',30,VH-5);
  ctx.fillStyle='#00ff00'; ctx.fillText('×'+P.lives,52,VH-5);
  // Score
  ctx.fillStyle='#888'; ctx.fillText('SCORE',70,VH-5);
  ctx.fillStyle='#ffff44'; ctx.fillText(String(P.score).padStart(7,'0'),90,VH-5);
  // Objectives
  ctx.fillStyle=P.hasDisk?'#00ff88':'#333'; ctx.fillText('●DISK',130,VH-14);
  ctx.fillStyle=P.hasKeycard?'#00ff88':'#333'; ctx.fillText('●KEY',157,VH-14);
  // Status message
  ctx.fillStyle='#888'; ctx.fillText('F'+(Math.floor(P.y/(TS*10))+1),3,VH-25+3);
  if(!P.hasDisk){
    ctx.fillStyle='#ffaa00'; ctx.fillText('OBJECTIVE: FIND THE DISK (FLOOR 3)',130,VH-5);
  } else if(!P.hasKeycard){
    ctx.fillStyle='#ffff00'; ctx.fillText('FIND THE KEYCARD (FLOOR 2)',138,VH-5);
  } else {
    ctx.fillStyle='#00ff88'; ctx.fillText('REACH THE HELICOPTER ON ROOF!',140,VH-5);
  }

  // Minimap
  const mm={x:VW-40,y:VH-22,w:38,h:20};
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(mm.x,mm.y,mm.w,mm.h);
  ctx.fillStyle='#444'; ctx.fillRect(mm.x,mm.y,mm.w,1); ctx.fillRect(mm.x,mm.y,1,mm.h);
  // Player dot
  const mpx=mm.x+Math.floor((P.x/(MW*TS))*mm.w);
  const mpy=mm.y+Math.floor((P.y/(MH*TS))*mm.h);
  ctx.fillStyle='#00ff00'; ctx.fillRect(mpx,mpy,2,2);
  // Exit dot
  ctx.fillStyle='#00ffcc'; ctx.fillRect(mm.x+Math.floor(72/MW*mm.w),mm.y+Math.floor(4/MH*mm.h),2,1);
  // Disk/keycard dots
  if(!P.hasDisk){ ctx.fillStyle='#00bbcc'; ctx.fillRect(mm.x+Math.floor(43/MW*mm.w),mm.y+Math.floor(33/MH*mm.h),2,1); }
  if(!P.hasKeycard){ ctx.fillStyle='#44ff44'; ctx.fillRect(mm.x+Math.floor(72/MW*mm.w),mm.y+Math.floor(23/MH*mm.h),2,1); }
}

// ─────────────────────────────────────────────────────────────────────────────
// SPLASH SCREEN
// ─────────────────────────────────────────────────────────────────────────────
let splashT=0;
function drawSplash(){
  splashT++;
  // Background
  const g=ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,'#000011'); g.addColorStop(1,'#001108');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  // Stars
  ctx.fillStyle='#ffffff';
  for(let i=0;i<80;i++){
    const sx=(i*137)%VW, sy=(i*97)%(VH*0.6);
    if((splashT+i*13)%50<45) ctx.fillRect(sx,sy,1,1);
  }
  // Scanline overlay
  for(let y=0;y<VH;y+=2){ ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,y,VW,1); }

  // Title
  const titleY=Math.max(30, 50-(splashT*0.4));
  ctx.save();
  ctx.font='bold 16px monospace';
  ctx.fillStyle='#003322'; ctx.fillText('SABOTEUR',VW/2-52,titleY+2);
  ctx.fillStyle='#00ff66'; ctx.fillText('SABOTEUR',VW/2-52,titleY);
  ctx.font='bold 8px monospace';
  ctx.fillStyle='#005522'; ctx.fillText('ENHANCED EDITION',VW/2-44,titleY+16);
  ctx.fillStyle='#44ff88'; ctx.fillText('ENHANCED EDITION',VW/2-44,titleY+15);
  ctx.restore();

  // Divider
  ctx.fillStyle='#00aa44'; ctx.fillRect(20,titleY+22,VW-40,1);
  ctx.fillStyle='#003311'; ctx.fillRect(20,titleY+24,VW-40,1);

  // Animated ninja on splash
  const nY=Math.floor(titleY+38);
  ctx.save();
  ctx.translate(VW/2-6, nY);
  ctx.fillStyle='#111'; ctx.fillRect(1,4,10,12);
  ctx.fillStyle='#c89966'; ctx.fillRect(2,1,8,6);
  ctx.fillStyle='#cc1111'; ctx.fillRect(2,2,8,3);
  ctx.fillStyle='#fff'; ctx.fillRect(6,2,3,1);
  ctx.fillStyle='#111';
  const aR=(splashT>>4)%4;
  ctx.fillRect(2,16,4,4+(aR<2?2:0)); ctx.fillRect(7,16,4,4+(aR>=2?2:0));
  ctx.fillRect(-2,5+(aR<2?1:-1),3,6); ctx.fillRect(11,5-(aR<2?1:-1),3,6);
  ctx.restore();

  // Story lines
  ctx.font='5px monospace';
  const lines=[
    '  You are KAGE — elite shadow operative.',
    '  Infiltrate the enemy research facility.',
    '  Steal the DATA DISK from Floor 3.',
    '  Collect the SECURITY KEYCARD on Floor 2.',
    '  Escape via the HELICOPTER on the ROOF.',
    '  Eliminate or evade guards and attack dogs.',
  ];
  lines.forEach((ln,i)=>{
    const a=Math.min(1,Math.max(0,(splashT-40-i*12)/15));
    if(a<=0) return;
    ctx.globalAlpha=a;
    ctx.fillStyle=i<4?'#aaffaa':'#ffcc66';
    ctx.fillText(ln, VW/2-(ln.length*2.8), nY+28+i*10);
  });
  ctx.globalAlpha=1;

  // Press key blink
  if(splashT>100&&(splashT>>5)&1){
    ctx.fillStyle='#ffff44';
    ctx.font='7px monospace';
    ctx.fillText('— PRESS ANY KEY TO START —',VW/2-60,VH-22);
  }
  // Controls
  ctx.fillStyle='#333'; ctx.font='4px monospace';
  ctx.fillText('← → MOVE  ↑ JUMP  ↓ LADDER  Z KICK  X PUNCH  C THROW STAR',VW/2-76,VH-10);
}

function drawWin(){
  // Dark green bg with particles
  ctx.fillStyle='rgba(0,15,5,0.92)'; ctx.fillRect(0,0,VW,VH);
  for(let i=0;i<40;i++){
    const sx=(i*137+tick*0.5)%VW, sy=(i*113+tick*0.3)%VH;
    ctx.fillStyle=i%3===0?'#00ff66':i%3===1?'#44ffaa':'#ffff44';
    ctx.fillRect(sx,sy,1,1);
  }
  ctx.font='bold 12px monospace';
  ctx.fillStyle='#004422'; ctx.fillText('MISSION COMPLETE!',VW/2-58,VH/2-28);
  ctx.fillStyle='#00ff66'; ctx.fillText('MISSION COMPLETE!',VW/2-58,VH/2-30);
  ctx.fillStyle='#aaffcc'; ctx.font='6px monospace';
  ctx.fillText('KAGE ESCAPES WITH THE DATA!',VW/2-56,VH/2-10);
  ctx.fillStyle='#ffff44'; ctx.font='7px monospace';
  ctx.fillText('FINAL SCORE: '+String(P.score).padStart(7,'0'),VW/2-52,VH/2+8);
  if((tick>>4)&1){
    ctx.fillStyle='#ffffff'; ctx.font='6px monospace';
    ctx.fillText('PRESS ANY KEY TO PLAY AGAIN',VW/2-56,VH/2+26);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// VIGNETTE
// ─────────────────────────────────────────────────────────────────────────────
function drawVignette(){
  const g=ctx.createRadialGradient(VW/2,VH/2,VH*0.25,VW/2,VH/2,VH*0.8);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
}

// ─────────────────────────────────────────────────────────────────────────────
// GAME INIT
// ─────────────────────────────────────────────────────────────────────────────
let gameState='SPLASH';
function initGame(){
  buildMap(); resetPlayer(); spawnEnemies(); spawnItems();
  pfx=[]; stars=[]; camX=0; camY=0;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  tick++;

  if(gameState==='SPLASH'){
    drawSplash();
    if(splashT>80&&anyKey()){ gameState='PLAYING'; initGame(); splashT=0; }
    return;
  }
  if(gameState==='GAMEOVER'){
    drawGameOver();
    if(anyKey()){ gameState='PLAYING'; initGame(); }
    return;
  }
  if(gameState==='WIN'){
    drawWin();
    if(anyKey()){ gameState='SPLASH'; splashT=0; }
    return;
  }

  // ── PLAYING ──────────────────────────────────────────────────────────────
  updatePlayer();
  updateEnemies();
  updateItems();
  updateStars();
  updatePfx();
  updateCamera();

  drawMap();
  drawItems();
  drawEnemies();
  drawStars();
  drawNinja(Math.round(P.x-camX),Math.round(P.y-camY),P.dir,P.state,P.invincible,tick);
  drawPfx();
  drawVignette();
  drawHUD();
}

// Boot
loop();
</script>
</body>
</html>
