function updateEnemies(){
  const CHASE_D=130,ATK_D=14;
  enemies.forEach(e=>{
    if(e.state==='dead'){
      // Let corpses settle on nearby ground once, then persist (no respawn).
      if(!e.corpseSettled){
        e.vx*=0.8;
        moveEntity(e);
        if(e.onGround||Math.abs(e.vy)<0.05)e.corpseSettled=true;
      }
      return;
    }
    if(e.state==='hurt'){
      e.stateTimer--;if(e.stateTimer<=0)e.state=e.health>0?'patrol':'dead';
      moveEntity(e);return;
    }
    const dx=(P.x+PW/2)-(e.x+e.w/2);
    const dy=(P.y+PH/2)-(e.y+e.h/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    const sameFloor=Math.abs(dy)<50;
    const playerVisible=!P.shadowMode;

    if(e.type==='sniper'){
      e.dir=dx>0?1:-1;
      if(e.shootCooldown>0)e.shootCooldown--;
      if(playerVisible&&dist<200&&sameFloor&&e.shootCooldown<=0){
        spawnBullet(e.x+(e.dir>0?e.w+2:-4),e.y+e.h*0.35,e.dir*5.2);
        SFX.shoot();e.shootCooldown=95+Math.random()*30;
      }
      if(P.attackBox&&overlaps(P.attackBox,{x:e.x,y:e.y,w:e.w,h:e.h})){hurtEnemy(e,1,P.dir);P.attackBox=null;}
      moveEntity(e);return;
    }

    const sp=(e.type==='dog'?1.2:e.type==='heavy'?0.4:0.7)*gameSpeed;
    if(e.state==='patrol'){
      e.vx=e.dir*sp;
      if(e.x<=e.patrolMin)e.dir=1;
      if(e.x+e.w>=e.patrolMax)e.dir=-1;
      const fx=e.dir>0?e.x+e.w+2:e.x-2;
      if(!isSolid(Math.floor(fx/TS),Math.floor((e.y+e.h+2)/TS))&&
         !isPlat(Math.floor(fx/TS),Math.floor((e.y+e.h+2)/TS))){e.dir*=-1;}
      if(playerVisible&&dist<CHASE_D&&sameFloor){e.state='chase';e.alertTimer=220;}
    }else{
      e.alertTimer--;
      if(e.alertTimer<=0){e.state='patrol';return;}
      if(playerVisible&&dist<CHASE_D&&sameFloor)e.alertTimer=220;
      if(playerVisible&&sameFloor){e.vx=Math.sign(dx)*(sp*1.5);e.dir=Math.sign(dx)||e.dir;}else{e.vx*=0.65;}
      // Guards shoot while chasing
      if(e.type==='guard'){
        if(e.shootCooldown>0)e.shootCooldown--;
        if(playerVisible&&dist<110&&sameFloor&&e.shootCooldown<=0){
          spawnBullet(e.x+(e.dir>0?e.w+2:-4),e.y+8,e.dir*4.5);
          SFX.shoot();e.shootCooldown=130;
        }
      }
      if(playerVisible&&dist<ATK_D+e.w&&sameFloor&&e.stateTimer<=0){
        e.stateTimer=35;playerHit(e.type==='heavy'?2:1);
      }
    }
    if(e.stateTimer>0)e.stateTimer--;
    const nx=e.x+e.vx;
    if(isSolid(e.vx>0?Math.floor((nx+e.w)/TS):Math.floor(nx/TS),Math.floor((e.y+e.h/2)/TS)))e.dir*=-1;
    moveEntity(e);
    const ft=getT(Math.floor((e.x+e.w/2)/TS),Math.floor((e.y+e.h)/TS));
    if(ft===T_WATER||ft===T_SPIKE)e.state='dead';
    if(P.attackBox&&overlaps(P.attackBox,{x:e.x,y:e.y,w:e.w,h:e.h})){hurtEnemy(e,1,P.dir);P.attackBox=null;}
  });
}

function updateItems(){
  items.forEach(it=>{
    if(it.collected)return;
    it.bob+=0.06;
    if(!overlaps({x:P.x,y:P.y,w:PW,h:PH},{x:it.x,y:it.y,w:it.w,h:it.h}))return;
    it.collected=true;
    switch(it.subtype){
      case 'ammo':     P.stars=Math.min(P.stars+6,20);P.score+=100;spawnPfx(it.x+4,it.y+4,8,'#ffff44');SFX.pickup();break;
      case 'health':   P.health=Math.min(P.health+2,P.maxHealth);P.score+=150;spawnPfx(it.x+4,it.y+4,8,'#ff4444');SFX.pickup();break;
      case 'keycard':
        keycardsFound=Math.min(totalKeycards,keycardsFound+1);
        P.hasKeycard=keycardsFound>=totalKeycards;
        // Pause countdown once every keycard in the level has been found.
        if(P.hasKeycard)missionTimerRunning=false;
        P.score+=500;spawnPfx(it.x+4,it.y+4,14,'#44ff44');SFX.keycard();
        break;
      case 'disk':     P.hasDisk=true;P.score+=1000;spawnPfx(it.x+4,it.y+4,20,'#00ffcc');SFX.disk();break;
      case 'bomb_item':if(!INFINITE_BOMBS)P.bombs=Math.min(P.bombs+2,8);P.score+=200;spawnPfx(it.x+4,it.y+4,10,'#ff8800');SFX.pickup();break;
      case 'shield':   P.shield=300;P.score+=300;spawnPfx(it.x+4,it.y+4,12,'#4488ff');SFX.pickup();break;
      case 'speed':    P.speedBoost=400;P.score+=200;spawnPfx(it.x+4,it.y+4,12,'#88ffff');SFX.pickup();break;
      case 'extralife':P.lives++;P.score+=1000;spawnPfx(it.x+4,it.y+4,20,'#ff88ff');addShake(3);SFX.disk();break;
    }
  });
}

function updateMovPlats(){
  movPlats.forEach(mp=>{
    mp.x+=mp.dir*mp.spd*gameSpeed;
    if(mp.x<=mp.min)mp.dir=1;
    if(mp.x+mp.w>=mp.max)mp.dir=-1;
  });
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
let pfx=[];
function spawnPfx(x,y,n,col){
  for(let i=0;i<n;i++)pfx.push({
    x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5-1.5,
    life:15+Math.random()*20,maxLife:35,col,sz:1+Math.random()*2
  });
}
function updatePfx(){
  for(let i=pfx.length-1;i>=0;i--){
    const p=pfx[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life--;
    if(p.life<=0)pfx.splice(i,1);
  }
}

// ── CAMERA ────────────────────────────────────────────────────────────────────
let camX=0,camY=0;
// Sectioned camera model: horizontal chunks with limited side-scroll plus
// full-screen vertical paging to emulate classic Saboteur-style room traversal.
const SECTION_TILE_W=40;
const SECTION_COUNT_X=Math.ceil(MW/SECTION_TILE_W);
const PAGE_H=VH;
let currentSectionCol=0;
let currentSectionRow=0;

function updateCamera(){
  const px=P.x+PW/2,py=P.y+PH/2;
  const worldW=MW*TS,worldH=MH*TS;

  // Determine which horizontal section and vertical page the player belongs to.
  const nextCol=Math.max(0,Math.min(SECTION_COUNT_X-1,Math.floor(px/(SECTION_TILE_W*TS))));
  const maxRow=Math.max(0,Math.floor((worldH-1)/PAGE_H));
  const nextRow=Math.max(0,Math.min(maxRow,Math.floor(py/PAGE_H)));

  // Snap section/page changes quickly so transitions feel intentional.
  if(nextCol!==currentSectionCol){currentSectionCol=nextCol;}
  if(nextRow!==currentSectionRow){currentSectionRow=nextRow;}

  const secLeft=currentSectionCol*SECTION_TILE_W*TS;
  const secRight=Math.min(worldW,secLeft+SECTION_TILE_W*TS);
  const secWidth=secRight-secLeft;

  // Center on player but keep camera constrained to the current horizontal section.
  let tx=px-VW/2;
  const secMin=secLeft;
  const secMax=Math.max(secMin,secRight-VW);
  tx=Math.max(secMin,Math.min(tx,secMax));

  // If section narrower than viewport (edge-case), lock to section start.
  if(secWidth<=VW)tx=secLeft;

  // Vertical paging is full-screen increments, with slight follow smoothing inside page.
  const pageTop=currentSectionRow*PAGE_H;
  const pageBottom=Math.min(worldH,pageTop+PAGE_H);
  let ty=pageTop;
  if(pageBottom-pageTop>VH){
    const inPageFollow=Math.max(pageTop,Math.min(py-VH/2,pageBottom-VH));
    ty=inPageFollow;
  }

  camX+=(tx-camX)*0.2;
  camY+=(ty-camY)*0.24;

  // Fix standing jitter: when near target and player not moving intentionally,
  // snap camera directly to target to eliminate subpixel shimmer.
  const still=(!keys['ArrowLeft']&&!keys['ArrowRight']&&Math.abs(P.vx)<0.03&&P.onGround);
  if(still&&Math.abs(tx-camX)<0.6)camX=tx;
  if(Math.abs(ty-camY)<0.6)camY=ty;

  camX=Math.max(0,Math.min(camX,worldW-VW));
  camY=Math.max(0,Math.min(camY,worldH-VH));
}

// ── TILE DRAWING ──────────────────────────────────────────────────────────────
let tick=0;
function drawTile(tx,ty,sx,sy){
  const t=getT(tx,ty);if(t===T_EMPTY)return;
  switch(t){
    case T_SOLID:{
      const caveTone=ty>=58;
      ctx.fillStyle=caveTone?'#10233f':'#4a1808';ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle=caveTone?'#091427':'#250a02';ctx.fillRect(sx,sy,TS,1);ctx.fillRect(sx,sy,1,TS);
      ctx.fillStyle=caveTone?'#1d3d66':'#6e2c1a';
      const row=ty%2,off=row?8:0;
      ctx.fillRect(sx+1+off,sy+2,6,5);ctx.fillRect(sx+9+off,sy+2,5,5);
      ctx.fillRect(sx+1+(8-off),sy+9,7,5);ctx.fillRect(sx+9+(off?0:8)%16,sy+9,5,5);
      if(getT(tx,ty-1)!==T_SOLID){ctx.fillStyle=caveTone?'#2f5b8f':'#8a4428';ctx.fillRect(sx,sy,TS,2);}
      break;
    }
    case T_PLAT:{
      ctx.fillStyle='#3a2a10';ctx.fillRect(sx,sy,TS,5);
      ctx.fillStyle='#7a6030';ctx.fillRect(sx,sy,TS,1);
      ctx.fillStyle='#5a4420';ctx.fillRect(sx,sy+1,TS,1);
      ctx.fillStyle='#1a1208';ctx.fillRect(sx,sy+4,TS,1);
      break;
    }
    case T_LADDER:{
      ctx.fillStyle='#5a3a10';
      ctx.fillRect(sx+3,sy,3,TS);ctx.fillRect(sx+10,sy,3,TS);
      ctx.fillStyle='#3a2808';
      for(let r=0;r<TS;r+=4)ctx.fillRect(sx+2,sy+r,12,1);
      ctx.fillStyle='#7a5030';ctx.fillRect(sx+4,sy,1,TS);ctx.fillRect(sx+11,sy,1,TS);
      break;
    }
    case T_WATER:{
      const caveWater=ty>=58;
      ctx.fillStyle=caveWater?'#040d22':'#060c2a';ctx.fillRect(sx,sy,TS,TS);
      const wv=Math.sin(tick*0.07+tx*0.7)*1.5;
      ctx.fillStyle=caveWater?'#113a88':'#0a2060';ctx.fillRect(sx,sy+wv,TS,3);ctx.fillRect(sx,sy+wv+6,TS,2);
      ctx.fillStyle=caveWater?'rgba(35,90,200,0.28)':'rgba(15,50,160,0.25)';ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle=caveWater?'rgba(140,200,255,0.15)':'rgba(80,160,255,0.1)';ctx.fillRect(sx,sy,TS,2);
      break;
    }
    case T_SPIKE:{
      ctx.fillStyle='#282840';ctx.fillRect(sx,sy+TS-4,TS,4);
      ctx.fillStyle='#7878a0';
      for(let s=0;s<TS;s+=4){
        ctx.beginPath();ctx.moveTo(sx+s,sy+TS);ctx.lineTo(sx+s+2,sy+TS-14);ctx.lineTo(sx+s+4,sy+TS);ctx.fill();
        ctx.fillStyle='#ccccdd';ctx.fillRect(sx+s+1,sy+TS-14,1,3);
        ctx.fillStyle='#7878a0';
      }
      break;
    }
    case T_EXIT:{
      ctx.fillStyle='#001a06';ctx.fillRect(sx,sy,TS,TS);
      const pulse=(tick>>2)&3;
      if(P.hasDisk&&P.hasKeycard){
        ctx.fillStyle=pulse<2?'#00ff44':'#00cc33';ctx.fillRect(sx+1,sy+1,TS-2,TS-2);
        ctx.fillStyle='#002d0e';ctx.fillRect(sx+4,sy+4,TS-8,TS-8);
        ctx.fillStyle='rgba(0,255,80,0.35)';ctx.fillRect(sx,sy,TS,TS);
      }else{
        ctx.fillStyle='#003510';ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
        ctx.fillStyle='#001e08';ctx.fillRect(sx+5,sy+5,TS-10,TS-10);
      }
      break;
    }
    case T_CRATE:{
      ctx.fillStyle='#6a3a10';ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle='#4a2808';ctx.fillRect(sx,sy,TS,1);ctx.fillRect(sx,sy,1,TS);
      ctx.fillStyle='#8a5020';ctx.fillRect(sx+1,sy+1,TS-2,TS-2);
      ctx.fillStyle='#5a3010';ctx.fillRect(sx+4,sy,1,TS);ctx.fillRect(sx,sy+4,TS,1);
      ctx.fillStyle='#7a4418';
      ctx.fillRect(sx+2,sy+2,2,2);ctx.fillRect(sx+TS-4,sy+2,2,2);
      ctx.fillRect(sx+2,sy+TS-4,2,2);ctx.fillRect(sx+TS-4,sy+TS-4,2,2);
      break;
    }
  }
}

function drawMap(){
  const outsideView=camY<120;
  // Background gradient — deeper areas shift to dark blue cavern tones.
  const depth=Math.min(1,camY/(MH*TS));
  const r=Math.floor(4+depth*2),g2=Math.floor(8+depth*12),b=Math.floor(18+depth*26);
  ctx.fillStyle=`rgb(${r},${g2},${b})`;ctx.fillRect(0,0,VW,VH);

  // Distant parallax skyline (only visible near roof / outside areas).
  // Movement is camera-driven for true screen-scroll-linked parallax.
  if(outsideView){
    const a=Math.max(0,1-camY/120);
    const skyDrift=((skylineOffsetX%VW)+VW)%VW;
    const bldgs=[[0,155,28,45],[26,142,22,58],[46,138,18,62],[62,150,32,50],[92,128,24,72],
                 [114,143,27,57],[139,133,19,67],[157,148,26,52],[181,143,20,57],
                 [199,126,28,74],[225,138,23,62],[246,146,26,54],[270,152,20,48],[288,143,20,57]];
    ctx.fillStyle=`rgba(6,6,6,${a})`;

    // Draw two passes (wrapped) so drift stays seamless across the screen.
    for(let pass=0;pass<2;pass++){
      const wrapX=(pass*VW)-Math.floor(skyDrift);
      bldgs.forEach(([bx,by,bw,bh])=>ctx.fillRect(bx+wrapX,by,bw,bh));
    }

    // Moon only appears while outside.
    // Moon stays fixed in place per request.
    const moonX=VW-54;
    const moonY=34;
    ctx.fillStyle=`rgba(230,236,255,${a*0.9})`;
    ctx.beginPath();ctx.arc(moonX,moonY,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(162,170,208,${a*0.7})`;
    ctx.beginPath();ctx.arc(moonX-3,moonY-2,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(moonX+3,moonY+2,1.8,0,Math.PI*2);ctx.fill();

    // Simple star field near the top of the outside sky.
    skyStars.forEach((st,idx)=>{
      const twinkle=0.55+((idx+tick*0.04)%6)*0.07;
      ctx.fillStyle=`rgba(235,240,255,${Math.min(1,a*twinkle)})`;
      ctx.fillRect(st.x,st.y,st.sz,st.sz);
    });

    // Lit windows
    ctx.globalAlpha=a*0.5;
    for(let pass=0;pass<2;pass++){
      const wrapX=(pass*VW)-Math.floor(skyDrift);
      bldgs.forEach(([bx,by,bw,bh])=>{
        for(let wy=by+5;wy<VH-2;wy+=7)for(let wx=bx+3;wx<bx+bw-3;wx+=5){
          // Keep skyline windows steady to avoid flicker/distraction.
          if(((wx*13+wy*7)%10)<6){
            ctx.fillStyle=(wx+wy)%3===0?'#ffe088':'#88bbff';
            ctx.fillRect(wx+wrapX,wy,3,4);
          }
        }
      });
    }
    ctx.globalAlpha=1;
  }

  // CRT scanlines
  for(let y=0;y<VH;y+=3){ctx.fillStyle='rgba(0,0,0,0.07)';ctx.fillRect(0,y,VW,1);}

  const tx0=Math.max(0,Math.floor(camX/TS));
  const tx1=Math.min(MW,tx0+Math.ceil(VW/TS)+2);
  const ty0=Math.max(0,Math.floor(camY/TS));
  const ty1=Math.min(MH,ty0+Math.ceil(VH/TS)+2);
  for(let ty=ty0;ty<ty1;ty++)for(let tx=tx0;tx<tx1;tx++)
    drawTile(tx,ty,tx*TS-Math.floor(camX),ty*TS-Math.floor(camY));

  // Moving platforms
  movPlats.forEach(mp=>{
    const sx=Math.round(mp.x-camX),sy=Math.round(mp.y-camY);
    if(sx>-mp.w&&sx<VW&&sy>-8&&sy<VH){
      ctx.fillStyle='#3a2a10';ctx.fillRect(sx,sy,mp.w,mp.h);
      ctx.fillStyle='#7a6030';ctx.fillRect(sx,sy,mp.w,1);
      ctx.fillStyle='#5a4420';ctx.fillRect(sx,sy+1,mp.w,1);
      ctx.fillStyle='#aa8840';
      if(mp.dir>0)ctx.fillRect(sx+mp.w-5,sy+2,3,1);
      else ctx.fillRect(sx+2,sy+2,3,1);
    }
  });
}

// ── SPRITE DRAWING ────────────────────────────────────────────────────────────

// Player — detailed ninja
function drawNinja(sx,sy,dir,state,inv,t){
  if(inv>0&&(t>>1)&1)return;
  ctx.save();ctx.translate(sx+(dir<0?PW:0),sy);if(dir<0)ctx.scale(-1,1);
  // Slower animation sampling so running cycles feel less rushed.
  const fr=t>>4;
  const runAnimating=state==='run'&&(keys['ArrowLeft']||keys['ArrowRight']);
  // Left/right body lean creates readable momentum and direction changes.
  const lean=runAnimating?Math.max(-2,Math.min(2,P.vx*1.35)):0;
  const bob=runAnimating?((fr%2)?1:0):0;

  // Shield aura
  if(P.shield>0){
    ctx.globalAlpha=0.35+Math.sin(t*0.3)*0.15;
    ctx.fillStyle='#3377ff';ctx.fillRect(-3,-3,PW+6,PH+6);
    ctx.globalAlpha=1;
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(1,PH+1,PW-2,2);

  if(P.shadowMode){
    // Shadow stance renders KAGE as a dim silhouette to signal stealth state.
    ctx.globalAlpha=0.45+Math.sin(t*0.2)*0.08;
    ctx.fillStyle='#0d1a2a';ctx.fillRect(1,2,10,17);
    ctx.fillStyle='rgba(120,170,230,0.28)';ctx.fillRect(3,4,6,9);
    ctx.fillStyle='rgba(170,210,255,0.3)';ctx.fillRect(6,6,2,1);
    ctx.globalAlpha=1;
    return ctx.restore();
  }

  // Sprint streaks communicate strong left/right motion without heavy particles.
  if(runAnimating&&Math.abs(P.vx)>1.55){
    const tail=-2;
    ctx.fillStyle='rgba(170,220,255,0.35)';ctx.fillRect(tail,10+(fr%2),3,1);
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillRect(tail-2,12-((fr+1)%2),2,1);
  }

  if(state==='duck'||state==='crawl'){
    const crawlStep=state==='crawl'?(fr%4<2?0:1):0;
    // Crouch idle and crouch-moving are separated to avoid visual flicker.
    ctx.fillStyle='#111';
    ctx.fillRect(0,10,12,6);
    ctx.fillRect(1,14,10,4);
    // Add small leg offsets only while crawling.
    ctx.fillRect(1,17-crawlStep,4,2);
    ctx.fillRect(7,16+crawlStep,4,2);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,7,8,5);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,8,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,8,3,1);
    if(state==='crawl'){ctx.fillStyle='#aa0000';ctx.fillRect(-1,8,2,2);} // scarf trail while moving
    ctx.restore();return;
  }

  // Legs
  ctx.fillStyle='#111';
  if(state==='jump'||state==='fall'){
    ctx.fillRect(2,14,4,5);ctx.fillRect(7,14,4,6);
  }else if(state==='run'){
    const lf=fr%4;
    ctx.fillRect(2,14,4,lf<2?7:4);ctx.fillRect(7,14,4,lf>=2?7:4);
    ctx.fillStyle='#222';ctx.fillRect(2,14+(lf<2?6:3),4,1);ctx.fillRect(7,14+(lf>=2?6:3),4,1);
  }else if(state==='climb'){
    ctx.fillRect(2,14,4,6);ctx.fillRect(7,14,4,6);
  }else{
    ctx.fillRect(2,14,4,6);ctx.fillRect(7,14,4,6);
  }

  if(state==='climb'){
    const al=(t>>3)&1;
    ctx.fillStyle='#111';ctx.fillRect(al?-3:PW,al?2:6,4,6);ctx.fillRect(al?PW:-3,al?6:2,4,6);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }

  if(state==='kick'){
    ctx.fillStyle='#111';ctx.fillRect(-1,6,3,6);
    ctx.fillRect(PW-1,12,13,4);ctx.fillStyle='#333';ctx.fillRect(PW+9,11,4,3);
    ctx.fillRect(2,14,5,5);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }
  if(state==='punch'){
    ctx.fillStyle='#111';ctx.fillRect(PW,4,10,4);ctx.fillRect(PW+6,2,5,4);
    ctx.fillStyle='#c8996a';ctx.fillRect(PW+8,3,4,3);
    ctx.fillStyle='#111';ctx.fillRect(-2,6,3,6);ctx.fillRect(2,14,4,5);ctx.fillRect(7,14,4,5);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }
  if(state==='throw'||state==='bomb_throw'){
    ctx.fillStyle='#111';ctx.fillRect(PW-1,3,9,4);
    const sc=state==='bomb_throw'?'#555':'#ffff22';
    ctx.fillStyle=sc;ctx.fillRect(PW+4,0,5,5);ctx.fillRect(PW+2,2,9,1);
    if(state==='throw'){ctx.fillStyle='#ff8800';ctx.fillRect(PW+6,2,3,1);}
    else{ctx.fillStyle='#ff4400';ctx.fillRect(PW+5,2,2,2);}
    ctx.fillStyle='#111';ctx.fillRect(2,14,4,5);ctx.fillRect(7,14,4,5);ctx.fillRect(-2,6,3,6);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }

  // Body
  const torsoX=1+Math.round(lean*0.6);
  const torsoY=6+bob;
  ctx.fillStyle='#111';ctx.fillRect(torsoX,torsoY,10,9);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(torsoX+2,torsoY+1,3,4);ctx.fillRect(torsoX+6,torsoY+1,3,4);
  ctx.fillStyle='#333';ctx.fillRect(torsoX,torsoY+6,10,2);ctx.fillStyle='#888';ctx.fillRect(torsoX+3,torsoY+6,4,2);
  if(P.turnTimer>0&&state==='run'){
    ctx.fillStyle='rgba(120,220,255,0.35)';ctx.fillRect(torsoX-1,torsoY+2,12,1);
  }

  // Arms
  ctx.fillStyle='#111';
  const aSwing=runAnimating?(fr%2?2:-2):0;
  ctx.fillRect(-2,6+bob+aSwing,3,7);ctx.fillRect(PW-1,6+bob-aSwing,3,7);
  ctx.fillStyle='#c8996a';ctx.fillRect(-2,11+bob+aSwing,3,2);ctx.fillRect(PW-1,11+bob-aSwing,3,2);

  // Scarf
  ctx.fillStyle='#cc0000';ctx.fillRect(0,5+bob,12,3);
  if(runAnimating||state==='jump'){ctx.fillStyle='#aa0000';ctx.fillRect(-2,5+bob+(fr%2),3,2);}

  // Head
  ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
  ctx.fillStyle='#cc1111';ctx.fillRect(2,0,8,4);
  ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);ctx.fillStyle='#000';ctx.fillRect(7,1,1,1);
  ctx.fillStyle='#b07850';ctx.fillRect(2,4,8,2);
  ctx.fillStyle='#111';ctx.fillRect(2,0,2,1);ctx.fillRect(TS-4,0,2,1);

  ctx.restore();
}

// Guard — blue armored soldier
function drawGuard(sx,sy,dir,state,hp,maxHp,t){
  if(state==='dead')return;
  ctx.save();ctx.translate(sx+(dir<0?12:0),sy);if(dir<0)ctx.scale(-1,1);
  const fr=t>>3,hurt=state==='hurt'&&(t>>1)&1;
  const chasing=state==='chase';
  // Breathing and alert bounce make enemies feel alive even while idle.
  const bodyBob=state==='patrol'||state==='chase'?Math.sin(t*0.24)*0.5:Math.sin(t*0.12)*0.35;

  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(1,21,10,2);

  // Legs with clearer alternating gait while patrolling/chasing.
  const lr=state==='patrol'||state==='chase'?fr%2:0;
  ctx.fillStyle=hurt?'#331111':'#0a1844';
  ctx.fillRect(2,15+Math.round(bodyBob),4,5+(lr?3:0));ctx.fillRect(7,15+Math.round(bodyBob),4,5+(lr?0:3));
  ctx.fillStyle='#111';ctx.fillRect(2,19+(lr?4:0)+Math.round(bodyBob),4,1);ctx.fillRect(7,19+(lr?0:4)+Math.round(bodyBob),4,1);

  // Torso armor + tactical chest light.
  const bc=hurt?'#ff4433':'#183888';
  ctx.fillStyle=bc;ctx.fillRect(1,5+Math.round(bodyBob),10,10);
  ctx.fillStyle=hurt?'#ff5544':'#1048aa';ctx.fillRect(3,6+Math.round(bodyBob),6,6);
  ctx.fillStyle='#0a2866';ctx.fillRect(3,8+Math.round(bodyBob),2,3);ctx.fillRect(7,8+Math.round(bodyBob),2,3);
  ctx.fillStyle=(chasing&&((t>>2)&1))?'#ff3344':'#66c8ff';ctx.fillRect(5,10+Math.round(bodyBob),2,1);

  // Arms + rifle with animated muzzle sensor light.
  const armRaise=chasing?1:0;
  ctx.fillStyle=bc;ctx.fillRect(-2,6+Math.round(bodyBob)-armRaise,4,7);ctx.fillRect(10,6+Math.round(bodyBob)-armRaise,4,7);
  ctx.fillStyle='#222';ctx.fillRect(-2,11+Math.round(bodyBob)-armRaise,4,2);ctx.fillRect(10,11+Math.round(bodyBob)-armRaise,4,2);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(12,8+Math.round(bodyBob)-armRaise,10,3);
  ctx.fillStyle='#111';ctx.fillRect(18,7+Math.round(bodyBob)-armRaise,4,3);
  ctx.fillStyle='#333';ctx.fillRect(12,9+Math.round(bodyBob)-armRaise,6,4);
  ctx.fillStyle=chasing?'#ffbb33':'#33ffaa';ctx.fillRect(21,8+Math.round(bodyBob)-armRaise,1,1);

  // Helmet + visor shine scan.
  const hc=hurt?'#ff3322':'#1030bb';
  ctx.fillStyle=hc;ctx.fillRect(0,0+Math.round(bodyBob),12,7);ctx.fillRect(-1,3+Math.round(bodyBob),14,3);
  ctx.fillStyle='#050e30';ctx.fillRect(1,2+Math.round(bodyBob),10,3);
  ctx.fillStyle=((t>>3)&1)?'rgba(120,190,255,0.26)':'rgba(80,140,255,0.12)';ctx.fillRect(1,2+Math.round(bodyBob),10,1);
  ctx.fillStyle='#2040cc';ctx.fillRect(4,0+Math.round(bodyBob),4,1);
  ctx.fillStyle='#c8996a';ctx.fillRect(2,5+Math.round(bodyBob),8,4);
  ctx.fillStyle='#333';ctx.fillRect(5,6+Math.round(bodyBob),4,2);
  ctx.fillStyle='#fff';ctx.fillRect(5,6+Math.round(bodyBob),2,1);ctx.fillRect(8,6+Math.round(bodyBob),1,1);
  ctx.restore();
  if(hp<maxHp){
    ctx.fillStyle='#300';ctx.fillRect(sx,sy-4,12,2);
    ctx.fillStyle='#f44';ctx.fillRect(sx,sy-4,Math.round(12*hp/maxHp),2);
  }
}

// Heavy — massive armored brute
function drawHeavy(sx,sy,dir,state,hp,maxHp,t){
  if(state==='dead')return;
  ctx.save();ctx.translate(sx+(dir<0?16:0),sy);if(dir<0)ctx.scale(-1,1);
  const fr=t>>3,hurt=state==='hurt'&&(t>>1)&1;
  const chasing=state==='chase';
  // Heavy units feel weighty via slower bob and larger stride phase.
  const bodyBob=Math.sin(t*0.16)*0.45;

  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(2,27,12,2);
  const lr=state==='patrol'||state==='chase'?fr%2:0;
  const dc=hurt?'#ff2200':'#222244';
  ctx.fillStyle=dc;ctx.fillRect(1,18+Math.round(bodyBob),6,8+(lr?3:0));ctx.fillRect(9,18+Math.round(bodyBob),6,8+(lr?0:3));
  ctx.fillStyle='#111';ctx.fillRect(1,25+(lr?4:0)+Math.round(bodyBob),6,1);ctx.fillRect(9,25+(lr?0:4)+Math.round(bodyBob),6,1);

  ctx.fillStyle=dc;ctx.fillRect(0,5+Math.round(bodyBob),16,14);
  ctx.fillStyle=hurt?'#ff4400':'#1a1a55';ctx.fillRect(2,6+Math.round(bodyBob),12,10);
  ctx.fillStyle='#333366';ctx.fillRect(4,7+Math.round(bodyBob),8,3);ctx.fillRect(4,12+Math.round(bodyBob),8,3);
  // Reactor core pulses while chasing to telegraph danger.
  ctx.fillStyle=chasing&&((t>>2)&1)?'#ffd166':'#ff4400';ctx.fillRect(6,9+Math.round(bodyBob),4,2);
  ctx.fillStyle=dc;ctx.fillRect(-3,6+Math.round(bodyBob),5,10);ctx.fillRect(14,6+Math.round(bodyBob),5,10);
  ctx.fillStyle='#111';ctx.fillRect(-3,14+Math.round(bodyBob),5,3);ctx.fillRect(14,14+Math.round(bodyBob),5,3);

  // Multi-barrel minigun spin effect uses alternating ring highlights.
  ctx.fillStyle='#1a1a1a';ctx.fillRect(17,8+Math.round(bodyBob),12,5);
  ctx.fillStyle='#333';ctx.fillRect(22,7+Math.round(bodyBob),7,4);
  ctx.fillStyle='#555';ctx.fillRect(17,9+Math.round(bodyBob),5,2);
  const spin=fr%3;
  ctx.fillStyle=spin===0?'#888':spin===1?'#666':'#444';
  ctx.fillRect(27,8+Math.round(bodyBob),2,4);

  // Riot helmet + animated visor reflection.
  ctx.fillStyle=hurt?'#ff3300':'#111133';ctx.fillRect(-1,0+Math.round(bodyBob),18,7);ctx.fillRect(-2,3+Math.round(bodyBob),20,3);
  ctx.fillStyle='#ff4400';ctx.fillRect(1,2+Math.round(bodyBob),14,3);
  ctx.fillStyle=((t>>2)&1)?'rgba(255,190,120,0.38)':'rgba(255,80,0,0.2)';ctx.fillRect(1,2+Math.round(bodyBob),14,1);
  ctx.fillStyle='#fff';ctx.fillRect(6,2+Math.round(bodyBob),2,1);ctx.fillRect(10,2+Math.round(bodyBob),2,1);
  ctx.restore();
  if(hp<maxHp){
    ctx.fillStyle='#300';ctx.fillRect(sx,sy-5,16,3);
    ctx.fillStyle='#f44';ctx.fillRect(sx,sy-5,Math.round(16*hp/maxHp),3);
    ctx.fillStyle='#f88';ctx.fillRect(sx,sy-5,Math.round(16*hp/maxHp),1);
  }
}

// Sniper — camo, crouching with long rifle
function drawSniper(sx,sy,dir,state,hp,maxHp,t){
  if(state==='dead')return;
  ctx.save();ctx.translate(sx+(dir<0?10:0),sy);if(dir<0)ctx.scale(-1,1);
  const fr=t>>3,hurt=state==='hurt'&&(t>>1)&1;
  const chasing=state==='chase';
  const crouchBob=Math.sin(t*0.19)*0.35;

  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(1,23,8,2);
  ctx.fillStyle=hurt?'#ff3300':'#1a3a1a';
  ctx.fillRect(0,16+Math.round(crouchBob),10,6);ctx.fillRect(1,20+Math.round(crouchBob),4,4);ctx.fillRect(6,20+Math.round(crouchBob),4,4);
  ctx.fillRect(1,7+Math.round(crouchBob),8,10);
  ctx.fillStyle='#2a4a2a';ctx.fillRect(2,8+Math.round(crouchBob),3,4);ctx.fillRect(6,8+Math.round(crouchBob),3,4);
  ctx.fillStyle='#0a2a0a';ctx.fillRect(3,12+Math.round(crouchBob),4,3);
  ctx.fillStyle=hurt?'#ff3300':'#1a3a1a';ctx.fillRect(-2,8+Math.round(crouchBob),4,6);ctx.fillRect(8,8+Math.round(crouchBob),4,6);

  // Long rifle gains subtle recoil tick + scope glint pulse.
  const recoil=chasing&&((t>>2)&1)?1:0;
  ctx.fillStyle='#1a1a1a';ctx.fillRect(8+recoil,9+Math.round(crouchBob),18,3);
  ctx.fillStyle='#333';ctx.fillRect(22+recoil,8+Math.round(crouchBob),4,5);
  ctx.fillStyle='#111';ctx.fillRect(24+recoil,8+Math.round(crouchBob),1,1);ctx.fillRect(24+recoil,12+Math.round(crouchBob),1,1);
  ctx.fillStyle=((t>>2)&1)?'#ff3355':'#66ffcc';ctx.fillRect(21+recoil,9+Math.round(crouchBob),1,1);

  // Head ghillie with animated fiber tufts.
  ctx.fillStyle=hurt?'#ff3300':'#2a4a2a';ctx.fillRect(0,1+Math.round(crouchBob),10,8);
  ctx.fillStyle='#1a3a1a';ctx.fillRect(1,0+Math.round(crouchBob),8,4);
  ctx.fillStyle='#c8996a';ctx.fillRect(2,4+Math.round(crouchBob),6,4);
  ctx.fillStyle='#333';ctx.fillRect(3,5+Math.round(crouchBob),4,2);ctx.fillStyle='#fff';ctx.fillRect(3,5+Math.round(crouchBob),2,1);
  const tuft=fr%2;
  ctx.fillStyle='#2a5a2a';ctx.fillRect(-1,0+Math.round(crouchBob),2,3+tuft);ctx.fillRect(9,0+Math.round(crouchBob),2,3+(1-tuft));ctx.fillRect(3,0+Math.round(crouchBob),2,2+tuft);
  ctx.restore();
  if(hp<maxHp){
    ctx.fillStyle='#300';ctx.fillRect(sx,sy-4,10,2);
    ctx.fillStyle='#f44';ctx.fillRect(sx,sy-4,Math.round(10*hp/maxHp),2);
  }
}

// Dog — aggressive guard dog with red eyes
function drawDog(sx,sy,dir,state,t){
  if(state==='dead')return;
  ctx.save();ctx.translate(sx+(dir<0?14:0),sy);if(dir<0)ctx.scale(-1,1);
  const fr=t>>3,hurt=state==='hurt'&&(t>>1)&1;
  const chasing=state==='chase';

  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(2,12,10,2);
  // Four-leg gallop pattern improves readability when chasing.
  const gait=fr%4;
  const legHeights=chasing?
    [gait===0?5:3,gait===1?5:3,gait===2?5:3,gait===3?5:3]:
    [4,3,4,3];
  ctx.fillStyle=hurt?'#ff6622':'#4a2808';
  [[1,7],[4,7],[7,7],[10,7]].forEach(([lx,ly],i)=>ctx.fillRect(lx,ly,2,legHeights[i]));

  // Torso and spine stripe for better silhouette.
  ctx.fillStyle=hurt?'#ff8844':'#6a3810';ctx.fillRect(2,3,10,6);
  ctx.fillStyle=hurt?'#ff6622':'#4a2808';ctx.fillRect(3,4,8,4);
  ctx.fillStyle='#8a4a14';ctx.fillRect(4,3,6,1);

  // Head + animated jaw (open wider while chasing).
  const jawDrop=chasing?((t>>2)&1):0;
  ctx.fillStyle=hurt?'#ff8844':'#6a3810';ctx.fillRect(9,0,5,5);ctx.fillRect(11,3+jawDrop,5,3);
  ctx.fillStyle='#111';ctx.fillRect(14,3+jawDrop,2,2);
  ctx.fillStyle='#fff';ctx.fillRect(10,1,2,2);
  ctx.fillStyle=chasing&&((t>>2)&1)?'#ff4444':'#f00';ctx.fillRect(10,1,1,1); // red eye pulse
  ctx.fillStyle='#4a2808';ctx.fillRect(9,0,2,3);
  ctx.fillStyle='#fff';ctx.fillRect(12,5+jawDrop,1,2);ctx.fillRect(14,5+jawDrop,1,2);

  // Tail wagging becomes sharper during chase.
  ctx.fillStyle='#6a3810';
  if(state==='patrol'){
    ctx.fillRect(-2,1+(gait%2),3,2);
  }else{
    ctx.fillRect(-3,-1+(gait%2),3,2);ctx.fillRect(-1,1,2,2);
  }

  // Collar + blinking tracker LED.
  ctx.fillStyle='#880000';ctx.fillRect(9,4,5,2);
  ctx.fillStyle=((t>>2)&1)?'#ff3344':'#ff0000';ctx.fillRect(11,4,1,2);
  ctx.restore();
}

// ── ITEM DRAWING ──────────────────────────────────────────────────────────────
function drawItems(){
  items.forEach(it=>{
    if(it.collected)return;
    const sx=Math.round(it.x-camX),sy=Math.round(it.y-camY+Math.sin(it.bob)*2);
    if(sx<-16||sx>VW+16||sy<-16||sy>VH+16)return;
    const p=(tick>>2)&1;
    switch(it.subtype){
      case 'ammo':
        ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(sx+4,sy+4,4,0,6.28);ctx.fill();
        ctx.fillStyle='#fff';ctx.fillRect(sx+2,sy+3,4,2);
        ctx.fillStyle='#cc8800';ctx.fillRect(sx+3,sy+1,2,2);break;
      case 'health':
        ctx.fillStyle=p?'#ff2222':'#ff4444';
        ctx.fillRect(sx+1,sy+3,6,2);ctx.fillRect(sx+3,sy+1,2,6);
        ctx.fillStyle='#ff9999';ctx.fillRect(sx+2,sy+3,2,1);ctx.fillRect(sx+3,sy+2,1,2);break;
      case 'keycard':
        ctx.fillStyle='#44ff44';ctx.fillRect(sx,sy,8,6);
        ctx.fillStyle='#002200';ctx.fillRect(sx+1,sy+1,4,4);
        ctx.fillStyle='#00ff00';ctx.fillRect(sx+5,sy+2,2,2);
        ctx.fillStyle='#88ff88';ctx.fillRect(sx+1,sy+1,3,1);break;
      case 'disk':
        ctx.fillStyle=p?'#00eeff':'#00bbcc';
        ctx.beginPath();ctx.arc(sx+4,sy+4,4,0,6.28);ctx.fill();
        ctx.fillStyle='#003344';ctx.beginPath();ctx.arc(sx+4,sy+4,2,0,6.28);ctx.fill();
        ctx.fillStyle='#00ffff';ctx.fillRect(sx+3,sy,2,2);break;
      case 'bomb_item':
        ctx.fillStyle='#333';ctx.beginPath();ctx.arc(sx+4,sy+5,4,0,6.28);ctx.fill();
        ctx.fillStyle='#222';ctx.fillRect(sx+3,sy,2,4);
        ctx.fillStyle=p?'#ffff00':'#ff8800';ctx.fillRect(sx+3,sy,2,1);break;
      case 'shield':
        ctx.fillStyle=p?'#4488ff':'#2266dd';
        ctx.fillRect(sx+1,sy,6,7);ctx.fillRect(sx,sy+2,8,4);
        ctx.fillStyle='#aaccff';ctx.fillRect(sx+2,sy+1,4,1);break;
      case 'speed':
        ctx.fillStyle=p?'#88ffff':'#44aaaa';
        ctx.fillRect(sx+2,sy,4,8);ctx.fillRect(sx,sy+3,8,2);
        ctx.fillStyle='#fff';ctx.fillRect(sx+3,sy+1,2,1);break;
      case 'extralife':
        ctx.fillStyle=p?'#ff88ff':'#cc44cc';
        ctx.fillRect(sx+2,sy,4,4);ctx.fillRect(sx,sy+2,8,4);ctx.fillRect(sx+3,sy+5,2,3);
        ctx.fillStyle='#ffccff';ctx.fillRect(sx+3,sy+1,2,1);break;
    }
    // Subtle glow
    ctx.globalAlpha=0.18+Math.sin(it.bob)*0.08;
    ctx.fillStyle='#ffffff';ctx.fillRect(sx-1,sy-1,10,10);
    ctx.globalAlpha=1;
  });
}

function drawStars(){
  stars.forEach(s=>{
    const sx=Math.round(s.x-camX),sy=Math.round(s.y-camY);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(tick*0.4);
    ctx.fillStyle='#ffff22';ctx.fillRect(-4,-1,8,2);ctx.fillRect(-1,-4,2,8);
    ctx.rotate(0.785);ctx.fillStyle='#ffcc00';ctx.fillRect(-3,-1,6,2);ctx.fillRect(-1,-3,2,6);
    ctx.fillStyle='#fff';ctx.fillRect(-1,-1,2,2);
    ctx.restore();
  });
}

function drawBombs(){
  bombs.forEach(b=>{
    const sx=Math.round(b.x-camX),sy=Math.round(b.y-camY);
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(sx,sy,4,0,6.28);ctx.fill();
    ctx.fillStyle='#555';ctx.fillRect(sx-1,sy-4,2,4);
    ctx.fillStyle=(tick>>1)&1?'#ffff00':'#ff8800';ctx.fillRect(sx-1,sy-4,2,2);
  });
}

function drawBullets(){
  bullets.forEach(b=>{
    const sx=Math.round(b.x-camX),sy=Math.round(b.y-camY);
    ctx.fillStyle='#ffaa00';ctx.fillRect(sx-3,sy-1,5,2);
    ctx.fillStyle='#ffff88';ctx.fillRect(sx-1,sy,2,1);
  });
}

function drawPfx(){
  pfx.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.col;
    ctx.fillRect(Math.round(p.x-camX),Math.round(p.y-camY),Math.ceil(p.sz),Math.ceil(p.sz));
  });
  ctx.globalAlpha=1;
}

function drawEnemies(){
  enemies.forEach(e=>{
    const sx=Math.round(e.x-camX),sy=Math.round(e.y-camY);
    if(sx<-40||sx>VW+40||sy<-40||sy>VH+40)return;
    if(e.state==='dead'){
      // Render defeated enemies as solid red heaps with a white skull marker.
      const poolW=Math.max(8,e.bloodSize||9),poolH=Math.max(3,Math.round(poolW*0.42));
      ctx.fillStyle='#7a0000';ctx.fillRect(sx-1,sy+e.h-poolH,poolW,poolH+1);
      ctx.fillStyle='#b30000';ctx.fillRect(sx+1,sy+e.h-poolH+1,Math.max(4,poolW-4),Math.max(2,poolH-1));
      // White skull icon on top of the red heap.
      const skullX=sx+Math.floor(poolW*0.45),skullY=sy+e.h-poolH-6;
      ctx.fillStyle='#ffffff';
      ctx.fillRect(skullX,skullY,4,3);
      ctx.fillRect(skullX+1,skullY+3,2,2);
      ctx.fillStyle='#000000';
      ctx.fillRect(skullX+1,skullY+1,1,1);
      ctx.fillRect(skullX+2,skullY+1,1,1);
      return;
    }
    if(e.type==='guard')drawGuard(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    else if(e.type==='dog')drawDog(sx,sy,e.dir,e.state,tick);
    else if(e.type==='heavy')drawHeavy(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    else if(e.type==='sniper')drawSniper(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    // Alert indicator
    if(e.state==='chase'){
      ctx.fillStyle='#ff0000';ctx.font='7px monospace';
      ctx.fillText('!',(e.alertTimer%18<9)?sx+e.w/2-2:sx+e.w/2-1,sy-10);
    }
  });
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.font='5px monospace';

  // Bottom bar
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,VH-28,VW,28);
  ctx.fillStyle='#0a0a00';ctx.fillRect(0,VH-29,VW,1);

  // Health pips
  ctx.fillStyle='#555';ctx.fillText('HP',2,VH-18);
  for(let i=0;i<P.maxHealth;i++){
    const hx=15+i*9,hy=VH-23;
    ctx.fillStyle=i<P.health?(P.health<=2?'#ff2200':P.health<=4?'#ff8800':'#ff3333'):'#180000';
    ctx.fillRect(hx,hy,7,6);
    if(i<P.health){ctx.fillStyle='rgba(255,200,200,0.4)';ctx.fillRect(hx,hy,7,1);}
  }

  // Stars
  ctx.fillStyle='#666';ctx.fillText('STAR',2,VH-8);
  ctx.fillStyle=P.stars>4?'#ffdd00':'#ff4400';
  ctx.fillText(String(P.stars).padStart(2,'0'),20,VH-8);

  // Bombs
  ctx.fillStyle='#666';ctx.fillText('BOM',28,VH-8);
  ctx.fillStyle=(INFINITE_BOMBS||P.bombs>0)?'#ff8800':'#333';
  ctx.fillText(INFINITE_BOMBS?'∞':('x'+P.bombs),44,VH-8);
  const bombCooldownRemainingMs=getBombCooldownRemainingMs();
  const bombReady=bombCooldownRemainingMs===0;
  // Inline cooldown status acts as a compact tooltip for bomb availability.
  ctx.fillStyle=bombReady?'#44ff66':'#ff8844';
  ctx.fillText(bombReady?'RDY':(bombCooldownRemainingMs/1000).toFixed(1)+'s',52,VH-8);
  ctx.fillStyle='#1b1b1b';ctx.fillRect(28,VH-4,36,2);
  const coolFrac=1-(bombCooldownRemainingMs/BOMB_COOLDOWN_MS);
  ctx.fillStyle=bombReady?'#44ff88':'#ffaa44';ctx.fillRect(28,VH-4,Math.max(0,Math.floor(36*coolFrac)),2);

  // Lives
  ctx.fillStyle='#666';ctx.fillText('x',52,VH-18);
  ctx.fillStyle='#00cc00';ctx.fillText(P.lives,58,VH-18);

  // Score
  ctx.fillStyle='#555';ctx.fillText('SCORE',64,VH-18);
  ctx.fillStyle='#ffff44';ctx.fillText(String(P.score).padStart(8,'0'),88,VH-18);

  // Objectives row
  ctx.fillStyle=P.hasDisk?'#00ff88':'#222';ctx.fillText('[DISK]',64,VH-8);
  ctx.fillStyle=P.hasKeycard?'#44ff44':'#222';ctx.fillText('[KEY]',100,VH-8);

  // Mission countdown timer. Stops once all keycards are collected.
  const totalSec=Math.ceil(Math.max(0,missionTimeLeftMs)/1000);
  const mm=String(Math.floor(totalSec/60)).padStart(2,'0');
  const ss=String(totalSec%60).padStart(2,'0');
  ctx.fillStyle='#666';ctx.fillText('⏱',132,VH-28);
  ctx.fillStyle=missionTimeLeftMs<=60000?'#ff4422':'#aaffaa';
  ctx.fillText(mm+':'+ss,140,VH-28);

  // Status message
  if(!P.hasDisk){
    ctx.fillStyle='#ffaa00';ctx.fillText('OBJECTIVE: FIND THE DATA DISK — Floor 3',132,VH-18);
  }else if(!P.hasKeycard){
    ctx.fillStyle='#ffff00';ctx.fillText('OBJECTIVE: FIND THE KEYCARD — Floor 2',132,VH-18);
  }else{
    ctx.fillStyle=(tick>>4)&1?'#00ff88':'#00bb66';
    ctx.fillText('REACH THE HELICOPTER ON THE ROOF!',132,VH-18);
  }
  ctx.fillStyle='#444';ctx.fillText('FLOOR '+(Math.min(7,Math.floor(P.y/(TS*10))+1)),132,VH-8);
  // Zone badge clarifies current section/page in room-based traversal mode.
  const zone='ZONE '+String.fromCharCode(65+currentSectionCol)+'-'+(currentSectionRow+1);
  ctx.fillStyle='#5d7384';ctx.fillText(zone,176,VH-28);

  // Active powerups
  if(P.shield>0){
    ctx.fillStyle='#4488ff';ctx.fillText('SHIELD',180,VH-8);
    ctx.fillStyle='rgba(68,136,255,0.5)';ctx.fillRect(0,0,Math.ceil(VW*P.shield/300),1);
  }
  if(P.speedBoost>0){ctx.fillStyle='#88ffff';ctx.fillText('SPEED',212,VH-8);}
  if(P.shadowMode){ctx.fillStyle=(tick>>2)&1?'#8fb8ff':'#5b7fd1';ctx.fillText('SHADOW',246,VH-8);}

  // Combo
  if(P.combo>=2&&P.comboTimer>0){
    ctx.globalAlpha=Math.min(1,P.comboTimer/40);
    ctx.font='bold 8px monospace';
    ctx.fillStyle='#ffff00';ctx.fillText(P.combo+'x COMBO!',VW/2-32,28);
    ctx.globalAlpha=1;ctx.font='5px monospace';
  }

  // Minimap
  const mini={x:VW-42,y:VH-27,w:40,h:24};
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(mini.x,mini.y,mini.w,mini.h);
  ctx.fillStyle='#222';ctx.fillRect(mini.x,mini.y,mini.w,1);ctx.fillRect(mini.x,mini.y,1,mini.h);
  ctx.fillStyle='#00ff00';
  ctx.fillRect(mini.x+Math.floor((P.x/(MW*TS))*mini.w),mini.y+Math.floor((P.y/(MH*TS))*mini.h),2,2);
  ctx.fillStyle='#00ffcc';
  ctx.fillRect(mini.x+Math.floor(94/MW*mini.w),mini.y+Math.floor(4/MH*mini.h),2,1);
  if(!P.hasDisk){ctx.fillStyle='#00ccff';ctx.fillRect(mini.x+Math.floor(53/MW*mini.w),mini.y+Math.floor(33/MH*mini.h),2,1);}
  if(!P.hasKeycard){ctx.fillStyle='#44ff44';ctx.fillRect(mini.x+Math.floor(90/MW*mini.w),mini.y+Math.floor(23/MH*mini.h),2,1);}
}


function drawRain(){
  // Rain/scan pass adds motion and depth without expensive particle counts.
  ctx.globalAlpha=0.32;
  for(const drop of rain){
    ctx.fillStyle=drop.c;
    ctx.fillRect(Math.round(drop.x),Math.round(drop.y),1,drop.len);
    ctx.fillRect(Math.round(drop.x-1),Math.round(drop.y+drop.len-1),1,1);
  }
  ctx.globalAlpha=1;
}

function drawPauseOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.58)';ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle='#0d1a12';ctx.fillRect(VW/2-55,VH/2-20,110,40);
  ctx.strokeStyle='#2bcf7f';ctx.strokeRect(VW/2-55.5,VH/2-20.5,111,41);
  ctx.font='bold 8px monospace';ctx.fillStyle='#a8ffd6';ctx.fillText('PAUSED',VW/2-15,VH/2-4);
  ctx.font='5px monospace';ctx.fillStyle='#7ec7a1';ctx.fillText('Press P or click Resume',VW/2-35,VH/2+10);
}

function drawHelpOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.74)';ctx.fillRect(10,10,VW-20,VH-20);
  ctx.strokeStyle='#3f6780';ctx.strokeRect(10.5,10.5,VW-21,VH-21);
  ctx.font='bold 6px monospace';ctx.fillStyle='#9bd5ff';ctx.fillText('QUICK OPS GUIDE',18,24);
  ctx.font='5px monospace';
  const lines=[
    '🧭 Objective: collect DISK + KEYCARD, then reach rooftop helicopter.',
    '⚔ Combat: Z/X/C attack, B throws a bomb when cooldown is ready.',
    '🪜 Ladders: use UP/DOWN to climb slowly and reposition safely.',
    '💡 Tip: hold DOWN while still to enter SHADOW and evade NPC detection.',
    '⌨ P pause · H help · M mute. Use speed presets on title screen.'
  ];
  lines.forEach((line,i)=>{ctx.fillStyle=i===0?'#d8f0ff':'#9eb4c2';ctx.fillText(line,18,36+i*12);});
}


function drawCavernTorches(){
  // Draw compact torch sprites only when the camera is deep enough underground.
  if(camY<TS*50)return;
  cavernTorches.forEach(ti=>{
    const sx=Math.round(ti.x*TS-camX),sy=Math.round(ti.y*TS-camY);
    if(sx<-10||sx>VW+10||sy<-20||sy>VH+20)return;
    ctx.fillStyle='#3f2a14';ctx.fillRect(sx+7,sy+6,2,8);
    const flick=0.55+Math.sin(tick*0.18+ti.flicker*6)*0.25;
    ctx.fillStyle=flick>0.62?'#ffd27a':'#ff9f3a';ctx.fillRect(sx+6,sy+3,4,4);
    ctx.fillStyle='#ff5f22';ctx.fillRect(sx+7,sy+2,2,2);
  });
}

function drawBloomFX(){
  // Lightweight additive bloom pass for bright gameplay elements.
  ctx.save();
  ctx.globalCompositeOperation='lighter';

  // Torch glow in caverns.
  cavernTorches.forEach(ti=>{
    const sx=Math.round(ti.x*TS+8-camX),sy=Math.round(ti.y*TS+6-camY);
    if(sx<-32||sx>VW+32||sy<-32||sy>VH+32)return;
    const r=18+Math.sin(tick*0.16+ti.flicker*4)*4;
    const g=ctx.createRadialGradient(sx,sy,1,sx,sy,r);
    g.addColorStop(0,'rgba(255,190,90,0.34)');
    g.addColorStop(0.4,'rgba(255,110,40,0.2)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(sx-r,sy-r,r*2,r*2);
  });

  // Player lantern-like personal glow keeps movement readable in dark regions.
  const px=Math.round(P.x+PW/2-camX),py=Math.round(P.y+PH/2-camY);
  const pg=ctx.createRadialGradient(px,py,2,px,py,52);
  pg.addColorStop(0,'rgba(180,220,255,0.26)');pg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=pg;ctx.fillRect(px-52,py-52,104,104);

  // Bright projectile effects get tiny bloom halos.
  stars.forEach(st=>{
    const sx=Math.round(st.x-camX),sy=Math.round(st.y-camY),r=10;
    const g=ctx.createRadialGradient(sx,sy,1,sx,sy,r);
    g.addColorStop(0,'rgba(255,245,140,0.4)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(sx-r,sy-r,r*2,r*2);
  });
  bullets.forEach(b=>{
    const sx=Math.round(b.x-camX),sy=Math.round(b.y-camY),r=8;
    const g=ctx.createRadialGradient(sx,sy,1,sx,sy,r);
    g.addColorStop(0,'rgba(255,180,80,0.35)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(sx-r,sy-r,r*2,r*2);
  });
  ctx.restore();
}

function drawDarknessMask(){
  // Deep underground: darken scene but preserve playable visibility with FOV cones.
  const undergroundFactor=Math.max(0,Math.min(1,(camY-TS*44)/(TS*18)));
  if(undergroundFactor<=0)return;

  ctx.save();
  // Keep ambient darkness readable; avoid over-black coverage.
  const darkness=0.18+undergroundFactor*0.28;
  ctx.fillStyle=`rgba(2,8,18,${darkness.toFixed(3)})`;
  ctx.fillRect(0,0,VW,VH);

  // Add subtle blue cave haze so dark areas are visible, not pure black.
  const haze=ctx.createLinearGradient(0,0,0,VH);
  haze.addColorStop(0,'rgba(20,38,70,0.06)');
  haze.addColorStop(1,'rgba(8,20,44,0.16)');
  ctx.fillStyle=haze;ctx.fillRect(0,0,VW,VH);

  ctx.globalCompositeOperation='destination-out';

  function punchLight(sx,sy,r,intensity=0.94){
    const g=ctx.createRadialGradient(sx,sy,1,sx,sy,r);
    g.addColorStop(0,`rgba(0,0,0,${intensity})`);
    g.addColorStop(0.55,'rgba(0,0,0,0.45)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(sx-r,sy-r,r*2,r*2);
  }

  function punchFovCone(sx,sy,dir){
    // Directional field-of-view cone increases perceived vision range.
    const len=88;
    const halfW=42;
    const tipX=sx+dir*len;
    ctx.beginPath();
    ctx.moveTo(sx,sy-6);
    ctx.lineTo(tipX,sy-halfW);
    ctx.lineTo(tipX,sy+halfW);
    ctx.lineTo(sx,sy+6);
    ctx.closePath();
    const g=ctx.createLinearGradient(sx,sy,tipX,sy);
    g.addColorStop(0,'rgba(0,0,0,0.75)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.fill();
  }

  const px=Math.round(P.x+PW/2-camX),py=Math.round(P.y+PH/2-camY);
  // Player carries strongest local light to keep controls intuitive.
  punchLight(px,py,74,0.98);
  punchFovCone(px,py,P.dir||1);

  // Torches reveal cave corridors and create navigation breadcrumbs.
  cavernTorches.forEach(ti=>punchLight(Math.round(ti.x*TS+8-camX),Math.round(ti.y*TS+8-camY),42,0.9));

  // Exit pad receives extra illumination once objective is complete.
  if(P.hasDisk&&P.hasKeycard)punchLight(Math.round(97*TS-camX),Math.round(4*TS-camY),52,0.9);
  ctx.restore();
}

// ── VIGNETTE ──────────────────────────────────────────────────────────────────
function drawVignette(){
  const g=ctx.createRadialGradient(VW/2,VH/2,VH*0.2,VW/2,VH/2,VH*0.8);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=g;ctx.fillRect(0,0,VW,VH);
}

// ── SPLASH SCREEN ─────────────────────────────────────────────────────────────
let splashT=0;
function drawSplash(){
  splashT++;
  ctx.fillStyle='#000';ctx.fillRect(0,0,VW,VH);

  // Star field
  for(let i=0;i<110;i++){
    const sx=(i*137)%VW,sy=(i*97)%(VH*0.7);
    if((splashT+i*11)%70<63){
      ctx.globalAlpha=0.2+((i*37)%10)*0.08;
      ctx.fillStyle='#fff';ctx.fillRect(sx,sy,1,1);
    }
  }
  ctx.globalAlpha=1;

  // City silhouette
  const bldgs=[[0,155,28,45],[25,143,22,57],[46,138,18,62],[62,150,32,50],
               [92,128,24,72],[114,143,27,57],[139,133,19,67],[157,147,26,53],
               [181,144,20,56],[199,126,28,74],[225,138,23,62],[246,146,26,54],
               [270,152,20,48],[288,143,20,57]];
  ctx.fillStyle='#080808';
  bldgs.forEach(([bx,by,bw,bh])=>ctx.fillRect(bx,by,bw,bh));
  // Windows flicker
  bldgs.forEach(([bx,by,bw,bh])=>{
    for(let wy=by+5;wy<VH-2;wy+=7)for(let wx=bx+3;wx<bx+bw-3;wx+=5){
      if((splashT*0.015+wx*0.3+wy*0.2)%1<0.62){
        ctx.fillStyle=(wx+wy)%3===0?'#ffe070':'#6699ff';
        ctx.globalAlpha=0.55;ctx.fillRect(wx,wy,3,4);ctx.globalAlpha=1;
      }
    }
  });

  // Scanlines
  for(let y=0;y<VH;y+=3){ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,y,VW,1);}

  // Title glow
  const titleY=Math.max(32,55-splashT*0.55);
  ctx.save();
  // glow layers
  for(let g=4;g>0;g--){
    ctx.globalAlpha=0.08/g;ctx.fillStyle='#00ff66';ctx.font=`bold ${18+g*2}px monospace`;
    ctx.fillText('SABOTEUR',VW/2-54-g,titleY+g);
  }
  ctx.globalAlpha=1;
  ctx.font='bold 16px monospace';
  ctx.fillStyle='#004422';ctx.fillText('SABOTEUR',VW/2-54,titleY+1);
  ctx.fillStyle='#00ff66';ctx.fillText('SABOTEUR',VW/2-54,titleY);
  ctx.font='bold 7px monospace';
  ctx.fillStyle='#006633';ctx.fillText('II — SHADOW OPERATIVE',VW/2-52,titleY+14);
  ctx.fillStyle='#44ff88';ctx.fillText('II — SHADOW OPERATIVE',VW/2-52,titleY+13);
  ctx.restore();

  // Divider
  const dw=Math.min(VW-40,splashT*4);
  ctx.fillStyle='#00aa44';ctx.fillRect(VW/2-dw/2,titleY+20,dw,1);
  ctx.fillStyle='#003311';ctx.fillRect(VW/2-dw/2,titleY+22,dw,1);

  // Ninja silhouette
  const nY=Math.floor(titleY+40);
  if(splashT>15){
    ctx.save();ctx.translate(VW/2-6,nY);
    ctx.fillStyle='#111';ctx.fillRect(1,4,10,12);
    ctx.fillStyle='#c89966';ctx.fillRect(2,1,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,2,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,2,3,1);
    ctx.fillStyle='#aa0000';ctx.fillRect(1,6,10,2);
    const aR=(splashT>>4)%4;
    ctx.fillStyle='#111';
    ctx.fillRect(2,16,4,4+(aR<2?2:0));ctx.fillRect(7,16,4,4+(aR>=2?2:0));
    ctx.fillRect(-2,5+(aR<2?1:-1),3,6);ctx.fillRect(11,5-(aR<2?1:-1),3,6);
    ctx.restore();
  }

  // Briefing text
  ctx.font='5px monospace';
  const lines=[
    {t:'  MISSION BRIEFING:',c:'#88ff88'},
    {t:'  You are KAGE — elite shadow operative.',c:'#aaffaa'},
    {t:'  Infiltrate the 7-floor research facility.',c:'#aaffaa'},
    {t:'  Steal the DATA DISK from Floor 3.',c:'#aaffaa'},
    {t:'  Collect the SECURITY KEYCARD on Floor 2.',c:'#aaffaa'},
    {t:'  Escape via the HELICOPTER on the ROOF.',c:'#ffcc66'},
    {t:'  Eliminate guards, dogs, snipers and heavies.',c:'#ffcc66'},
  ];
  lines.forEach((ln,i)=>{
    const a=Math.min(1,Math.max(0,(splashT-55-i*14)/18));
    if(a<=0)return;
    ctx.globalAlpha=a;ctx.fillStyle=ln.c;
    ctx.fillText(ln.t,VW/2-(ln.t.length*2.9),nY+28+i*10);
  });
  ctx.globalAlpha=1;

  // Speed selection menu
  if(splashT>100){
    ctx.font='6px monospace';
    ctx.fillStyle='#ffcc44';ctx.fillText('SELECT GAME SPEED:',VW/2-45,VH-38);
    ctx.font='5px monospace';
    // Slow
    const slowCol=gameSpeed===0.42?'#00ff44':'#aaaaaa';
    ctx.fillStyle=slowCol;ctx.fillRect(VW/2-75,VH-32,30,8);
    ctx.fillStyle='#000';ctx.font='5px monospace';ctx.fillText('SLOW',VW/2-73,VH-26);
    // Normal
    const normCol=gameSpeed===0.78?'#00ff44':'#aaaaaa';
    ctx.fillStyle=normCol;ctx.fillRect(VW/2-40,VH-32,30,8);
    ctx.fillStyle='#000';ctx.fillText('NORMAL',VW/2-38,VH-26);
    // Fast
    const fastCol=gameSpeed===1.0?'#00ff44':'#aaaaaa';
    ctx.fillStyle=fastCol;ctx.fillRect(VW/2-5,VH-32,30,8);
    ctx.fillStyle='#000';ctx.fillText('FAST',VW/2-2,VH-26);
    // Instructions
    ctx.fillStyle='#777';ctx.font='4px monospace';
    ctx.fillText('Press 1, 2, or 3 to select speed',VW/2-52,VH-18);
  }

  // Controls
  ctx.fillStyle='#1a1a1a';ctx.font='4px monospace';
  ctx.fillText('← → MOVE/LEAP OFF LADDER | SHIFT SPRINT | ↑/SPC JUMP | ↑/↓ LADDER SLOW | Z/X/C ATTACK ON LADDER',VW/2-117,VH-12);

  // Press key blink
  if(splashT>90&&(splashT>>4)&1){
    ctx.fillStyle='#ffff44';ctx.font='7px monospace';
    ctx.fillText('— PRESS ANY KEY TO BEGIN —',VW/2-64,VH-23);
  }
}

// ── GAME OVER / WIN ───────────────────────────────────────────────────────────
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,VW,VH);
  for(let y=0;y<VH;y+=2){ctx.fillStyle='rgba(70,0,0,0.14)';ctx.fillRect(0,y,VW,1);}
  if(tick%7===0){ctx.fillStyle='rgba(255,0,0,0.08)';ctx.fillRect(0,Math.random()*VH,VW,2);}
  ctx.font='bold 14px monospace';
  ctx.fillStyle='#550000';ctx.fillText('MISSION FAILED',VW/2-56,VH/2-24);
  ctx.fillStyle='#cc2200';ctx.fillText('MISSION FAILED',VW/2-56,VH/2-25);
  ctx.fillStyle='#ff4422';ctx.fillText('MISSION FAILED',VW/2-56,VH/2-26);
  ctx.font='6px monospace';
  const failMsg=missionTimeout?'MISSION TIME EXPIRED':'KAGE WAS NEUTRALIZED';
  ctx.fillStyle='#ff8866';ctx.fillText(failMsg,VW/2-(failMsg.length*3),VH/2-6);
  ctx.fillStyle='#ffcc44';ctx.fillText('FINAL SCORE: '+String(P.score).padStart(8,'0'),VW/2-52,VH/2+10);
  if((tick>>4)&1){ctx.fillStyle='#fff';ctx.font='6px monospace';ctx.fillText('PRESS ANY KEY TO RETRY',VW/2-50,VH/2+28);}
}

function drawWin(){
  ctx.fillStyle='rgba(0,10,4,0.93)';ctx.fillRect(0,0,VW,VH);
  for(let i=0;i<55;i++){
    const cx=(i*73+tick*0.9)%VW,cy=(i*111+tick*0.5)%VH;
    ctx.fillStyle=i%4===0?'#00ff66':i%4===1?'#44ffaa':i%4===2?'#ffff44':'#ff88ff';
    ctx.fillRect(cx,cy,2,2);
  }
  ctx.font='bold 12px monospace';
  ctx.fillStyle='#004422';ctx.fillText('MISSION COMPLETE!',VW/2-62,VH/2-30);
  ctx.fillStyle='#00ff66';ctx.fillText('MISSION COMPLETE!',VW/2-62,VH/2-32);
  ctx.font='6px monospace';
  ctx.fillStyle='#aaffcc';ctx.fillText('KAGE ESCAPES WITH THE DATA!',VW/2-58,VH/2-12);
  ctx.fillStyle='#ffff44';ctx.font='7px monospace';
  ctx.fillText('FINAL SCORE: '+String(P.score).padStart(8,'0'),VW/2-58,VH/2+8);
  if((tick>>4)&1){ctx.fillStyle='#fff';ctx.font='6px monospace';ctx.fillText('PRESS ANY KEY TO PLAY AGAIN',VW/2-58,VH/2+28);}
}

// ── INIT & MAIN LOOP ──────────────────────────────────────────────────────────
let gameState='SPLASH';
function initGame(){
  buildMap();validateMapLayout();resetPlayer();spawnEnemies();spawnItems();
  pfx=[];stars=[];bombs=[];bullets=[];camX=0;camY=0;
  simAccumulator=0;
  missionTimeLeftMs=20*60*1000;
  missionTimerRunning=true;
  missionTimeout=false;
  skylineOffsetX=0;
  prevCamX=camX;
  currentSectionCol=0;
  currentSectionRow=0;
  lastFrameMs=performance.now();
  paused=false;
  showHelp=false;
  syncUiButtons();
  rain=Array.from({length:72},()=>({
    x:Math.random()*VW,y:Math.random()*VH,vx:0.9+Math.random()*0.7,vy:2.6+Math.random()*1.8,len:2+Math.floor(Math.random()*3),
    c:Math.random()<0.2?'#88c8ff':'#4a6f93'
  }));
  // Generate a small, fixed star field at the top of outside scenes.
  skyStars=Array.from({length:30},()=>({
    x:Math.floor(Math.random()*VW),
    y:Math.floor(Math.random()*58),
    sz:Math.random()<0.25?2:1
  }));
}

function loop(){
  requestAnimationFrame(loop);
  tick++;
  const now=performance.now();
  const dt=Math.min(100,Math.max(0,now-lastFrameMs));
  lastFrameMs=now;
  updateShake();
  ctx.save();
  if(shakePow>0.2)ctx.translate(Math.round(shakeX),Math.round(shakeY));

  if(gameState==='SPLASH'){
    drawSplash();
    if(splashT>100&&speedSelected&&anyKey()){gameState='PLAYING';initGame();splashT=0;speedSelected=false;AC.resume();}
    ctx.restore();return;
  }
  if(gameState==='GAMEOVER'){
    drawGameOver();
    if(anyKey()){gameState='SPLASH';splashT=0;speedSelected=false;gameSpeed=0.78;}
    ctx.restore();return;
  }
  if(gameState==='WIN'){
    drawWin();
    if(anyKey()){gameState='SPLASH';splashT=0;speedSelected=false;gameSpeed=0.78;}
    ctx.restore();return;
  }

  if(paused){
    drawMap();
    drawItems();
    drawBombs();
    drawBullets();
    drawEnemies();
    drawStars();
    drawNinja(Math.round(P.x-camX),Math.round(P.y-camY),P.dir,P.state,P.invincible,tick);
    drawPfx();
    drawCavernTorches();
    drawBloomFX();
    drawRain();
    drawDarknessMask();
    drawVignette();
    drawHUD();
    drawPauseOverlay();
    if(showHelp)drawHelpOverlay();
    ctx.restore();
    return;
  }

  // Keep player physics at render cadence so jump arc/height stays identical
  // regardless of speed preset, while world simulation still time-scales.
  updatePlayer();

  // Skyline parallax is updated after camera movement so it reacts only
  // when the screen actually scrolls, not just when player velocity changes.

  // Real-time mission countdown. Freeze once all keycards are found.
  if(missionTimerRunning){
    missionTimeLeftMs=Math.max(0,missionTimeLeftMs-dt);
    if(missionTimeLeftMs<=0){
      missionTimeout=true;
      gameState='GAMEOVER';
      missionTimerRunning=false;
    }
  }

  // Time-scale non-player systems by varying fixed simulation ticks per frame.
  simAccumulator+=gameSpeed;
  while(simAccumulator>=1){
    updateEnemies();
    updateItems();
    updateStars();
    updateBombs();
    updateBullets();
    updatePfx();
    updateMovPlats();
    simAccumulator-=1;
  }
  updateRain();

  // Camera should always follow the player smoothly at display frame rate.
  updateCamera();
  // Buildings move opposite camera travel at quarter speed for subtle parallax.
  const camDeltaX=camX-prevCamX;
  skylineOffsetX+=camDeltaX*0.25;
  prevCamX=camX;

  drawMap();
  drawItems();
  drawBombs();
  drawBullets();
  drawEnemies();
  drawStars();
  drawNinja(Math.round(P.x-camX),Math.round(P.y-camY),P.dir,P.state,P.invincible,tick);
  drawPfx();
  drawCavernTorches();
  drawBloomFX();
  drawRain();
  drawDarknessMask();
  drawVignette();
  drawHUD();
  if(showHelp)drawHelpOverlay();

  ctx.restore();
}

loop();
</script>
