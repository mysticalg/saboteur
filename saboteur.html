<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SABOTEUR II — SHADOW OPERATIVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;}
#keys{color:#1a1a1a;font:7px monospace;margin-top:3px;letter-spacing:.4px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="keys">← → MOVE | ↑/SPACE JUMP | ↓ LADDER | Z KICK | X PUNCH | C STAR | B BOMB | SHIFT CROUCH</div>
<script>
'use strict';
// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const SCALE=2,VW=320,VH=200;
canvas.width=VW*SCALE; canvas.height=VH*SCALE;
ctx.scale(SCALE,SCALE);
ctx.imageSmoothingEnabled=false;

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(freq,type,dur,vol,freqEnd){
  try{
    const g=AC.createGain(),o=AC.createOscillator();
    o.connect(g);g.connect(AC.destination);
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,AC.currentTime);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd,AC.currentTime+dur);
    g.gain.setValueAtTime(vol||0.15,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}
const SFX={
  jump:  ()=>snd(200,'sine',0.15,0.12,420),
  land:  ()=>snd(80,'square',0.06,0.1,40),
  kick:  ()=>snd(160,'sawtooth',0.1,0.22,55),
  punch: ()=>snd(190,'square',0.09,0.2,65),
  star:  ()=>snd(750,'sawtooth',0.14,0.12,180),
  shoot: ()=>snd(550,'square',0.07,0.12,90),
  bomb:  ()=>{ snd(90,'sawtooth',0.5,0.4,18);snd(200,'sine',0.3,0.25,30); },
  hurt:  ()=>snd(110,'sawtooth',0.22,0.28,38),
  die:   ()=>{ snd(280,'sawtooth',0.55,0.35,28);setTimeout(()=>snd(60,'sawtooth',0.4,0.2,20),200); },
  pickup:()=>{ snd(440,'sine',0.08,0.18,880);setTimeout(()=>snd(660,'sine',0.1,0.14,1320),80); },
  keycard:()=>{ for(let i=0;i<3;i++) setTimeout(()=>snd(440+i*220,'sine',0.12,0.18),i*80); },
  disk:  ()=>{ for(let i=0;i<4;i++) setTimeout(()=>snd(330+i*110,'sine',0.15,0.2),i*90); },
  win:   ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>snd(f,'sine',0.3,0.25),i*120)); },
};

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TS=16,MW=120,MH=80;
const T_EMPTY=0,T_SOLID=1,T_PLAT=2,T_LADDER=3,T_WATER=4,T_SPIKE=5,T_EXIT=6,T_CRATE=7;

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys={},pressed={};
window.addEventListener('keydown',e=>{
  // Speed selection on splash screen
  if(gameState==='SPLASH'&&splashT>100){
    if(e.key==='1'){gameSpeed=0.42;speedSelected=true;e.preventDefault();return;}
    if(e.key==='2'){gameSpeed=0.78;speedSelected=true;e.preventDefault();return;}
    if(e.key==='3'){gameSpeed=1.0;speedSelected=true;e.preventDefault();return;}
  }
  if(!keys[e.code])pressed[e.code]=true;
  keys[e.code]=true;
  ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)&&e.preventDefault();
  if(AC.state==='suspended')AC.resume();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
function anyKey(){return Object.values(keys).some(v=>v);}
function clearPressed(){for(let k in pressed)pressed[k]=false;}

// ── SCREEN SHAKE ──────────────────────────────────────────────────────────────
let shakeX=0,shakeY=0,shakePow=0;
function addShake(p){shakePow=Math.max(shakePow,p);}
function updateShake(){
  if(shakePow>0.2){shakeX=(Math.random()-.5)*shakePow;shakeY=(Math.random()-.5)*shakePow;shakePow*=0.72;}
  else{shakeX=0;shakeY=0;shakePow=0;}
}

// ── GAME SPEED ────────────────────────────────────────────────────────────────
let gameSpeed=0.78;
let speedSelected=false;
// Fixed-step pacing accumulator. Values below 1.0 intentionally skip simulation
// updates on some render frames so all physics/timers/combat slow down evenly.
let simAccumulator=0;

// ── MAP ───────────────────────────────────────────────────────────────────────
const map=new Uint8Array(MW*MH);
const setT=(x,y,t)=>{if(x>=0&&x<MW&&y>=0&&y<MH)map[y*MW+x]=t;};
const getT=(x,y)=>{if(x<0||x>=MW||y<0||y>=MH)return T_SOLID;return map[y*MW+x];};
const isSolid=(x,y)=>{const t=getT(x,y);return t===T_SOLID||t===T_SPIKE||t===T_CRATE;};
const isPlat=(x,y)=>getT(x,y)===T_PLAT;
const isLadder=(x,y)=>getT(x,y)===T_LADDER;
function fillR(x,y,w,h,t){for(let ry=y;ry<y+h;ry++)for(let rx=x;rx<x+w;rx++)setT(rx,ry,t);}

// Moving platforms
let movPlats=[];

function buildMap(){
  fillR(0,0,MW,MH,T_EMPTY);

  // ROOF row 4 — helipad on right
  fillR(0,4,MW,1,T_SOLID);
  fillR(90,4,14,1,T_EXIT);
  [12,30,50,70,90,108].forEach(x=>{
    setT(x,4,T_LADDER);setT(x,3,T_LADDER);setT(x,2,T_LADDER);setT(x,1,T_LADDER);
  });

  // Helper to build a floor slab
  function floor(y0,y1,walls,plats,spikes,water,crates){
    fillR(0,y1,MW,1,T_SOLID);
    fillR(0,y0,1,y1-y0,T_SOLID);fillR(MW-1,y0,1,y1-y0,T_SOLID);
    walls.forEach(wx=>{
      fillR(wx,y0,1,y1-y0,T_SOLID);
      // door gap 3 tiles
      const mid=Math.floor((y0+y1)/2);
      setT(wx,mid-1,T_EMPTY);setT(wx,mid,T_EMPTY);setT(wx,mid+1,T_EMPTY);
    });
    plats.forEach(([px,py,pw])=>fillR(px,py,pw,1,T_PLAT));
    spikes&&spikes.forEach(([sx,sw])=>fillR(sx,y1-1,sw,1,T_SPIKE));
    water&&water.forEach(([wx2,ww])=>fillR(wx2,y1-1,ww,1,T_WATER));
    crates&&crates.forEach(([cx])=>setT(cx,y1-1,T_CRATE));
    [12,30,50,70,90,108].forEach(x=>{for(let y=y0;y<=y1;y++)setT(x,y,T_LADDER);});
  }

  // Floor 1 rows 5-14
  floor(5,14,[20,40,60,80,100],
    [[4,11,8],[22,10,7],[42,12,6],[62,10,8],[82,11,7],[103,10,7]],
    null,null,
    [[15],[35],[55],[75],[95],[112]]);

  // Floor 2 rows 15-24
  floor(15,24,[25,50,75,100],
    [[5,20,8],[14,22,7],[28,19,9],[40,21,7],[55,18,9],[65,21,8],[78,20,9],[103,19,8]],
    null,[[10,6],[45,8]],
    [[8],[32],[62],[85],[110]]);

  // Floor 3 rows 25-34  ← DATA DISK here
  floor(25,34,[35,70],
    [[5,30,9],[17,32,8],[38,28,10],[52,31,8],[72,29,9],[85,32,8],[103,28,9]],
    [[15,6],[60,5],[90,5]],[[80,8]],null);

  // Floor 4 rows 35-44
  floor(35,44,[28,55,85],
    [[4,40,8],[14,42,7],[30,38,9],[43,41,7],[57,39,9],[70,41,8],[87,39,9],[110,38,8]],
    null,[[8,7],[42,10],[72,6],[100,7]],
    [[20],[60],[95]]);

  // Floor 5 rows 45-54
  floor(45,54,[20,45,70,95],
    [[4,50,9],[13,52,8],[22,49,7],[36,51,9],[48,48,10],[62,52,8],[73,49,9],[100,48,10]],
    [[30,7],[65,6]],[[0,MW]],null); // full water bottom

  // Floor 6 rows 55-64  ← server room
  floor(55,64,[30,60,90],
    [[4,60,9],[14,62,7],[32,58,9],[48,61,8],[62,59,9],[75,62,8],[92,58,10],[108,61,8]],
    [[15,8],[50,10],[80,8]],null,
    [[8],[22],[45],[68],[85],[105]]);

  // Floor 7 rows 65-74  ← basement vault
  floor(65,74,[40,80],
    [[4,70,9],[15,72,7],[42,69,9],[55,72,8],[65,70,9],[82,72,8],[95,69,10],[112,72,5]],
    null,[[0,MW]],null); // water floor

  // Moving platforms
  movPlats=[
    {x:48*TS,y:11*TS,w:4*TS,h:4,dir:1,spd:0.7,min:38*TS,max:58*TS},
    {x:35*TS,y:21*TS,w:3*TS,h:4,dir:-1,spd:0.6,min:27*TS,max:44*TS},
    {x:65*TS,y:29*TS,w:4*TS,h:4,dir:1,spd:0.55,min:55*TS,max:78*TS},
    {x:80*TS,y:40*TS,w:3*TS,h:4,dir:-1,spd:0.8,min:68*TS,max:88*TS},
    {x:25*TS,y:50*TS,w:4*TS,h:4,dir:1,spd:0.65,min:14*TS,max:36*TS},
    {x:47*TS,y:60*TS,w:3*TS,h:4,dir:1,spd:0.9,min:36*TS,max:62*TS},
  ];
}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
const GRAV=0.38,MAXFALL=8;
function moveEntity(e){
  e.x+=e.vx;
  let tx1=Math.floor(e.x/TS),tx2=Math.floor((e.x+e.w-1)/TS);
  let ty1=Math.floor(e.y/TS),ty2=Math.floor((e.y+e.h-1)/TS);
  for(let ty=ty1;ty<=ty2;ty++)for(let tx=tx1;tx<=tx2;tx++){
    if(isSolid(tx,ty)){
      if(e.vx>0){e.x=tx*TS-e.w;e.vx=0;}
      else if(e.vx<0){e.x=(tx+1)*TS;e.vx=0;}
    }
  }
  if(!e.onLadder)e.vy=Math.min(e.vy+GRAV,MAXFALL);
  e.y+=e.vy;
  e.onGround=false;
  tx1=Math.floor(e.x/TS);tx2=Math.floor((e.x+e.w-1)/TS);
  ty1=Math.floor(e.y/TS);ty2=Math.floor((e.y+e.h-1)/TS);
  for(let tx=tx1;tx<=tx2;tx++)for(let ty=ty1;ty<=ty2;ty++){
    if(isSolid(tx,ty)){
      if(e.vy>0){e.y=ty*TS-e.h;e.vy=0;e.onGround=true;}
      else if(e.vy<0){e.y=(ty+1)*TS;e.vy=0;}
    }
  }
  // One-way platforms
  if(e.vy>=0&&!e.onGround&&!e.onLadder){
    const foot=e.y+e.h,fTile=Math.floor(foot/TS);
    if(Math.floor((foot-e.vy)/TS)<fTile){
      tx1=Math.floor(e.x/TS);tx2=Math.floor((e.x+e.w-1)/TS);
      for(let tx=tx1;tx<=tx2;tx++){
        if(isPlat(tx,fTile)){e.y=fTile*TS-e.h;e.vy=0;e.onGround=true;}
      }
    }
  }
  // Moving platform collision
  if(e.vy>=0&&!e.onGround&&!e.onLadder){
    for(const mp of movPlats){
      if(e.x+e.w>mp.x&&e.x<mp.x+mp.w){
        const foot=e.y+e.h,prev=foot-e.vy;
        if(prev<=mp.y+4&&foot>=mp.y){
          e.y=mp.y-e.h;e.vy=0;e.onGround=true;
          if(e===P)e.x+=mp.dir*mp.spd;
        }
      }
    }
  }
}
function overlaps(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ── PLAYER ────────────────────────────────────────────────────────────────────
const PW=12,PH=20;
let P={};
function resetPlayer(){
  P={x:3*TS,y:4*TS-PH-1,w:PW,h:PH,
     vx:0,vy:0,dir:1,
     onGround:false,onLadder:false,
     state:'idle',stateTimer:0,
     health:6,maxHealth:6,
     stars:10,bombs:3,lives:3,score:0,
     hasDisk:false,hasKeycard:false,
     shield:0,speedBoost:0,
     invincible:0,attackCooldown:0,attackBox:null,
     combo:0,comboTimer:0,crouching:false};
}

function playerHit(dmg){
  if(P.invincible>0||P.shield>0)return;
  P.health-=dmg;
  SFX.hurt();addShake(4+dmg*2);
  spawnPfx(P.x+PW/2,P.y+PH/2,7,'#ff6622');
  P.combo=0;P.comboTimer=0;
  if(P.health<=0){P.health=0;killPlayer();return;}
  P.state='hurt';P.stateTimer=18;P.invincible=70;P.vy=-2.5;
}

function killPlayer(){
  P.lives--;SFX.die();addShake(10);
  if(P.lives<=0){P.lives=0;setTimeout(()=>{gameState='GAMEOVER';},1800);P.state='dead';return;}
  P.x=3*TS;P.y=4*TS-PH-1;P.vx=0;P.vy=0;
  P.health=P.maxHealth;P.state='hurt';P.stateTimer=30;P.invincible=120;
}

function updatePlayer(){
  if(P.state==='dead')return;
  if(P.invincible>0)P.invincible--;
  if(P.shield>0)P.shield--;
  if(P.speedBoost>0)P.speedBoost--;
  if(P.attackCooldown>0)P.attackCooldown--;
  if(P.comboTimer>0){P.comboTimer--;if(P.comboTimer<=0)P.combo=0;}
  P.attackBox=null;
  const spd=(P.speedBoost>0?2.9:1.9)*gameSpeed;

  if(P.state==='kick'||P.state==='punch'){
    P.stateTimer--;
    if(P.stateTimer>4){
      const bw=24,bh=10;
      P.attackBox={x:P.dir>0?P.x+PW:P.x-bw,y:P.y+(P.state==='kick'?PH*0.55:PH*0.2),w:bw,h:bh};
    }
    if(P.stateTimer<=0)P.state=P.onGround?'idle':'fall';
    moveEntity(P);return;
  }
  if(P.state==='throw'){
    P.stateTimer--;
    if(P.stateTimer===3)spawnStar();
    if(P.stateTimer<=0)P.state=P.onGround?'idle':'fall';
    moveEntity(P);return;
  }
  if(P.state==='bomb_throw'){
    P.stateTimer--;
    if(P.stateTimer===3)spawnBomb();
    if(P.stateTimer<=0)P.state=P.onGround?'idle':'fall';
    moveEntity(P);return;
  }
  if(P.state==='hurt'){
    P.stateTimer--;
    if(P.stateTimer<=0)P.state='idle';
    moveEntity(P);return;
  }

  P.crouching=!!(keys['ShiftLeft']||keys['ShiftRight']);

  // Ladder
  const cx=Math.floor((P.x+PW/2)/TS);
  const onLT=isLadder(cx,Math.floor((P.y+2)/TS))||isLadder(cx,Math.floor((P.y+PH/2)/TS));
  if(onLT&&(keys['ArrowUp']||keys['ArrowDown'])){
    P.onLadder=true;P.vx=0;P.vy=keys['ArrowUp']?-2:2;
    P.x=cx*TS+(TS-PW)/2;P.state='climb';
    moveEntity(P);
    if(!isLadder(cx,Math.floor((P.y+2)/TS))&&P.vy<0)P.onLadder=false;
    clearPressed();return;
  }else{P.onLadder=false;}

  P.vx=0;
  if(!P.crouching){
    if(keys['ArrowLeft']){P.vx=-spd;P.dir=-1;}
    if(keys['ArrowRight']){P.vx=spd;P.dir=1;}
  }

  const wasOnGround=P.onGround;
  if((keys['ArrowUp']||keys['Space'])&&P.onGround&&!P.crouching){
    // Make jumps ~2x higher than before while keeping behavior consistent
    // across speed presets (jump impulse should not shrink in slow mode).
    const jumpImpulse=6.5*Math.sqrt(2);
    P.vy=-jumpImpulse;P.onGround=false;P.state='jump';SFX.jump();
  }

  if(pressed['KeyZ']&&P.attackCooldown<=0){
    P.state='kick';P.stateTimer=13;P.attackCooldown=22;pressed['KeyZ']=false;SFX.kick();
  }else if(pressed['KeyX']&&P.attackCooldown<=0){
    P.state='punch';P.stateTimer=11;P.attackCooldown=18;pressed['KeyX']=false;SFX.punch();
  }else if(pressed['KeyC']&&P.attackCooldown<=0&&P.stars>0){
    P.state='throw';P.stateTimer=10;P.attackCooldown=22;pressed['KeyC']=false;SFX.star();
  }else if(pressed['KeyB']&&P.attackCooldown<=0&&P.bombs>0){
    P.state='bomb_throw';P.stateTimer=12;P.attackCooldown=30;pressed['KeyB']=false;
  }

  if(!['kick','punch','throw','bomb_throw','hurt','climb'].includes(P.state)){
    P.state=P.onGround?(P.crouching?'duck':(P.vx!==0?'run':'idle')):(P.vy<0?'jump':'fall');
  }

  const prevOnGround=P.onGround;
  moveEntity(P);
  if(!prevOnGround&&P.onGround)SFX.land();

  // Hazards
  const ft=getT(Math.floor((P.x+PW/2)/TS),Math.floor((P.y+PH)/TS));
  if(ft===T_WATER||ft===T_SPIKE)playerHit(5);

  // Exit
  if(P.hasDisk&&P.hasKeycard){
    if(getT(Math.floor((P.x+PW/2)/TS),Math.floor((P.y+PH/2)/TS))===T_EXIT){
      SFX.win();gameState='WIN';
    }
  }
  clearPressed();
}

// ── PROJECTILES ───────────────────────────────────────────────────────────────
let stars=[],bombs=[],bullets=[];

function spawnStar(){
  stars.push({x:P.x+(P.dir>0?PW+2:-4),y:P.y+PH*0.35,vx:P.dir*6.5,vy:0,life:65});
}
function spawnBomb(){
  P.bombs--;
  bombs.push({x:P.x+(P.dir>0?PW:0),y:P.y+4,vx:P.dir*3.2,vy:-4.5,life:130});
}
function spawnBullet(x,y,vx){
  bullets.push({x,y,vx,vy:0,life:85});
}

function updateStars(){
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];s.x+=s.vx;s.y+=s.vy;s.life--;
    if(isSolid(Math.floor(s.x/TS),Math.floor(s.y/TS))||s.life<=0){
      spawnPfx(s.x,s.y,5,'#ffff44');stars.splice(i,1);continue;
    }
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];if(e.state==='dead')continue;
      if(overlaps({x:s.x-3,y:s.y-3,w:6,h:6},{x:e.x,y:e.y,w:e.w,h:e.h})){
        hurtEnemy(e,2,s.vx>0?1:-1);spawnPfx(s.x,s.y,8,'#ffff44');hit=true;break;
      }
    }
    if(hit)stars.splice(i,1);
  }
}

function updateBombs(){
  for(let i=bombs.length-1;i>=0;i--){
    const b=bombs[i];
    b.vy=Math.min(b.vy+GRAV,MAXFALL);
    b.x+=b.vx;b.y+=b.vy;
    const bfy=Math.floor((b.y+4)/TS);
    if(isSolid(Math.floor(b.x/TS),bfy)||isPlat(Math.floor(b.x/TS),bfy)){
      b.y=bfy*TS-4;b.vy*=-0.45;b.vx*=0.68;
    }
    b.life--;
    if(b.life<=0){
      SFX.bomb();addShake(9);
      spawnPfx(b.x,b.y,35,'#ff6600');spawnPfx(b.x,b.y,20,'#ffff00');spawnPfx(b.x,b.y,12,'#ffffff');
      const rad=52;
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];if(e.state==='dead')continue;
        const dx=(e.x+e.w/2)-b.x,dy=(e.y+e.h/2)-b.y;
        if(Math.sqrt(dx*dx+dy*dy)<rad)hurtEnemy(e,5,dx>0?1:-1);
      }
      const pdx=(P.x+PW/2)-b.x,pdy=(P.y+PH/2)-b.y;
      if(Math.sqrt(pdx*pdx+pdy*pdy)<rad*0.55)playerHit(2);
      // Break crates nearby
      for(let by2=-2;by2<=2;by2++)for(let bx2=-2;bx2<=2;bx2++){
        const tx=Math.floor(b.x/TS)+bx2,ty=Math.floor(b.y/TS)+by2;
        if(getT(tx,ty)===T_CRATE){setT(tx,ty,T_EMPTY);spawnPfx(tx*TS+8,ty*TS+8,8,'#8b5a2b');}
      }
      bombs.splice(i,1);
    }
  }
}

function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(isSolid(Math.floor(b.x/TS),Math.floor(b.y/TS))||b.life<=0){
      spawnPfx(b.x,b.y,3,'#ff8800');bullets.splice(i,1);continue;
    }
    if(overlaps({x:b.x-2,y:b.y-2,w:4,h:4},{x:P.x,y:P.y,w:PW,h:PH})){
      playerHit(1);spawnPfx(b.x,b.y,4,'#ff4400');bullets.splice(i,1);
    }
  }
}

// ── ENEMIES ───────────────────────────────────────────────────────────────────
let enemies=[],items=[];

function hurtEnemy(e,dmg,dir){
  if(e.state==='dead'||e.state==='hurt')return;
  e.health-=dmg;
  P.score+=50;P.combo++;P.comboTimer=160;
  if(P.combo>=3)P.score+=P.combo*40;
  spawnPfx(e.x+e.w/2,e.y+e.h/2,6,'#ff4422');
  e.state='hurt';e.stateTimer=18;e.vx=(dir||1)*2;e.vy=-2;
  if(e.health<=0){

function updateEnemies(){
  const CHASE_D=130,ATK_D=14;
  enemies.forEach(e=>{
    if(e.state==='dead')return;
    if(e.state==='hurt'){
      e.stateTimer--;if(e.stateTimer<=0)e.state=e.health>0?'patrol':'dead';
      moveEntity(e);return;
    }
    const dx=(P.x+PW/2)-(e.x+e.w/2);
    const dy=(P.y+PH/2)-(e.y+e.h/2);
    const dist=Math.sqrt(dx*dx+dy*dy);
    const sameFloor=Math.abs(dy)<50;

    if(e.type==='sniper'){
      e.dir=dx>0?1:-1;
      if(e.shootCooldown>0)e.shootCooldown--;
      if(dist<200&&sameFloor&&e.shootCooldown<=0){
        spawnBullet(e.x+(e.dir>0?e.w+2:-4),e.y+e.h*0.35,e.dir*5.2);
        SFX.shoot();e.shootCooldown=95+Math.random()*30;
      }
      if(P.attackBox&&overlaps(P.attackBox,{x:e.x,y:e.y,w:e.w,h:e.h})){hurtEnemy(e,1,P.dir);P.attackBox=null;}
      moveEntity(e);return;
    }

    const sp=(e.type==='dog'?1.2:e.type==='heavy'?0.4:0.7)*gameSpeed;
    if(e.state==='patrol'){
      e.vx=e.dir*sp;
      if(e.x<=e.patrolMin)e.dir=1;
      if(e.x+e.w>=e.patrolMax)e.dir=-1;
      const fx=e.dir>0?e.x+e.w+2:e.x-2;
      if(!isSolid(Math.floor(fx/TS),Math.floor((e.y+e.h+2)/TS))&&
         !isPlat(Math.floor(fx/TS),Math.floor((e.y+e.h+2)/TS))){e.dir*=-1;}
      if(dist<CHASE_D&&sameFloor){e.state='chase';e.alertTimer=220;}
    }else{
      e.alertTimer--;
      if(e.alertTimer<=0){e.state='patrol';return;}
      if(dist<CHASE_D&&sameFloor)e.alertTimer=220;
      if(sameFloor){e.vx=Math.sign(dx)*(sp*1.5);e.dir=Math.sign(dx)||e.dir;}
      // Guards shoot while chasing
      if(e.type==='guard'){
        if(e.shootCooldown>0)e.shootCooldown--;
        if(dist<110&&sameFloor&&e.shootCooldown<=0){
          spawnBullet(e.x+(e.dir>0?e.w+2:-4),e.y+8,e.dir*4.5);
          SFX.shoot();e.shootCooldown=130;
        }
      }
      if(dist<ATK_D+e.w&&sameFloor&&e.stateTimer<=0){
        e.stateTimer=35;playerHit(e.type==='heavy'?2:1);
      }
    }
    if(e.stateTimer>0)e.stateTimer--;
    const nx=e.x+e.vx;
    if(isSolid(e.vx>0?Math.floor((nx+e.w)/TS):Math.floor(nx/TS),Math.floor((e.y+e.h/2)/TS)))e.dir*=-1;
    moveEntity(e);
    const ft=getT(Math.floor((e.x+e.w/2)/TS),Math.floor((e.y+e.h)/TS));
    if(ft===T_WATER||ft===T_SPIKE)e.state='dead';
    if(P.attackBox&&overlaps(P.attackBox,{x:e.x,y:e.y,w:e.w,h:e.h})){hurtEnemy(e,1,P.dir);P.attackBox=null;}
  });
}

function updateItems(){
  items.forEach(it=>{
    if(it.collected)return;
    it.bob+=0.06;
    if(!overlaps({x:P.x,y:P.y,w:PW,h:PH},{x:it.x,y:it.y,w:it.w,h:it.h}))return;
    it.collected=true;
    switch(it.subtype){
      case 'ammo':     P.stars=Math.min(P.stars+6,20);P.score+=100;spawnPfx(it.x+4,it.y+4,8,'#ffff44');SFX.pickup();break;
      case 'health':   P.health=Math.min(P.health+2,P.maxHealth);P.score+=150;spawnPfx(it.x+4,it.y+4,8,'#ff4444');SFX.pickup();break;
      case 'keycard':  P.hasKeycard=true;P.score+=500;spawnPfx(it.x+4,it.y+4,14,'#44ff44');SFX.keycard();break;
      case 'disk':     P.hasDisk=true;P.score+=1000;spawnPfx(it.x+4,it.y+4,20,'#00ffcc');SFX.disk();break;
      case 'bomb_item':P.bombs=Math.min(P.bombs+2,8);P.score+=200;spawnPfx(it.x+4,it.y+4,10,'#ff8800');SFX.pickup();break;
      case 'shield':   P.shield=300;P.score+=300;spawnPfx(it.x+4,it.y+4,12,'#4488ff');SFX.pickup();break;
      case 'speed':    P.speedBoost=400;P.score+=200;spawnPfx(it.x+4,it.y+4,12,'#88ffff');SFX.pickup();break;
      case 'extralife':P.lives++;P.score+=1000;spawnPfx(it.x+4,it.y+4,20,'#ff88ff');addShake(3);SFX.disk();break;
    }
  });
}

let pfx=[];

  for(let i=0;i<n;i++)pfx.push({

  for(let i=pfx.length-1;i>=0;i--){

// ── TILE DRAWING ──────────────────────────────────────────────────────────────
let tick=0;
function drawTile(tx,ty,sx,sy){
  const t=getT(tx,ty);if(t===T_EMPTY)return;
  switch(t){
    case T_SOLID:{
      ctx.fillStyle='#4a1808';ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle='#250a02';ctx.fillRect(sx,sy,TS,1);ctx.fillRect(sx,sy,1,TS);
      ctx.fillStyle='#6e2c1a';
      const row=ty%2,off=row?8:0;
      ctx.fillRect(sx+1+off,sy+2,6,5);ctx.fillRect(sx+9+off,sy+2,5,5);
      ctx.fillRect(sx+1+(8-off),sy+9,7,5);ctx.fillRect(sx+9+(off?0:8)%16,sy+9,5,5);
      if(getT(tx,ty-1)!==T_SOLID){ctx.fillStyle='#8a4428';ctx.fillRect(sx,sy,TS,2);}
      break;
    }
    case T_PLAT:{
      ctx.fillStyle='#3a2a10';ctx.fillRect(sx,sy,TS,5);
      ctx.fillStyle='#7a6030';ctx.fillRect(sx,sy,TS,1);
      ctx.fillStyle='#5a4420';ctx.fillRect(sx,sy+1,TS,1);
      ctx.fillStyle='#1a1208';ctx.fillRect(sx,sy+4,TS,1);
      break;
    }
    case T_LADDER:{
      ctx.fillStyle='#5a3a10';
      ctx.fillRect(sx+3,sy,3,TS);ctx.fillRect(sx+10,sy,3,TS);
      ctx.fillStyle='#3a2808';
      for(let r=0;r<TS;r+=4)ctx.fillRect(sx+2,sy+r,12,1);
      ctx.fillStyle='#7a5030';ctx.fillRect(sx+4,sy,1,TS);ctx.fillRect(sx+11,sy,1,TS);
      break;
    }
    case T_WATER:{
      ctx.fillStyle='#060c2a';ctx.fillRect(sx,sy,TS,TS);
      const wv=Math.sin(tick*0.07+tx*0.7)*1.5;
      ctx.fillStyle='#0a2060';ctx.fillRect(sx,sy+wv,TS,3);ctx.fillRect(sx,sy+wv+6,TS,2);
      ctx.fillStyle='rgba(15,50,160,0.25)';ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle='rgba(80,160,255,0.1)';ctx.fillRect(sx,sy,TS,2);
      break;
    }
    case T_SPIKE:{
      ctx.fillStyle='#282840';ctx.fillRect(sx,sy+TS-4,TS,4);
      ctx.fillStyle='#7878a0';
      for(let s=0;s<TS;s+=4){
        ctx.beginPath();ctx.moveTo(sx+s,sy+TS);ctx.lineTo(sx+s+2,sy+TS-14);ctx.lineTo(sx+s+4,sy+TS);ctx.fill();
        ctx.fillStyle='#ccccdd';ctx.fillRect(sx+s+1,sy+TS-14,1,3);
        ctx.fillStyle='#7878a0';
      }
      break;
    }
    case T_EXIT:{
      ctx.fillStyle='#001a06';ctx.fillRect(sx,sy,TS,TS);
      const pulse=(tick>>2)&3;
      if(P.hasDisk&&P.hasKeycard){
        ctx.fillStyle=pulse<2?'#00ff44':'#00cc33';ctx.fillRect(sx+1,sy+1,TS-2,TS-2);
        ctx.fillStyle='#002d0e';ctx.fillRect(sx+4,sy+4,TS-8,TS-8);
        ctx.fillStyle='rgba(0,255,80,0.35)';ctx.fillRect(sx,sy,TS,TS);
      }else{
        ctx.fillStyle='#003510';ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
        ctx.fillStyle='#001e08';ctx.fillRect(sx+5,sy+5,TS-10,TS-10);
      }
      break;
    }
    case T_CRATE:{
      ctx.fillStyle='#6a3a10';ctx.fillRect(sx,sy,TS,TS);
      ctx.fillStyle='#4a2808';ctx.fillRect(sx,sy,TS,1);ctx.fillRect(sx,sy,1,TS);
      ctx.fillStyle='#8a5020';ctx.fillRect(sx+1,sy+1,TS-2,TS-2);
      ctx.fillStyle='#5a3010';ctx.fillRect(sx+4,sy,1,TS);ctx.fillRect(sx,sy+4,TS,1);
      ctx.fillStyle='#7a4418';
      ctx.fillRect(sx+2,sy+2,2,2);ctx.fillRect(sx+TS-4,sy+2,2,2);
      ctx.fillRect(sx+2,sy+TS-4,2,2);ctx.fillRect(sx+TS-4,sy+TS-4,2,2);
      break;
    }
  }
}

function drawMap(){
  // Background gradient — deeper = darker/redder (underground)
  const depth=Math.min(1,camY/(MH*TS));
  const r=Math.floor(depth*12),g2=Math.floor(depth*3),b=Math.floor(22-depth*20);
  ctx.fillStyle=`rgb(${r},${g2},${b})`;ctx.fillRect(0,0,VW,VH);

  // Distant parallax city (only visible near roof)
  if(camY<120){
    const a=Math.max(0,1-camY/120);
    const bldgs=[[0,155,28,45],[26,142,22,58],[46,138,18,62],[62,150,32,50],[92,128,24,72],
                 [114,143,27,57],[139,133,19,67],[157,148,26,52],[181,143,20,57],
                 [199,126,28,74],[225,138,23,62],[246,146,26,54],[270,152,20,48],[288,143,20,57]];
    ctx.fillStyle=`rgba(6,6,6,${a})`;
    bldgs.forEach(([bx,by,bw,bh])=>ctx.fillRect(bx,by,bw,bh));
    // Lit windows
    ctx.globalAlpha=a*0.5;
    bldgs.forEach(([bx,by,bw,bh])=>{
      for(let wy=by+5;wy<VH-2;wy+=7)for(let wx=bx+3;wx<bx+bw-3;wx+=5){
        if((tick*0.01+wx+wy)%1<0.65){
          ctx.fillStyle=(wx+wy)%3===0?'#ffe088':'#88bbff';
          ctx.fillRect(wx,wy,3,4);
        }
      }
    });
    ctx.globalAlpha=1;
  }

  // CRT scanlines
  for(let y=0;y<VH;y+=3){ctx.fillStyle='rgba(0,0,0,0.07)';ctx.fillRect(0,y,VW,1);}

  const tx0=Math.max(0,Math.floor(camX/TS));
  const tx1=Math.min(MW,tx0+Math.ceil(VW/TS)+2);
  const ty0=Math.max(0,Math.floor(camY/TS));
  const ty1=Math.min(MH,ty0+Math.ceil(VH/TS)+2);
  for(let ty=ty0;ty<ty1;ty++)for(let tx=tx0;tx<tx1;tx++)
    drawTile(tx,ty,tx*TS-Math.floor(camX),ty*TS-Math.floor(camY));

  // Moving platforms
  movPlats.forEach(mp=>{
    const sx=Math.round(mp.x-camX),sy=Math.round(mp.y-camY);
    if(sx>-mp.w&&sx<VW&&sy>-8&&sy<VH){
      ctx.fillStyle='#3a2a10';ctx.fillRect(sx,sy,mp.w,mp.h);
      ctx.fillStyle='#7a6030';ctx.fillRect(sx,sy,mp.w,1);
      ctx.fillStyle='#5a4420';ctx.fillRect(sx,sy+1,mp.w,1);
      ctx.fillStyle='#aa8840';
      if(mp.dir>0)ctx.fillRect(sx+mp.w-5,sy+2,3,1);
      else ctx.fillRect(sx+2,sy+2,3,1);
    }
  });
}

// ── SPRITE DRAWING ────────────────────────────────────────────────────────────

// Player — detailed ninja
function drawNinja(sx,sy,dir,state,inv,t){
  if(inv>0&&(t>>1)&1)return;
  ctx.save();ctx.translate(sx+(dir<0?PW:0),sy);if(dir<0)ctx.scale(-1,1);
  const fr=t>>3;

  // Shield aura
  if(P.shield>0){
    ctx.globalAlpha=0.35+Math.sin(t*0.3)*0.15;
    ctx.fillStyle='#3377ff';ctx.fillRect(-3,-3,PW+6,PH+6);
    ctx.globalAlpha=1;
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(1,PH+1,PW-2,2);

  if(state==='duck'){
    ctx.fillStyle='#111';ctx.fillRect(0,10,12,6);ctx.fillRect(1,14,10,4);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,7,8,5);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,8,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,8,3,1);
    ctx.restore();return;
  }

  // Legs
  ctx.fillStyle='#111';
  if(state==='jump'||state==='fall'){
    ctx.fillRect(2,14,4,5);ctx.fillRect(7,14,4,6);
  }else if(state==='run'){
    const lf=fr%4;
    ctx.fillRect(2,14,4,lf<2?7:4);ctx.fillRect(7,14,4,lf>=2?7:4);
    ctx.fillStyle='#222';ctx.fillRect(2,14+(lf<2?6:3),4,1);ctx.fillRect(7,14+(lf>=2?6:3),4,1);
  }else if(state==='climb'){
    ctx.fillRect(2,14,4,6);ctx.fillRect(7,14,4,6);
  }else{
    ctx.fillRect(2,14,4,6);ctx.fillRect(7,14,4,6);
  }

  if(state==='climb'){
    const al=(t>>3)&1;
    ctx.fillStyle='#111';ctx.fillRect(al?-3:PW,al?2:6,4,6);ctx.fillRect(al?PW:-3,al?6:2,4,6);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }

  if(state==='kick'){
    ctx.fillStyle='#111';ctx.fillRect(-1,6,3,6);
    ctx.fillRect(PW-1,12,13,4);ctx.fillStyle='#333';ctx.fillRect(PW+9,11,4,3);
    ctx.fillRect(2,14,5,5);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }
  if(state==='punch'){
    ctx.fillStyle='#111';ctx.fillRect(PW,4,10,4);ctx.fillRect(PW+6,2,5,4);
    ctx.fillStyle='#c8996a';ctx.fillRect(PW+8,3,4,3);
    ctx.fillStyle='#111';ctx.fillRect(-2,6,3,6);ctx.fillRect(2,14,4,5);ctx.fillRect(7,14,4,5);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }
  if(state==='throw'||state==='bomb_throw'){
    ctx.fillStyle='#111';ctx.fillRect(PW-1,3,9,4);
    const sc=state==='bomb_throw'?'#555':'#ffff22';
    ctx.fillStyle=sc;ctx.fillRect(PW+4,0,5,5);ctx.fillRect(PW+2,2,9,1);
    if(state==='throw'){ctx.fillStyle='#ff8800';ctx.fillRect(PW+6,2,3,1);}
    else{ctx.fillStyle='#ff4400';ctx.fillRect(PW+5,2,2,2);}
    ctx.fillStyle='#111';ctx.fillRect(2,14,4,5);ctx.fillRect(7,14,4,5);ctx.fillRect(-2,6,3,6);
    ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,1,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);
    ctx.restore();return;
  }

  // Body
  ctx.fillStyle='#111';ctx.fillRect(1,6,10,9);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(3,7,3,4);ctx.fillRect(7,7,3,4);
  ctx.fillStyle='#333';ctx.fillRect(1,12,10,2);ctx.fillStyle='#888';ctx.fillRect(4,12,4,2);

  // Arms
  ctx.fillStyle='#111';
  const aSwing=state==='run'?(fr%2?2:-2):0;
  ctx.fillRect(-2,6+aSwing,3,7);ctx.fillRect(PW-1,6-aSwing,3,7);
  ctx.fillStyle='#c8996a';ctx.fillRect(-2,11+aSwing,3,2);ctx.fillRect(PW-1,11-aSwing,3,2);

  // Scarf
  ctx.fillStyle='#cc0000';ctx.fillRect(0,5,12,3);
  if(state==='run'||state==='jump'){ctx.fillStyle='#aa0000';ctx.fillRect(-2,5,3,2);}

  // Head
  ctx.fillStyle='#c8996a';ctx.fillRect(2,0,8,6);
  ctx.fillStyle='#cc1111';ctx.fillRect(2,0,8,4);
  ctx.fillStyle='#fff';ctx.fillRect(6,1,3,1);ctx.fillStyle='#000';ctx.fillRect(7,1,1,1);
  ctx.fillStyle='#b07850';ctx.fillRect(2,4,8,2);
  ctx.fillStyle='#111';ctx.fillRect(2,0,2,1);ctx.fillRect(TS-4,0,2,1);

  ctx.restore();
}

// Guard — blue armored soldier

  const fr=t>>3,hurt=state==='hurt'&&(t>>1)&1;

  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(1,21,10,2);

  const lr=state==='patrol'||state==='chase'?fr%2:0;
  ctx.fillStyle='#0a1844';ctx.fillRect(2,15,4,5+(lr?3:0));ctx.fillRect(7,15,4,5+(lr?0:3));
  ctx.fillStyle='#111';ctx.fillRect(2,19+(lr?4:0),4,1);ctx.fillRect(7,19+(lr?0:4),4,1);

  const bc=hurt?'#ff4433':'#183888';
  ctx.fillStyle=bc;ctx.fillRect(1,5,10,10);
  ctx.fillStyle=hurt?'#ff5544':'#1048aa';ctx.fillRect(3,6,6,6);
  ctx.fillStyle='#0a2866';ctx.fillRect(3,8,2,3);ctx.fillRect(7,8,2,3);
  ctx.fillStyle=bc;ctx.fillRect(-2,6,4,7);ctx.fillRect(10,6,4,7);
  ctx.fillStyle='#222';ctx.fillRect(-2,11,4,2);ctx.fillRect(10,11,4,2);

  // Rifle
  ctx.fillStyle='#1a1a1a';ctx.fillRect(12,8,10,3);
  ctx.fillStyle='#111';ctx.fillRect(18,7,4,3);
  ctx.fillStyle='#333';ctx.fillRect(12,9,6,4);

  // Helmet
  const hc=hurt?'#ff3322':'#1030bb';
  ctx.fillStyle=hc;ctx.fillRect(0,0,12,7);ctx.fillRect(-1,3,14,3);
  ctx.fillStyle='#050e30';ctx.fillRect(1,2,10,3);
  ctx.fillStyle='rgba(80,140,255,0.2)';ctx.fillRect(1,2,10,1);
  ctx.fillStyle='#2040cc';ctx.fillRect(4,0,4,1);
  ctx.fillStyle='#c8996a';ctx.fillRect(2,5,8,4);
  ctx.fillStyle='#333';ctx.fillRect(5,6,4,2);
  ctx.fillStyle='#fff';ctx.fillRect(5,6,2,1);ctx.fillRect(8,6,1,1);

  if(hp<maxHp){

    ctx.fillStyle='#f44';ctx.fillRect(sx,sy-4,Math.round(12*hp/maxHp),2);
  }

// Sniper — camo, crouching with long rifle
function drawSniper(sx,sy,dir,state,hp,maxHp,t){

// Dog — aggressive guard dog with red eyes
function drawDog(sx,sy,dir,state,t){
  if(state==='dead')return;
  ctx.save();ctx.translate(sx+(dir<0?14:0),sy);if(dir<0)ctx.scale(-1,1);
  const fr=t>>3,hurt=state==='hurt'&&(t>>1)&1;

  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.fillRect(2,12,10,2);
  const la=fr%4;
  ctx.fillStyle=hurt?'#ff6622':'#4a2808';
  [[1,7],[4,7],[7,7],[10,7]].forEach(([lx,ly],i)=>ctx.fillRect(lx,ly,2,i%2===la%2?5:3));
  ctx.fillStyle=hurt?'#ff8844':'#6a3810';ctx.fillRect(2,3,10,6);
  ctx.fillStyle=hurt?'#ff6622':'#4a2808';ctx.fillRect(3,4,8,4);
  // Head
  ctx.fillStyle=hurt?'#ff8844':'#6a3810';ctx.fillRect(9,0,5,5);ctx.fillRect(11,3,5,3);
  ctx.fillStyle='#111';ctx.fillRect(14,3,2,2);
  ctx.fillStyle='#fff';ctx.fillRect(10,1,2,2);
  ctx.fillStyle='#f00';ctx.fillRect(10,1,1,1); // red eye
  ctx.fillStyle='#4a2808';ctx.fillRect(9,0,2,3);
  ctx.fillStyle='#fff';ctx.fillRect(12,5,1,2);ctx.fillRect(14,5,1,2);

// ── ITEM DRAWING ──────────────────────────────────────────────────────────────
function drawItems(){
  items.forEach(it=>{
    if(it.collected)return;
    const sx=Math.round(it.x-camX),sy=Math.round(it.y-camY+Math.sin(it.bob)*2);
    if(sx<-16||sx>VW+16||sy<-16||sy>VH+16)return;
    const p=(tick>>2)&1;
    switch(it.subtype){
      case 'ammo':
        ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(sx+4,sy+4,4,0,6.28);ctx.fill();
        ctx.fillStyle='#fff';ctx.fillRect(sx+2,sy+3,4,2);
        ctx.fillStyle='#cc8800';ctx.fillRect(sx+3,sy+1,2,2);break;
      case 'health':
        ctx.fillStyle=p?'#ff2222':'#ff4444';
        ctx.fillRect(sx+1,sy+3,6,2);ctx.fillRect(sx+3,sy+1,2,6);
        ctx.fillStyle='#ff9999';ctx.fillRect(sx+2,sy+3,2,1);ctx.fillRect(sx+3,sy+2,1,2);break;
      case 'keycard':
        ctx.fillStyle='#44ff44';ctx.fillRect(sx,sy,8,6);
        ctx.fillStyle='#002200';ctx.fillRect(sx+1,sy+1,4,4);
        ctx.fillStyle='#00ff00';ctx.fillRect(sx+5,sy+2,2,2);
        ctx.fillStyle='#88ff88';ctx.fillRect(sx+1,sy+1,3,1);break;
      case 'disk':
        ctx.fillStyle=p?'#00eeff':'#00bbcc';
        ctx.beginPath();ctx.arc(sx+4,sy+4,4,0,6.28);ctx.fill();
        ctx.fillStyle='#003344';ctx.beginPath();ctx.arc(sx+4,sy+4,2,0,6.28);ctx.fill();
        ctx.fillStyle='#00ffff';ctx.fillRect(sx+3,sy,2,2);break;
      case 'bomb_item':
        ctx.fillStyle='#333';ctx.beginPath();ctx.arc(sx+4,sy+5,4,0,6.28);ctx.fill();
        ctx.fillStyle='#222';ctx.fillRect(sx+3,sy,2,4);
        ctx.fillStyle=p?'#ffff00':'#ff8800';ctx.fillRect(sx+3,sy,2,1);break;
      case 'shield':
        ctx.fillStyle=p?'#4488ff':'#2266dd';
        ctx.fillRect(sx+1,sy,6,7);ctx.fillRect(sx,sy+2,8,4);
        ctx.fillStyle='#aaccff';ctx.fillRect(sx+2,sy+1,4,1);break;
      case 'speed':
        ctx.fillStyle=p?'#88ffff':'#44aaaa';
        ctx.fillRect(sx+2,sy,4,8);ctx.fillRect(sx,sy+3,8,2);
        ctx.fillStyle='#fff';ctx.fillRect(sx+3,sy+1,2,1);break;
      case 'extralife':
        ctx.fillStyle=p?'#ff88ff':'#cc44cc';
        ctx.fillRect(sx+2,sy,4,4);ctx.fillRect(sx,sy+2,8,4);ctx.fillRect(sx+3,sy+5,2,3);
        ctx.fillStyle='#ffccff';ctx.fillRect(sx+3,sy+1,2,1);break;
    }
    // Subtle glow
    ctx.globalAlpha=0.18+Math.sin(it.bob)*0.08;
    ctx.fillStyle='#ffffff';ctx.fillRect(sx-1,sy-1,10,10);
    ctx.globalAlpha=1;
  });
}

function drawStars(){
  stars.forEach(s=>{
    const sx=Math.round(s.x-camX),sy=Math.round(s.y-camY);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(tick*0.4);
    ctx.fillStyle='#ffff22';ctx.fillRect(-4,-1,8,2);ctx.fillRect(-1,-4,2,8);
    ctx.rotate(0.785);ctx.fillStyle='#ffcc00';ctx.fillRect(-3,-1,6,2);ctx.fillRect(-1,-3,2,6);
    ctx.fillStyle='#fff';ctx.fillRect(-1,-1,2,2);
    ctx.restore();
  });
}

function drawBombs(){
  bombs.forEach(b=>{
    const sx=Math.round(b.x-camX),sy=Math.round(b.y-camY);
    ctx.fillStyle='#333';ctx.beginPath();ctx.arc(sx,sy,4,0,6.28);ctx.fill();
    ctx.fillStyle='#555';ctx.fillRect(sx-1,sy-4,2,4);
    ctx.fillStyle=(tick>>1)&1?'#ffff00':'#ff8800';ctx.fillRect(sx-1,sy-4,2,2);
  });
}

function drawBullets(){
  bullets.forEach(b=>{
    const sx=Math.round(b.x-camX),sy=Math.round(b.y-camY);
    ctx.fillStyle='#ffaa00';ctx.fillRect(sx-3,sy-1,5,2);
    ctx.fillStyle='#ffff88';ctx.fillRect(sx-1,sy,2,1);
  });
}

function drawPfx(){
  pfx.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
    ctx.fillStyle=p.col;
    ctx.fillRect(Math.round(p.x-camX),Math.round(p.y-camY),Math.ceil(p.sz),Math.ceil(p.sz));
  });
  ctx.globalAlpha=1;
}

function drawEnemies(){
  enemies.forEach(e=>{
    if(e.state==='dead')return;
    const sx=Math.round(e.x-camX),sy=Math.round(e.y-camY);
    if(sx<-40||sx>VW+40||sy<-40||sy>VH+40)return;
    if(e.type==='guard')drawGuard(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    else if(e.type==='dog')drawDog(sx,sy,e.dir,e.state,tick);
    else if(e.type==='heavy')drawHeavy(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    else if(e.type==='sniper')drawSniper(sx,sy,e.dir,e.state,e.health,e.maxHealth,tick);
    // Alert indicator
    if(e.state==='chase'){
      ctx.fillStyle='#ff0000';ctx.font='7px monospace';
      ctx.fillText('!',(e.alertTimer%18<9)?sx+e.w/2-2:sx+e.w/2-1,sy-10);
    }
  });
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.font='5px monospace';

  // Bottom bar
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,VH-28,VW,28);
  ctx.fillStyle='#0a0a00';ctx.fillRect(0,VH-29,VW,1);

  // Health pips
  ctx.fillStyle='#555';ctx.fillText('HP',2,VH-18);
  for(let i=0;i<P.maxHealth;i++){
    const hx=15+i*9,hy=VH-23;
    ctx.fillStyle=i<P.health?(P.health<=2?'#ff2200':P.health<=4?'#ff8800':'#ff3333'):'#180000';
    ctx.fillRect(hx,hy,7,6);
    if(i<P.health){ctx.fillStyle='rgba(255,200,200,0.4)';ctx.fillRect(hx,hy,7,1);}
  }

  // Stars
  ctx.fillStyle='#666';ctx.fillText('STAR',2,VH-8);
  ctx.fillStyle=P.stars>4?'#ffdd00':'#ff4400';
  ctx.fillText(String(P.stars).padStart(2,'0'),20,VH-8);

  // Bombs
  ctx.fillStyle='#666';ctx.fillText('BOM',28,VH-8);
  ctx.fillStyle=P.bombs>0?'#ff8800':'#333';
  ctx.fillText('x'+P.bombs,44,VH-8);

  // Lives
  ctx.fillStyle='#666';ctx.fillText('x',52,VH-18);
  ctx.fillStyle='#00cc00';ctx.fillText(P.lives,58,VH-18);

  // Score
  ctx.fillStyle='#555';ctx.fillText('SCORE',64,VH-18);
  ctx.fillStyle='#ffff44';ctx.fillText(String(P.score).padStart(8,'0'),88,VH-18);

  // Objectives row
  ctx.fillStyle=P.hasDisk?'#00ff88':'#222';ctx.fillText('[DISK]',64,VH-8);
  ctx.fillStyle=P.hasKeycard?'#44ff44':'#222';ctx.fillText('[KEY]',100,VH-8);

  // Status message
  if(!P.hasDisk){
    ctx.fillStyle='#ffaa00';ctx.fillText('OBJECTIVE: FIND THE DATA DISK — Floor 3',132,VH-18);
  }else if(!P.hasKeycard){
    ctx.fillStyle='#ffff00';ctx.fillText('OBJECTIVE: FIND THE KEYCARD — Floor 2',132,VH-18);
  }else{
    ctx.fillStyle=(tick>>4)&1?'#00ff88':'#00bb66';
    ctx.fillText('REACH THE HELICOPTER ON THE ROOF!',132,VH-18);
  }
  ctx.fillStyle='#444';ctx.fillText('FLOOR '+(Math.min(7,Math.floor(P.y/(TS*10))+1)),132,VH-8);

  // Active powerups
  if(P.shield>0){
    ctx.fillStyle='#4488ff';ctx.fillText('SHIELD',180,VH-8);
    ctx.fillStyle='rgba(68,136,255,0.5)';ctx.fillRect(0,0,Math.ceil(VW*P.shield/300),1);
  }
  if(P.speedBoost>0){ctx.fillStyle='#88ffff';ctx.fillText('SPEED',212,VH-8);}

  // Combo
  if(P.combo>=2&&P.comboTimer>0){
    ctx.globalAlpha=Math.min(1,P.comboTimer/40);
    ctx.font='bold 8px monospace';
    ctx.fillStyle='#ffff00';ctx.fillText(P.combo+'x COMBO!',VW/2-32,28);
    ctx.globalAlpha=1;ctx.font='5px monospace';
  }

  // Minimap
  const mm={x:VW-42,y:VH-27,w:40,h:24};
  ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(mm.x,mm.y,mm.w,mm.h);
  ctx.fillStyle='#222';ctx.fillRect(mm.x,mm.y,mm.w,1);ctx.fillRect(mm.x,mm.y,1,mm.h);
  ctx.fillStyle='#00ff00';
  ctx.fillRect(mm.x+Math.floor((P.x/(MW*TS))*mm.w),mm.y+Math.floor((P.y/(MH*TS))*mm.h),2,2);
  ctx.fillStyle='#00ffcc';
  ctx.fillRect(mm.x+Math.floor(94/MW*mm.w),mm.y+Math.floor(4/MH*mm.h),2,1);
  if(!P.hasDisk){ctx.fillStyle='#00ccff';ctx.fillRect(mm.x+Math.floor(53/MW*mm.w),mm.y+Math.floor(33/MH*mm.h),2,1);}
  if(!P.hasKeycard){ctx.fillStyle='#44ff44';ctx.fillRect(mm.x+Math.floor(90/MW*mm.w),mm.y+Math.floor(23/MH*mm.h),2,1);}
}

// ── VIGNETTE ──────────────────────────────────────────────────────────────────
function drawVignette(){
  const g=ctx.createRadialGradient(VW/2,VH/2,VH*0.2,VW/2,VH/2,VH*0.8);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=g;ctx.fillRect(0,0,VW,VH);
}

// ── SPLASH SCREEN ─────────────────────────────────────────────────────────────
let splashT=0;
function drawSplash(){
  splashT++;
  ctx.fillStyle='#000';ctx.fillRect(0,0,VW,VH);

  // Star field
  for(let i=0;i<110;i++){
    const sx=(i*137)%VW,sy=(i*97)%(VH*0.7);
    if((splashT+i*11)%70<63){
      ctx.globalAlpha=0.2+((i*37)%10)*0.08;
      ctx.fillStyle='#fff';ctx.fillRect(sx,sy,1,1);
    }
  }
  ctx.globalAlpha=1;

  // City silhouette
  const bldgs=[[0,155,28,45],[25,143,22,57],[46,138,18,62],[62,150,32,50],
               [92,128,24,72],[114,143,27,57],[139,133,19,67],[157,147,26,53],
               [181,144,20,56],[199,126,28,74],[225,138,23,62],[246,146,26,54],
               [270,152,20,48],[288,143,20,57]];
  ctx.fillStyle='#080808';
  bldgs.forEach(([bx,by,bw,bh])=>ctx.fillRect(bx,by,bw,bh));
  // Windows flicker
  bldgs.forEach(([bx,by,bw,bh])=>{
    for(let wy=by+5;wy<VH-2;wy+=7)for(let wx=bx+3;wx<bx+bw-3;wx+=5){
      if((splashT*0.015+wx*0.3+wy*0.2)%1<0.62){
        ctx.fillStyle=(wx+wy)%3===0?'#ffe070':'#6699ff';
        ctx.globalAlpha=0.55;ctx.fillRect(wx,wy,3,4);ctx.globalAlpha=1;
      }
    }
  });

  // Scanlines
  for(let y=0;y<VH;y+=3){ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,y,VW,1);}

  // Title glow
  const titleY=Math.max(32,55-splashT*0.55);
  ctx.save();
  // glow layers
  for(let g=4;g>0;g--){
    ctx.globalAlpha=0.08/g;ctx.fillStyle='#00ff66';ctx.font=`bold ${18+g*2}px monospace`;
    ctx.fillText('SABOTEUR',VW/2-54-g,titleY+g);
  }
  ctx.globalAlpha=1;
  ctx.font='bold 16px monospace';
  ctx.fillStyle='#004422';ctx.fillText('SABOTEUR',VW/2-54,titleY+1);
  ctx.fillStyle='#00ff66';ctx.fillText('SABOTEUR',VW/2-54,titleY);
  ctx.font='bold 7px monospace';
  ctx.fillStyle='#006633';ctx.fillText('II — SHADOW OPERATIVE',VW/2-52,titleY+14);
  ctx.fillStyle='#44ff88';ctx.fillText('II — SHADOW OPERATIVE',VW/2-52,titleY+13);
  ctx.restore();

  // Divider
  const dw=Math.min(VW-40,splashT*4);
  ctx.fillStyle='#00aa44';ctx.fillRect(VW/2-dw/2,titleY+20,dw,1);
  ctx.fillStyle='#003311';ctx.fillRect(VW/2-dw/2,titleY+22,dw,1);

  // Ninja silhouette
  const nY=Math.floor(titleY+40);
  if(splashT>15){
    ctx.save();ctx.translate(VW/2-6,nY);
    ctx.fillStyle='#111';ctx.fillRect(1,4,10,12);
    ctx.fillStyle='#c89966';ctx.fillRect(2,1,8,6);
    ctx.fillStyle='#cc1111';ctx.fillRect(2,2,8,3);
    ctx.fillStyle='#fff';ctx.fillRect(6,2,3,1);
    ctx.fillStyle='#aa0000';ctx.fillRect(1,6,10,2);
    const aR=(splashT>>4)%4;
    ctx.fillStyle='#111';
    ctx.fillRect(2,16,4,4+(aR<2?2:0));ctx.fillRect(7,16,4,4+(aR>=2?2:0));
    ctx.fillRect(-2,5+(aR<2?1:-1),3,6);ctx.fillRect(11,5-(aR<2?1:-1),3,6);
    ctx.restore();
  }

  // Briefing text
  ctx.font='5px monospace';
  const lines=[
    {t:'  MISSION BRIEFING:',c:'#88ff88'},
    {t:'  You are KAGE — elite shadow operative.',c:'#aaffaa'},
    {t:'  Infiltrate the 7-floor research facility.',c:'#aaffaa'},
    {t:'  Steal the DATA DISK from Floor 3.',c:'#aaffaa'},
    {t:'  Collect the SECURITY KEYCARD on Floor 2.',c:'#aaffaa'},
    {t:'  Escape via the HELICOPTER on the ROOF.',c:'#ffcc66'},
    {t:'  Eliminate guards, dogs, snipers and heavies.',c:'#ffcc66'},
  ];
  lines.forEach((ln,i)=>{
    const a=Math.min(1,Math.max(0,(splashT-55-i*14)/18));
    if(a<=0)return;
    ctx.globalAlpha=a;ctx.fillStyle=ln.c;
    ctx.fillText(ln.t,VW/2-(ln.t.length*2.9),nY+28+i*10);
  });
  ctx.globalAlpha=1;

  // Speed selection menu
  if(splashT>100){
    ctx.font='6px monospace';
    ctx.fillStyle='#ffcc44';ctx.fillText('SELECT GAME SPEED:',VW/2-45,VH-38);
    ctx.font='5px monospace';
    // Slow
    const slowCol=gameSpeed===0.42?'#00ff44':'#aaaaaa';
    ctx.fillStyle=slowCol;ctx.fillRect(VW/2-75,VH-32,30,8);
    ctx.fillStyle='#000';ctx.font='5px monospace';ctx.fillText('SLOW',VW/2-73,VH-26);
    // Normal
    const normCol=gameSpeed===0.78?'#00ff44':'#aaaaaa';
    ctx.fillStyle=normCol;ctx.fillRect(VW/2-40,VH-32,30,8);
    ctx.fillStyle='#000';ctx.fillText('NORMAL',VW/2-38,VH-26);
    // Fast
    const fastCol=gameSpeed===1.0?'#00ff44':'#aaaaaa';
    ctx.fillStyle=fastCol;ctx.fillRect(VW/2-5,VH-32,30,8);
    ctx.fillStyle='#000';ctx.fillText('FAST',VW/2-2,VH-26);
    // Instructions
    ctx.fillStyle='#777';ctx.font='4px monospace';
    ctx.fillText('Press 1, 2, or 3 to select speed',VW/2-52,VH-18);
  }

  // Controls
  ctx.fillStyle='#1a1a1a';ctx.font='4px monospace';
  ctx.fillText('← → MOVE | ↑/SPC JUMP | ↓ LADDER | Z KICK | X PUNCH | C STAR | B BOMB | SHIFT CROUCH',VW/2-95,VH-12);

  // Press key blink
  if(splashT>90&&(splashT>>4)&1){
    ctx.fillStyle='#ffff44';ctx.font='7px monospace';
    ctx.fillText('— PRESS ANY KEY TO BEGIN —',VW/2-64,VH-23);
  }
}

// ── GAME OVER / WIN ───────────────────────────────────────────────────────────
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.fillRect(0,0,VW,VH);
  for(let y=0;y<VH;y+=2){ctx.fillStyle='rgba(70,0,0,0.14)';ctx.fillRect(0,y,VW,1);}
  if(tick%7===0){ctx.fillStyle='rgba(255,0,0,0.08)';ctx.fillRect(0,Math.random()*VH,VW,2);}
  ctx.font='bold 14px monospace';
  ctx.fillStyle='#550000';ctx.fillText('MISSION FAILED',VW/2-56,VH/2-24);
  ctx.fillStyle='#cc2200';ctx.fillText('MISSION FAILED',VW/2-56,VH/2-25);
  ctx.fillStyle='#ff4422';ctx.fillText('MISSION FAILED',VW/2-56,VH/2-26);
  ctx.font='6px monospace';
  ctx.fillStyle='#ff8866';ctx.fillText('KAGE WAS NEUTRALIZED',VW/2-45,VH/2-6);
  ctx.fillStyle='#ffcc44';ctx.fillText('FINAL SCORE: '+String(P.score).padStart(8,'0'),VW/2-52,VH/2+10);
  if((tick>>4)&1){ctx.fillStyle='#fff';ctx.font='6px monospace';ctx.fillText('PRESS ANY KEY TO RETRY',VW/2-50,VH/2+28);}
}

function drawWin(){
  ctx.fillStyle='rgba(0,10,4,0.93)';ctx.fillRect(0,0,VW,VH);
  for(let i=0;i<55;i++){
    const cx=(i*73+tick*0.9)%VW,cy=(i*111+tick*0.5)%VH;
    ctx.fillStyle=i%4===0?'#00ff66':i%4===1?'#44ffaa':i%4===2?'#ffff44':'#ff88ff';
    ctx.fillRect(cx,cy,2,2);
  }
  ctx.font='bold 12px monospace';
  ctx.fillStyle='#004422';ctx.fillText('MISSION COMPLETE!',VW/2-62,VH/2-30);
  ctx.fillStyle='#00ff66';ctx.fillText('MISSION COMPLETE!',VW/2-62,VH/2-32);
  ctx.font='6px monospace';
  ctx.fillStyle='#aaffcc';ctx.fillText('KAGE ESCAPES WITH THE DATA!',VW/2-58,VH/2-12);
  ctx.fillStyle='#ffff44';ctx.font='7px monospace';
  ctx.fillText('FINAL SCORE: '+String(P.score).padStart(8,'0'),VW/2-58,VH/2+8);
  if((tick>>4)&1){ctx.fillStyle='#fff';ctx.font='6px monospace';ctx.fillText('PRESS ANY KEY TO PLAY AGAIN',VW/2-58,VH/2+28);}
}

// ── INIT & MAIN LOOP ──────────────────────────────────────────────────────────
let gameState='SPLASH';
function initGame(){
  buildMap();resetPlayer();spawnEnemies();spawnItems();
  pfx=[];stars=[];bombs=[];bullets=[];camX=0;camY=0;
  simAccumulator=0;
}

function loop(){
  requestAnimationFrame(loop);
  tick++;
  updateShake();
  ctx.save();
  if(shakePow>0.2)ctx.translate(Math.round(shakeX),Math.round(shakeY));

  if(gameState==='SPLASH'){
    drawSplash();
    if(splashT>100&&speedSelected&&anyKey()){gameState='PLAYING';initGame();splashT=0;speedSelected=false;AC.resume();}
    ctx.restore();return;
  }
  if(gameState==='GAMEOVER'){
    drawGameOver();
    if(anyKey()){gameState='SPLASH';splashT=0;speedSelected=false;gameSpeed=0.78;}
    ctx.restore();return;
  }
  if(gameState==='WIN'){
    drawWin();
    if(anyKey()){gameState='SPLASH';splashT=0;speedSelected=false;gameSpeed=0.78;}
    ctx.restore();return;
  }

  // Keep player physics at render cadence so jump arc/height stays identical
  // regardless of speed preset, while world simulation still time-scales.
  updatePlayer();

  // Time-scale non-player systems by varying fixed simulation ticks per frame.
  simAccumulator+=gameSpeed;
  while(simAccumulator>=1){
    updateEnemies();
    updateItems();
    updateStars();
    updateBombs();
    updateBullets();
    updatePfx();
    updateMovPlats();
    simAccumulator-=1;
  }

  // Camera should always follow the player smoothly at display frame rate.
  updateCamera();

  drawMap();
  drawItems();
  drawBombs();
  drawBullets();
  drawEnemies();
  drawStars();
  drawNinja(Math.round(P.x-camX),Math.round(P.y-camY),P.dir,P.state,P.invincible,tick);
  drawPfx();
  drawVignette();
  drawHUD();

  ctx.restore();
}

loop();
</script>
