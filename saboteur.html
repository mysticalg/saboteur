<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SABOTEUR II — SHADOW OPERATIVE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:radial-gradient(circle at top,#0b1016 0%,#05070a 45%,#000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;color:#8aa7b8;font-family:monospace;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;border:1px solid #1b2935;box-shadow:0 0 0 1px #0a1118 inset,0 18px 40px rgba(0,0,0,.65),0 0 28px rgba(0,255,140,.12);border-radius:6px;}
#top-ui{display:flex;align-items:center;justify-content:space-between;gap:10px;width:min(640px,94vw);margin-bottom:8px;font-size:11px;letter-spacing:.4px;color:#83a5b9;}
#top-ui .label{display:flex;align-items:center;gap:6px;opacity:.95;}
.ui-actions{display:flex;gap:6px;}
.ui-btn{appearance:none;border:1px solid #2f4c5f;background:#0d171f;color:#b3dbf2;font:11px monospace;padding:4px 8px;border-radius:6px;cursor:pointer;line-height:1;}
.ui-btn:hover{background:#122434;color:#d9f1ff;}
.ui-btn:focus-visible{outline:2px solid #52d5ff;outline-offset:1px;}
#keys{color:#2b4254;font:10px monospace;margin-top:8px;letter-spacing:.3px;text-align:center;max-width:min(900px,96vw);line-height:1.4;}
</style>
</head>
<body>
<div id="top-ui">
  <div class="label">🕶️ <span>SABOTEUR II · Infiltration Console</span></div>
  <div class="ui-actions">
    <button id="btnPause" class="ui-btn" title="Pause/Resume (P)">⏯ Pause</button>
    <button id="btnHelp" class="ui-btn" title="Toggle quick help (H)">❔ Help</button>
    <button id="btnMute" class="ui-btn" title="Mute sound effects (M)">🔊 Sound</button>
  </div>
</div>
<canvas id="c"></canvas>
<div id="keys">← → MOVE/LEAP OFF LADDER · SHIFT SPRINT · ↑/SPACE JUMP · ↓ HOLD WHILE STILL = SHADOW · ↓/↑ LADDER (SLOW) · Z/X/C ATTACK · B BOMB (5s COOLDOWN) · P PAUSE · H HELP · M MUTE</div>
<script>
'use strict';
// ── CANVAS ────────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const btnPause=document.getElementById('btnPause');
const btnHelp=document.getElementById('btnHelp');
const btnMute=document.getElementById('btnMute');
const SCALE=2,VW=320,VH=200;
canvas.width=VW*SCALE; canvas.height=VH*SCALE;
ctx.scale(SCALE,SCALE);
ctx.imageSmoothingEnabled=false;

// ── AUDIO ─────────────────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function snd(freq,type,dur,vol,freqEnd){
  if(sfxMuted)return;
  try{
    const g=AC.createGain(),o=AC.createOscillator();
    o.connect(g);g.connect(AC.destination);
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,AC.currentTime);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd,AC.currentTime+dur);
    g.gain.setValueAtTime(vol||0.15,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.01);
  }catch(e){}
}
const SFX={
  jump:  ()=>snd(200,'sine',0.15,0.12,420),
  // Walking/footstep-style landing audio intentionally disabled per UX request.
  land:  ()=>{},
  kick:  ()=>snd(160,'sawtooth',0.1,0.22,55),
  punch: ()=>snd(190,'square',0.09,0.2,65),
  star:  ()=>snd(750,'sawtooth',0.14,0.12,180),
  shoot: ()=>snd(550,'square',0.07,0.12,90),
  bomb:  ()=>{ snd(90,'sawtooth',0.5,0.4,18);snd(200,'sine',0.3,0.25,30); },
  hurt:  ()=>snd(110,'sawtooth',0.22,0.28,38),
  die:   ()=>{ snd(280,'sawtooth',0.55,0.35,28);setTimeout(()=>snd(60,'sawtooth',0.4,0.2,20),200); },
  pickup:()=>{ snd(440,'sine',0.08,0.18,880);setTimeout(()=>snd(660,'sine',0.1,0.14,1320),80); },
  keycard:()=>{ for(let i=0;i<3;i++) setTimeout(()=>snd(440+i*220,'sine',0.12,0.18),i*80); },
  disk:  ()=>{ for(let i=0;i<4;i++) setTimeout(()=>snd(330+i*110,'sine',0.15,0.2),i*90); },
  win:   ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>snd(f,'sine',0.3,0.25),i*120)); },
};

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TS=16,MW=120,MH=80;
const T_EMPTY=0,T_SOLID=1,T_PLAT=2,T_LADDER=3,T_WATER=4,T_SPIKE=5,T_EXIT=6,T_CRATE=7;
// Gameplay tweak: bombs are now unlimited for constant demolition flow.
const INFINITE_BOMBS=true;
// Bomb throws are rate-limited to keep explosive power intentional and readable.
const BOMB_COOLDOWN_MS=5000;

// UI toggles keep the game accessible with both keyboard and mouse.
let paused=false;
let showHelp=false;
let sfxMuted=false;
let rain=[];
function syncUiButtons(){
  btnPause.textContent=paused?'▶ Resume':'⏯ Pause';
  btnHelp.textContent=showHelp?'✖ Close Help':'❔ Help';
  btnMute.textContent=sfxMuted?'🔇 Muted':'🔊 Sound';
}
btnPause.addEventListener('click',()=>{if(gameState==='PLAYING'){paused=!paused;syncUiButtons();}});
btnHelp.addEventListener('click',()=>{showHelp=!showHelp;syncUiButtons();});
btnMute.addEventListener('click',()=>{sfxMuted=!sfxMuted;syncUiButtons();});
syncUiButtons();

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys={},pressed={};
window.addEventListener('keydown',e=>{
  // Speed selection on splash screen
  if(gameState==='SPLASH'&&splashT>100){
    if(e.key==='1'){gameSpeed=0.42;speedSelected=true;e.preventDefault();return;}
    if(e.key==='2'){gameSpeed=0.78;speedSelected=true;e.preventDefault();return;}
    if(e.key==='3'){gameSpeed=1.0;speedSelected=true;e.preventDefault();return;}
  }
  if(e.code==='KeyP'&&gameState==='PLAYING'){paused=!paused;syncUiButtons();e.preventDefault();return;}
  if(e.code==='KeyH'){showHelp=!showHelp;syncUiButtons();e.preventDefault();return;}
  if(e.code==='KeyM'){sfxMuted=!sfxMuted;syncUiButtons();e.preventDefault();return;}
  if(!keys[e.code])pressed[e.code]=true;
  keys[e.code]=true;
  ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)&&e.preventDefault();
  if(AC.state==='suspended')AC.resume();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
function anyKey(){return Object.values(keys).some(v=>v);}
function clearPressed(){for(let k in pressed)pressed[k]=false;}

// ── SCREEN SHAKE ──────────────────────────────────────────────────────────────
let shakeX=0,shakeY=0,shakePow=0;
function addShake(p){shakePow=Math.max(shakePow,p);}
function updateShake(){
  if(shakePow>0.2){shakeX=(Math.random()-.5)*shakePow;shakeY=(Math.random()-.5)*shakePow;shakePow*=0.72;}
  else{shakeX=0;shakeY=0;shakePow=0;}
}

function updateRain(){
  for(const drop of rain){
    drop.x-=drop.vx;
    drop.y+=drop.vy;
    if(drop.y>VH+6){drop.y=-Math.random()*14;drop.x=Math.random()*VW;}
    if(drop.x<-8)drop.x=VW+Math.random()*8;
  }
}

// ── GAME SPEED ────────────────────────────────────────────────────────────────
let gameSpeed=0.78;
let speedSelected=false;
// Fixed-step pacing accumulator. Values below 1.0 intentionally skip simulation
// updates on some render frames so all physics/timers/combat slow down evenly.
let simAccumulator=0;

// Mission timer: 20 minute countdown, pauses once all keycards are collected.
let missionTimeLeftMs=20*60*1000;
let missionTimerRunning=true;
let missionTimeout=false;
let lastFrameMs=performance.now();

// Keycard tracking supports multi-keycard setups without hard-coding counts.
let totalKeycards=0;
let keycardsFound=0;

// Outside parallax offset: camera-driven (only while screen actually scrolls).
let skylineOffsetX=0;
let prevCamX=0;
// Underground torches and cavern lights are populated during map build.
let cavernTorches=[];

// Lightweight star field for outdoor scenes near the roof.
let skyStars=[];

// ── MAP ───────────────────────────────────────────────────────────────────────
const map=new Uint8Array(MW*MH);
const setT=(x,y,t)=>{if(x>=0&&x<MW&&y>=0&&y<MH)map[y*MW+x]=t;};
const getT=(x,y)=>{if(x<0||x>=MW||y<0||y>=MH)return T_SOLID;return map[y*MW+x];};
const isSolid=(x,y)=>{const t=getT(x,y);return t===T_SOLID||t===T_SPIKE||t===T_CRATE;};
const isPlat=(x,y)=>getT(x,y)===T_PLAT;
const isLadder=(x,y)=>getT(x,y)===T_LADDER;
function fillR(x,y,w,h,t){for(let ry=y;ry<y+h;ry++)for(let rx=x;rx<x+w;rx++)setT(rx,ry,t);}

// Moving platforms
let movPlats=[];

function buildMap(){
  fillR(0,0,MW,MH,T_EMPTY);

  // ROOF row 4 — helipad on right
  fillR(0,4,MW,1,T_SOLID);
  fillR(90,4,14,1,T_EXIT);
  // Ladder shafts are intentionally segmented so each one spans only
  // 2-3 floors maximum instead of running through the whole building.

  // Helper to build a floor slab
  function floor(y0,y1,walls,plats,spikes,water,crates){
    fillR(0,y1,MW,1,T_SOLID);
    fillR(0,y0,1,y1-y0,T_SOLID);fillR(MW-1,y0,1,y1-y0,T_SOLID);
    walls.forEach(wx=>{
      fillR(wx,y0,1,y1-y0,T_SOLID);
      // door gap 3 tiles
      const mid=Math.floor((y0+y1)/2);
      setT(wx,mid-1,T_EMPTY);setT(wx,mid,T_EMPTY);setT(wx,mid+1,T_EMPTY);
    });
    plats.forEach(([px,py,pw])=>fillR(px,py,pw,1,T_PLAT));
    spikes&&spikes.forEach(([sx,sw])=>fillR(sx,y1-1,sw,1,T_SPIKE));
    water&&water.forEach(([wx2,ww])=>fillR(wx2,y1-1,ww,1,T_WATER));
    crates&&crates.forEach(([cx])=>setT(cx,y1-1,T_CRATE));
  }

  // Floor 1 rows 5-14
  floor(5,14,[20,40,60,80,100],
    [[4,11,8],[22,10,7],[42,12,6],[62,10,8],[82,11,7],[103,10,7]],
    null,null,
    [[15],[35],[55],[75],[95],[112]]);

  // Floor 2 rows 15-24
  floor(15,24,[25,50,75,100],
    [[5,20,8],[14,22,7],[28,19,9],[40,21,7],[55,18,9],[65,21,8],[78,20,9],[103,19,8]],
    null,[[10,6],[45,8]],
    [[8],[32],[62],[85],[110]]);

  // Floor 3 rows 25-34  ← DATA DISK here
  floor(25,34,[35,70],
    [[5,30,9],[17,32,8],[38,28,10],[52,31,8],[72,29,9],[85,32,8],[103,28,9]],
    [[15,6],[60,5],[90,5]],[[80,8]],null);

  // Floor 4 rows 35-44
  floor(35,44,[28,55,85],
    [[4,40,8],[14,42,7],[30,38,9],[43,41,7],[57,39,9],[70,41,8],[87,39,9],[110,38,8]],
    null,[[8,7],[42,10],[72,6],[100,7]],
    [[20],[60],[95]]);

  // Floor 5 rows 45-54
  floor(45,54,[20,45,70,95],
    [[4,50,9],[13,52,8],[22,49,7],[36,51,9],[48,48,10],[62,52,8],[73,49,9],[100,48,10]],
    [[30,7],[65,6]],[[0,MW]],null); // full water bottom

  // Floor 6 rows 55-64  ← server room
  floor(55,64,[30,60,90],
    [[4,60,9],[14,62,7],[32,58,9],[48,61,8],[62,59,9],[75,62,8],[92,58,10],[108,61,8]],
    [[15,8],[50,10],[80,8]],null,
    [[8],[22],[45],[68],[85],[105]]);

  // Floor 7 rows 65-74  ← basement vault
  floor(65,74,[40,80],
    [[4,70,9],[15,72,7],[42,69,9],[55,72,8],[65,70,9],[82,72,8],[95,69,10],[112,72,5]],
    null,[[0,MW]],null); // water floor

  function addLadderSegment(x,yTop,yBottom){
    for(let y=yTop;y<=yBottom;y++){
      // Carve a traversable shaft through floor slabs only where this ladder
      // segment exists, so you can pass between floors at ladder crossings.
      // The segment still ends exactly at yBottom (no spill below its endpoint).
      const t=getT(x,y);
      if(t===T_EMPTY||t===T_LADDER||t===T_SOLID)setT(x,y,T_LADDER);
    }
  }
  const ladderSegments=[
    // Roof access + upper floors
    [12,1,24],[50,3,24],[90,1,24],
    // Mid floors (3-floor and 2-floor shafts)
    [30,15,44],[70,25,54],[108,25,54],
    // Lower floors
    [12,45,74],[50,45,74],[90,55,74]
  ];
  ladderSegments.forEach(([x,yTop,yBottom])=>addLadderSegment(x,yTop,yBottom));

  // Carve an underground cavern network in lower floors where visibility is limited.
  // These tunnels create optional side routes and ambush pockets.
  function carveCavernPath(startX,endX,baseY,waveAmp,width){
    const minX=Math.min(startX,endX),maxX=Math.max(startX,endX);
    for(let x=minX;x<=maxX;x++){
      const t=(x-minX)/Math.max(1,(maxX-minX));
      const cy=Math.round(baseY+Math.sin(t*6.2831)*waveAmp);
      for(let y=cy-width;y<=cy+width;y++)setT(x,y,T_EMPTY);
      // Add occasional lip platforms inside the cave path for traversal variety.
      if(x%9===0&&cy+width+1<MH-1)for(let lx=-1;lx<=1;lx++)setT(x+lx,cy+width+1,T_PLAT);
    }
  }
  // Use narrow widths for claustrophobic cave movement.
  carveCavernPath(6,38,67,2,1);
  carveCavernPath(42,78,70,1,1);
  carveCavernPath(82,114,66,2,1);

  // Reinforce cave shells with thick solid bands to feel enclosed and heavy.
  for(let x=4;x<116;x++)for(let y=61;y<=74;y++)if(getT(x,y)===T_EMPTY){
    if(getT(x,y-2)!==T_EMPTY)setT(x,y-2,T_SOLID);
    if(getT(x,y+2)!==T_EMPTY)setT(x,y+2,T_SOLID);
    if(getT(x-2,y)!==T_EMPTY)setT(x-2,y,T_SOLID);
    if(getT(x+2,y)!==T_EMPTY)setT(x+2,y,T_SOLID);
  }

  // Tight vertical shafts with thick wall columns for pressure-corridor gameplay.
  function carveShaft(x,yTop,yBottom){
    for(let y=yTop;y<=yBottom;y++){
      setT(x,y,T_EMPTY);
      setT(x-1,y,T_EMPTY);
      setT(x-3,y,T_SOLID);setT(x-2,y,T_SOLID);
      setT(x+2,y,T_SOLID);setT(x+3,y,T_SOLID);
    }
    for(let y=yTop;y<=yBottom;y++)setT(x,y,T_LADDER);
  }
  carveShaft(18,60,73);
  carveShaft(58,58,73);
  carveShaft(97,60,73);

  // Place torches as static light emitters to guide navigation in darkness.
  cavernTorches=[
    {x:10,y:63,flicker:0.7},{x:23,y:68,flicker:1.1},{x:36,y:64,flicker:0.9},
    {x:48,y:71,flicker:1.3},{x:66,y:67,flicker:0.8},{x:76,y:72,flicker:1.2},
    {x:88,y:64,flicker:0.95},{x:101,y:69,flicker:1.4},{x:112,y:66,flicker:1.0},
  ];

  // Moving platforms
  movPlats=[
    {x:48*TS,y:11*TS,w:4*TS,h:4,dir:1,spd:0.7,min:38*TS,max:58*TS},
    {x:35*TS,y:21*TS,w:3*TS,h:4,dir:-1,spd:0.6,min:27*TS,max:44*TS},
    {x:65*TS,y:29*TS,w:4*TS,h:4,dir:1,spd:0.55,min:55*TS,max:78*TS},
    {x:80*TS,y:40*TS,w:3*TS,h:4,dir:-1,spd:0.8,min:68*TS,max:88*TS},
    {x:25*TS,y:50*TS,w:4*TS,h:4,dir:1,spd:0.65,min:14*TS,max:36*TS},
    {x:47*TS,y:60*TS,w:3*TS,h:4,dir:1,spd:0.9,min:36*TS,max:62*TS},
  ];
}

function validateMapLayout(){
  // Lightweight map diagnostics catch authoring mistakes early in development.
  let exits=0,ladders=0,hazards=0,crates=0;
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){
    const t=getT(x,y);
    if(t===T_EXIT)exits++;
    else if(t===T_LADDER)ladders++;
    else if(t===T_SPIKE||t===T_WATER)hazards++;
    else if(t===T_CRATE)crates++;
  }
  const issues=[];
  if(exits!==1)issues.push(`expected 1 exit, found ${exits}`);
  if(ladders<40)issues.push(`unexpectedly low ladder count (${ladders})`);
  if(hazards<20)issues.push(`hazard coverage too low (${hazards})`);
  if(crates<6)issues.push(`crate count too low (${crates})`);
  if(issues.length)console.warn('Map validation warnings:',issues.join('; '));
}

// ── PHYSICS ───────────────────────────────────────────────────────────────────
const GRAV=0.38,MAXFALL=8;
function isBlockingTile(e,tx,ty){
  // Enemies treat ladder shafts as solid so they avoid ladder holes and stay on floors.
  return isSolid(tx,ty)||(e!==P&&isLadder(tx,ty));
}
function moveEntity(e){
  e.x+=e.vx;
  let tx1=Math.floor(e.x/TS),tx2=Math.floor((e.x+e.w-1)/TS);
  let ty1=Math.floor(e.y/TS),ty2=Math.floor((e.y+e.h-1)/TS);
  for(let ty=ty1;ty<=ty2;ty++)for(let tx=tx1;tx<=tx2;tx++){
    if(isBlockingTile(e,tx,ty)){
      if(e.vx>0){e.x=tx*TS-e.w;e.vx=0;}
      else if(e.vx<0){e.x=(tx+1)*TS;e.vx=0;}
    }
  }
  if(!e.onLadder){
    const gravMul=e.gravMul||1;
    e.vy=Math.min(e.vy+GRAV*gravMul,MAXFALL);
  }
  e.y+=e.vy;
  e.onGround=false;
  tx1=Math.floor(e.x/TS);tx2=Math.floor((e.x+e.w-1)/TS);
  ty1=Math.floor(e.y/TS);ty2=Math.floor((e.y+e.h-1)/TS);
  for(let tx=tx1;tx<=tx2;tx++)for(let ty=ty1;ty<=ty2;ty++){
    if(isBlockingTile(e,tx,ty)){
      if(e.vy>0){e.y=ty*TS-e.h;e.vy=0;e.onGround=true;}
      else if(e.vy<0){e.y=(ty+1)*TS;e.vy=0;}
    }
  }
  // One-way platforms
  if(e.vy>=0&&!e.onGround&&!e.onLadder){
    const foot=e.y+e.h,fTile=Math.floor(foot/TS);
    if(Math.floor((foot-e.vy)/TS)<fTile){
      tx1=Math.floor(e.x/TS);tx2=Math.floor((e.x+e.w-1)/TS);
      for(let tx=tx1;tx<=tx2;tx++){
        if(isPlat(tx,fTile)){e.y=fTile*TS-e.h;e.vy=0;e.onGround=true;}
      }
    }
  }
  // Moving platform collision
  if(e.vy>=0&&!e.onGround&&!e.onLadder){
    for(const mp of movPlats){
      if(e.x+e.w>mp.x&&e.x<mp.x+mp.w){
        const foot=e.y+e.h,prev=foot-e.vy;
        if(prev<=mp.y+4&&foot>=mp.y){
          e.y=mp.y-e.h;e.vy=0;e.onGround=true;
          if(e===P)e.x+=mp.dir*mp.spd;
        }
      }
    }
  }
}
function overlaps(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// ── PLAYER ────────────────────────────────────────────────────────────────────
const PW=12,PH=20;
let P={};
function resetPlayer(){
  P={x:3*TS,y:4*TS-PH-1,w:PW,h:PH,
     vx:0,vy:0,dir:1,
     // Heavily reduced gravity to make jumps much slower in time.
     gravMul:0.045,
     onGround:false,onLadder:false,
     state:'idle',stateTimer:0,
     health:6,maxHealth:6,
     stars:10,bombs:INFINITE_BOMBS?Infinity:3,lives:3,score:0,
     hasDisk:false,hasKeycard:false,
     shield:0,speedBoost:0,
     invincible:0,attackCooldown:0,attackBox:null,
     // Timestamp (in ms) when the next bomb throw becomes available.
     nextBombAtMs:0,
     combo:0,comboTimer:0,crouching:false,
     // Shadow stance: while holding down and perfectly still, KAGE blends in.
     shadowMode:false,
     // Turn-lean timer drives quick left/right pivot animation readability.
     turnTimer:0,lastFacingDir:1};
}

function getBombCooldownRemainingMs(){
  return Math.max(0,P.nextBombAtMs-performance.now());
}

function canThrowBombNow(){
  return getBombCooldownRemainingMs()===0;
}

function playerHit(dmg){
  if(P.invincible>0||P.shield>0)return;
  P.shadowMode=false;
  P.health-=dmg;
  SFX.hurt();addShake(4+dmg*2);
  spawnPfx(P.x+PW/2,P.y+PH/2,7,'#ff6622');
  P.combo=0;P.comboTimer=0;
  if(P.health<=0){P.health=0;killPlayer();return;}
  // Reduce hurt bounce to 25% of prior knockback for steadier control.
  P.state='hurt';P.stateTimer=18;P.invincible=70;P.vy=-0.625;
}

function killPlayer(){
  P.lives--;SFX.die();addShake(10);
  if(P.lives<=0){P.lives=0;setTimeout(()=>{gameState='GAMEOVER';},1800);P.state='dead';return;}
  P.x=3*TS;P.y=4*TS-PH-1;P.vx=0;P.vy=0;
  P.health=P.maxHealth;P.state='hurt';P.stateTimer=30;P.invincible=120;
}

function updatePlayer(){
  if(P.state==='dead')return;
  if(P.invincible>0)P.invincible--;
  if(P.shield>0)P.shield--;
  if(P.speedBoost>0)P.speedBoost--;
  if(P.attackCooldown>0)P.attackCooldown--;
  if(P.comboTimer>0){P.comboTimer--;if(P.comboTimer<=0)P.combo=0;}
  P.attackBox=null;
  const walkSpd=P.speedBoost>0?2.8:2.2;
  const sprinting=!!(keys['ShiftLeft']||keys['ShiftRight']);
  // Global horizontal movement is tuned to half speed.
  const spd=(sprinting?(walkSpd+1.0):walkSpd)*0.5;

  if(P.state==='kick'||P.state==='punch'){
    P.stateTimer--;
    if(P.stateTimer>4){
      const bw=24,bh=10;
      P.attackBox={x:P.dir>0?P.x+PW:P.x-bw,y:P.y+(P.state==='kick'?PH*0.55:PH*0.2),w:bw,h:bh};
    }
    if(P.stateTimer<=0)P.state=P.onLadder?'climb':(P.onGround?'idle':'fall');
    moveEntity(P);return;
  }
  if(P.state==='throw'){
    P.stateTimer--;
    if(P.stateTimer===3)spawnStar();
    if(P.stateTimer<=0)P.state=P.onLadder?'climb':(P.onGround?'idle':'fall');
    moveEntity(P);return;
  }
  if(P.state==='bomb_throw'){
    P.stateTimer--;
    if(P.stateTimer===3)spawnBomb();
    if(P.stateTimer<=0)P.state=P.onLadder?'climb':(P.onGround?'idle':'fall');
    moveEntity(P);return;
  }
  if(P.state==='hurt'){
    P.stateTimer--;
    if(P.stateTimer<=0)P.state='idle';
    moveEntity(P);return;
  }

  // Ladder: remain attached when idle on a ladder, move with up/down,
  // allow left/right to jump off, and allow core attacks while attached.
  const cx=Math.floor((P.x+PW/2)/TS);
  const onLT=isLadder(cx,Math.floor((P.y+2)/TS))||isLadder(cx,Math.floor((P.y+PH/2)/TS));
  // Down/Up are ladder controls only (crouch disabled).
  const wantsLadderMove=keys['ArrowUp']||keys['ArrowDown'];
  const ladderJumpOff=keys['ArrowLeft']||keys['ArrowRight'];
  if((P.onLadder&&onLT)||(onLT&&wantsLadderMove)){
    P.onLadder=true;
    P.crouching=false;
    P.x=cx*TS+(TS-PW)/2;
    if(ladderJumpOff){
      P.onLadder=false;
      // Small dismount hop from ladders for tighter control.
      P.vx=(keys['ArrowLeft']?-1:1)*(spd*0.6);
      P.vy=-1.4;
      P.state='jump';
      moveEntity(P);
      clearPressed();
      return;
    }
    // Attacks are available while hanging on ladders.
    if(pressed['KeyZ']&&P.attackCooldown<=0){
      P.vx=0;P.vy=0;P.state='kick';P.stateTimer=13;P.attackCooldown=22;pressed['KeyZ']=false;SFX.kick();
      moveEntity(P);clearPressed();return;
    }else if(pressed['KeyX']&&P.attackCooldown<=0){
      P.vx=0;P.vy=0;P.state='punch';P.stateTimer=11;P.attackCooldown=18;pressed['KeyX']=false;SFX.punch();
      moveEntity(P);clearPressed();return;
    }else if(pressed['KeyC']&&P.attackCooldown<=0&&P.stars>0){
      P.vx=0;P.vy=0;P.state='throw';P.stateTimer=10;P.attackCooldown=22;pressed['KeyC']=false;SFX.star();
      moveEntity(P);clearPressed();return;
    }
    P.vx=0;
    // Slower climb/descend speed for finer ladder control.
    P.vy=keys['ArrowUp']?-0.7:(keys['ArrowDown']?0.7:0);
    P.state='climb';
    moveEntity(P);
    if(!isLadder(cx,Math.floor((P.y+2)/TS))&&!isLadder(cx,Math.floor((P.y+PH/2)/TS)))P.onLadder=false;
    clearPressed();return;
  }else{
    P.onLadder=false;
  }

  // Crouch is temporarily disabled per gameplay request.
  // Keep this explicit reset so no legacy state can leak into animation logic.
  P.crouching=false;

  // Track direct movement intent from player input so animations can stay
  // stable (idle when no input).
  const moveLeft=keys['ArrowLeft'];
  const moveRight=keys['ArrowRight'];
  const hasMoveInput=moveLeft||moveRight;

  // Shadow ability: hold DOWN while stationary on ground to become unseen by NPC AI.
  const wantsShadow=keys['ArrowDown']&&!hasMoveInput&&P.onGround&&!P.onLadder;
  const canShadow=wantsShadow&&Math.abs(P.vx)<0.03&&Math.abs(P.vy)<0.03&&P.attackCooldown<=0;
  P.shadowMode=!!canShadow;

  P.vx=0;
  if(moveLeft){P.vx=-spd;}
  if(moveRight){P.vx=spd;}

  if(P.vx!==0){
    P.shadowMode=false;
    const desiredDir=P.vx>0?1:-1;
    if(desiredDir!==P.dir&&Math.abs(P.vx)>0.22)P.turnTimer=8;
    P.dir=desiredDir;
    P.lastFacingDir=desiredDir;
  }else if(P.turnTimer>0){
    P.turnTimer--;
  }

  const wasOnGround=P.onGround;
  if((keys['ArrowUp']||keys['Space'])&&P.onGround){
    // Tune jump to be ~2x slower and ~half as high as the prior setup.
    const jumpImpulse=(6.5*Math.sqrt(2))*0.155;
    P.shadowMode=false;
    P.vy=-jumpImpulse;P.onGround=false;P.state='jump';SFX.jump();
  }

  if(pressed['KeyZ']&&P.attackCooldown<=0){
    P.shadowMode=false;
    P.state='kick';P.stateTimer=13;P.attackCooldown=22;pressed['KeyZ']=false;SFX.kick();
  }else if(pressed['KeyX']&&P.attackCooldown<=0){
    P.shadowMode=false;
    P.state='punch';P.stateTimer=11;P.attackCooldown=18;pressed['KeyX']=false;SFX.punch();
  }else if(pressed['KeyC']&&P.attackCooldown<=0&&P.stars>0){
    P.shadowMode=false;
    P.state='throw';P.stateTimer=10;P.attackCooldown=22;pressed['KeyC']=false;SFX.star();
  }else if(pressed['KeyB']&&P.attackCooldown<=0&&canThrowBombNow()&&(INFINITE_BOMBS||P.bombs>0)){
    P.shadowMode=false;
    P.state='bomb_throw';P.stateTimer=12;P.attackCooldown=30;pressed['KeyB']=false;
    // Start cooldown as soon as the throw animation commits.
    P.nextBombAtMs=performance.now()+BOMB_COOLDOWN_MS;
  }

  const prevOnGround=P.onGround;
  moveEntity(P);
  if(!P.onGround)P.shadowMode=false;
  if(!prevOnGround&&P.onGround)SFX.land();

  if(!['kick','punch','throw','bomb_throw','hurt','climb'].includes(P.state)){
    // Resolve pose from post-physics state for stable idle/run/jump transitions.
    const movingHoriz=hasMoveInput&&Math.abs(P.vx)>0.02;
    P.state=P.onGround?(movingHoriz?'run':'idle'):(P.vy<0?'jump':'fall');
  }

  // Hazards
  const ft=getT(Math.floor((P.x+PW/2)/TS),Math.floor((P.y+PH)/TS));
  if(ft===T_WATER||ft===T_SPIKE)playerHit(5);

  // Exit
  if(P.hasDisk&&P.hasKeycard){
    if(getT(Math.floor((P.x+PW/2)/TS),Math.floor((P.y+PH/2)/TS))===T_EXIT){
      SFX.win();gameState='WIN';
    }
  }
  clearPressed();
}

// ── PROJECTILES ───────────────────────────────────────────────────────────────
let stars=[],bombs=[],bullets=[];

function spawnStar(){
  stars.push({x:P.x+(P.dir>0?PW+2:-4),y:P.y+PH*0.35,vx:P.dir*6.5,vy:0,life:65});
}
function spawnBomb(){
  // Infinite bombs mode keeps bomb count untouched for uninterrupted play.
  if(!INFINITE_BOMBS)P.bombs--;
  bombs.push({x:P.x+(P.dir>0?PW:0),y:P.y+4,vx:P.dir*3.2,vy:-4.5,life:130});
}
function spawnBullet(x,y,vx){
  bullets.push({x,y,vx,vy:0,life:85});
}

function updateStars(){
  for(let i=stars.length-1;i>=0;i--){
    const s=stars[i];s.x+=s.vx;s.y+=s.vy;s.life--;
    if(isSolid(Math.floor(s.x/TS),Math.floor(s.y/TS))||s.life<=0){
      spawnPfx(s.x,s.y,5,'#ffff44');stars.splice(i,1);continue;
    }
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];if(e.state==='dead')continue;
      if(overlaps({x:s.x-3,y:s.y-3,w:6,h:6},{x:e.x,y:e.y,w:e.w,h:e.h})){
        hurtEnemy(e,2,s.vx>0?1:-1);spawnPfx(s.x,s.y,8,'#ffff44');hit=true;break;
      }
    }
    if(hit)stars.splice(i,1);
  }
}


function isBombDestructibleTile(tx,ty){
  const t=getT(tx,ty);
  // Keep outer map shell intact to avoid void leaks while allowing interior
  // floor/brick destruction exactly where bomb gameplay expects it.
  if(tx<=0||tx>=MW-1||ty<=0||ty>=MH-1)return false;
  return t===T_SOLID||t===T_CRATE;
}

function destroyBombTiles(cx,cy,tileRadius){
  for(let by2=-tileRadius;by2<=tileRadius;by2++)for(let bx2=-tileRadius;bx2<=tileRadius;bx2++){
    if(bx2*bx2+by2*by2>tileRadius*tileRadius+1)continue;
    const tx=cx+bx2,ty=cy+by2;
    if(isBombDestructibleTile(tx,ty)){
      const tile=getT(tx,ty);
      setT(tx,ty,T_EMPTY);
      spawnPfx(tx*TS+8,ty*TS+8,tile===T_CRATE?8:5,tile===T_CRATE?'#8b5a2b':'#a05a3a');
    }
  }
}

function updateBombs(){
  for(let i=bombs.length-1;i>=0;i--){
    const b=bombs[i];
    b.vy=Math.min(b.vy+GRAV,MAXFALL);
    b.x+=b.vx;b.y+=b.vy;
    const bfy=Math.floor((b.y+4)/TS);
    if(isSolid(Math.floor(b.x/TS),bfy)||isPlat(Math.floor(b.x/TS),bfy)){
      b.y=bfy*TS-4;b.vy*=-0.45;b.vx*=0.68;
    }
    b.life--;
    if(b.life<=0){
      SFX.bomb();addShake(9);
      spawnPfx(b.x,b.y,35,'#ff6600');spawnPfx(b.x,b.y,20,'#ffff00');spawnPfx(b.x,b.y,12,'#ffffff');
      const rad=52;
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];if(e.state==='dead')continue;
        const dx=(e.x+e.w/2)-b.x,dy=(e.y+e.h/2)-b.y;
        if(Math.sqrt(dx*dx+dy*dy)<rad)hurtEnemy(e,5,dx>0?1:-1);
      }
      const pdx=(P.x+PW/2)-b.x,pdy=(P.y+PH/2)-b.y;
      if(Math.sqrt(pdx*pdx+pdy*pdy)<rad*0.55)playerHit(2);
      // Blast now destroys nearby brick/floor tiles in addition to crates.
      destroyBombTiles(Math.floor(b.x/TS),Math.floor(b.y/TS),2);
      bombs.splice(i,1);
    }
  }
}

function updateBullets(){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(isSolid(Math.floor(b.x/TS),Math.floor(b.y/TS))||b.life<=0){
      spawnPfx(b.x,b.y,3,'#ff8800');bullets.splice(i,1);continue;
    }
    if(overlaps({x:b.x-2,y:b.y-2,w:4,h:4},{x:P.x,y:P.y,w:PW,h:PH})){
      playerHit(1);spawnPfx(b.x,b.y,4,'#ff4400');bullets.splice(i,1);
    }
  }
}

function hurtEnemy(e,dmg,dir){
  if(e.state==='dead'||e.state==='hurt')return;
  e.health-=dmg;
  P.score+=50;P.combo++;P.comboTimer=160;
  if(P.combo>=3)P.score+=P.combo*40;
  spawnPfx(e.x+e.w/2,e.y+e.h/2,6,'#ff4422');
  e.state='hurt';e.stateTimer=18;e.vx=(dir||1)*2;e.vy=-2;
  if(e.health<=0){
    e.state='dead';
    // Keep defeated enemies in-world as corpses with blood pools.
    e.corpseSettled=false;e.bloodSize=5+Math.random()*6;
    e.vx=(dir||1)*1.2;e.vy=-1.4;
    P.score+=150+(P.combo>3?P.combo*25:0);
    spawnPfx(e.x+e.w/2,e.y+e.h/2,22,'#ff2200');addShake(3);
  }
}
